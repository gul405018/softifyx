<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Softifyx Financial Software | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f4f8;
            background-image: url('assets/images/login/login_bg.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 15% 20px 20px;
        }
        @media (max-width: 768px) { body { justify-content: center; padding: 20px; } }
        form {
            position: relative;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            padding: 1.5em 2em 2em;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .login-logo {
            display: block; width: 100px; margin: -50px auto 10px;
            background: #fff; padding: 5px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .svgContainer {
            width: 120px; height: 120px; margin: 0 auto 1.5em;
            border-radius: 50%; overflow: hidden; background: #eef5ff;
            border: 2px solid #217093;
        }
        .svgContainer .mySVG { width: 100%; height: 100%; }
        .field-row { display: flex; align-items: center; margin-bottom: 12px; }
        .field-row label { width: 100px; font-size: 0.9em; font-weight: 700; color: #3A5E77; }
        .field-row select, .field-row input {
            flex: 1; height: 36px; padding: 0 12px; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 0.9em; color: #495057;
            background-color: #f8f9fa; outline: none; width: 100%;
        }
        .field-row select:focus, .field-row input:focus { border-color: #217093; background: #fff; }
        .btn {
            height: 38px; padding: 0 20px; font-size: 0.9em; font-weight: 600;
            border-radius: 4px; cursor: pointer; border: none; transition: all 0.2s;
            background: #217093; color: #fff; width: 100%; margin-top: 10px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .branding { text-align: center; margin-top: 20px; font-size: 0.75em; color: #6c757d; border-top: 1px solid #dee2e6; padding-top: 10px; }
        .brand-title { font-weight: 700; color: #214d64; margin-bottom: 2px; }
    </style>
</head>
<body>
    <form id="loginForm">
        <img src="assets/logos/logo.png" class="login-logo" onerror="this.src='https://via.placeholder.com/100x30?text=Softifyx'">
        <div class="svgContainer">
            <svg class="mySVG" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="100" fill="#a9ddf3" />
                <path fill="#FFFFFF" d="M193.3,135.9c-5.8-8.4-15.5-13.9-26.5-13.9H151V72c0-27.6-22.4-50-50-50S51,44.4,51,72v50H32.1 c-10.6,0-20,5.1-25.8,13l0,78h187L193.3,135.9z" />
                <path class="face" fill="#DDF1FA" d="M134.5,46v35.5c0,21.815-15.446,39.5-34.5,39.5s-34.5-17.685-34.5-39.5V46" />
                <circle cx="85.5" cy="78.5" r="3.5" fill="#3a5e77" />
                <circle cx="114.5" cy="78.5" r="3.5" fill="#3a5e77" />
            </svg>
        </div>
        <div class="field-row">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter Username" required>
        </div>
        <div class="field-row">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter Password" required>
        </div>
        <button type="submit" class="btn">Log in to your business</button>
        <div class="branding">
            <div class="brand-title">SOFTIFYX FINANCIALS</div>
            <div>A Project of <span style="font-weight:700">SOFTIFYX TECHNOLOGIES</span></div>
            <div style="margin-top:2px;">support@softifyx.com | +92 331 7240256</div>
        </div>
    </form>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const response = await fetch('api/auth.php?action=login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const result = await response.json();
                if (response.ok && result.status === 'success') {
                    const sessionInfo = {
                        user_id: result.user.id,
                        username: result.user.username,
                        role: result.user.role,
                        company_id: result.user.company_id,
                        loginTime: Date.now()
                    };
                    localStorage.setItem('softifyx_session', JSON.stringify(sessionInfo));
                    window.location.href = 'index.html';
                } else { alert(result.error || "Invalid username or password!"); }
            } catch (err) { alert("Server Connection Failed."); }
        });
    </script>
</body>
</html>
