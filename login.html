<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Softifyx Financial Software | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f4f8;
            background-image: url('assets/images/login/login_bg.jpg');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        form {
            position: relative;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            padding: 1.5em 2em 2em;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .login-logo {
            display: block; width: 100px; margin: -50px auto 10px;
            background: #fff; padding: 5px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .svgContainer {
            width: 140px; height: 140px; margin: 0 auto 1.5em;
            border-radius: 50%; overflow: hidden; background: #eef5ff;
            border: 2px solid #217093;
        }
        .svgContainer .mySVG { width: 100%; height: 100%; }
        
        .field-row {
            display: flex; align-items: center; margin-bottom: 10px;
        }
        .field-row label {
            width: 120px; font-size: 0.85em; font-weight: 700; color: #3A5E77;
        }
        .field-row select, .field-row input {
            flex: 1; height: 32px; padding: 0 10px; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 0.85em; color: #495057;
            background-color: #f8f9fa; outline: none;
        }
        .field-row select:focus, .field-row input:focus { border-color: #217093; background: #fff; }
        
        .action-row {
            display: flex; justify-content: space-between; gap: 10px; margin-top: 15px;
        }
        .btn {
            height: 32px; padding: 0 15px; font-size: 0.8em; font-weight: 600;
            border: 1px solid #ced4da; border-radius: 4px; cursor: pointer;
            background: #f8f9fa; color: #495057; transition: all 0.2s;
        }
        .btn.btn-primary { background: #217093; border-color: #217093; color: #fff; flex: 1; }
        .btn.btn-default { width: 100px; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .branding { text-align: center; margin-top: 20px; font-size: 0.75em; color: #6c757d; border-top: 1px solid #dee2e6; padding-top: 10px; }
        .brand-title { font-weight: 700; color: #214d64; margin-bottom: 2px; }
    </style>
</head>
<body>
    <form id="loginForm">
        <img src="assets/logos/logo.png" class="login-logo" onerror="this.src='https://via.placeholder.com/100x30?text=Softifyx'">
        
        <div class="svgContainer">
            <svg class="mySVG" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
                <circle cx="110" cy="110" r="100" fill="#a9ddf3" />
                <g class="yeti">
                    <!-- Original Yeti Body & Fur Paths -->
                    <path class="yeti-body" fill="#FFFFFF" d="M106.3,14.1c-19.4,0.2-34.8,1.6-42.9,7.7c-5.1,3.9-10.2,13.1-17.6,15.8c-11.5,4.1-17.6-1.5-23.7,2.1 c-4.6,2.7-7.3,10.1-5,15c3.3,7.2,16.2,3.3,18.1,9.4c1.2,3.9-6.3,9.8-9.9,13.6c-13.6,13.9-18.4,19.9-18.3,27c0.1,7.1,5.6,12.7,19.3,26.6 c3.6,3.6,11.2,9.6,10,13.5c-1.9,6.1-14.8,2.2-18.1,9.4c-2.3,4.9,0.4,12.3,5,15c6.1,3.6,12.2-2,23.7,2.1c7.4,2.7,12.5,11.9,17.6,15.8 c8.1,6.1,23.5,7.5,42.9,7.7c19.4-0.2,34.8-1.6,42.9-7.7c5.1-3.9,10.2-13.1,17.6-15.8c11.5-4.1,17.6,1.5,23.7-2.1c4.6-2.7,7.3-10.1,5-15 c-3.3-7.2-16.2-3.3-18.1-9.4c-1.2-3.9,6.3-9.8,9.9-13.6c13.6-13.9,18.4-19.9,18.3-27c-0.1-7.1-5.6-12.7-19.3-26.6 c-3.6-3.6-11.2-9.6-10-13.5c1.9-6.1,14.8-2.2,18.1-9.4c2.3-4.9-0.4-12.3-5-15c-6.1-3.6-12.2,2-23.7-2.1c-7.4-2.7-12.5-11.9-17.6-15.8 C141.1,15.8,125.7,14.3,106.3,14.1z" />
                    <path class="yeti-face" fill="#DDF1FA" d="M110.1,42.3c-23.3,0-42.3,17.4-42.3,38.9v35.5c0,21.5,19,38.9,42.3,38.9s42.3-17.4,42.3-38.9V81.2 C152.4,59.7,133.4,42.3,110.1,42.3z" />
                    
                    <g class="eyes">
                        <circle class="eye-L" cx="89" cy="85" r="4.5" fill="#3a5e77" />
                        <circle class="pupil-L" cx="89" cy="83" r="1.5" fill="#fff" />
                        <circle class="eye-R" cx="131" cy="85" r="4.5" fill="#3a5e77" />
                        <circle class="pupil-R" cx="131" cy="83" r="1.5" fill="#fff" />
                    </g>
                    
                    <path d="M104.9,112.1c0,0,2.1,4.2,5.2,4.2s5.2-4.2,5.2-4.2" fill="none" stroke="#3a5e77" stroke-width="2.5" stroke-linecap="round" />

                    <!-- Authentic Rotating Arms -->
                    <g class="arms-group">
                        <g class="armL">
                            <path d="M45,180 Q25,180 35,160 Q45,140 65,145" fill="#FFFFFF" stroke="#3a5e77" stroke-width="2" />
                        </g>
                        <g class="armR">
                            <path d="M175,180 Q195,180 185,160 Q175,140 155,145" fill="#FFFFFF" stroke="#3a5e77" stroke-width="2" />
                        </g>
                    </g>
                </g>
            </svg>
        </div>

        <div class="field-row">
            <label>Login</label>
            <select id="userDropdown"></select>
        </div>
        <div class="field-row">
            <label>Company</label>
            <select id="companyDropdown"></select>
        </div>
        <div class="field-row">
            <label>Financial Year</label>
            <div style="display:flex; gap:5px; flex:1;">
                <select id="yearDropdown" style="flex:1;"></select>
                <button type="button" class="btn btn-default" style="width: auto;">Set Default</button>
            </div>
        </div>
        <div class="field-row">
            <label>Password</label>
            <div style="display:flex; gap:5px; flex:1;">
                <input type="password" id="password" autocomplete="new-password" style="flex: 1; max-width: 140px;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Log in</button>
            </div>
        </div>

        <div class="branding">
            <div class="brand-title">SOFTIFYX FINANCIALS</div>
            <div>A Project of <span style="font-weight:700">SOFTIFYX TECHNOLOGIES</span> | <a href="http://www.softifyx.com" target="_blank" style="color: #217093; text-decoration: none;">www.softifyx.com</a></div>
            <div style="margin-top:2px;">Plot No: 192/8, Road No: L-11, Industrial Estate Gadoon Amazai Tehsil Topi District Swabi, KPK Pakistan</div>
            <div style="margin-top:2px; font-weight: 600;">support@softifyx.com | +92 331 7240256</div>
        </div>
    </form>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Populate Data from LocalStorage
        const users = JSON.parse(localStorage.getItem('softifyx_users') || '[{"username":"Administrator","password":"123"}]');
        const companies = JSON.parse(localStorage.getItem('softifyx_companies') || '["Softifyx Company"]');
        const financialYears = JSON.parse(localStorage.getItem('softifyx_financial_years') || '["2021-22","2022-23","2023-24"]');

        const userSelect = document.getElementById('userDropdown');
        const companySelect = document.getElementById('companyDropdown');
        const yearSelect = document.getElementById('yearDropdown');

        users.forEach(u => { const op = new Option(u.username, u.username); userSelect.add(op); });
        companies.forEach(c => { 
            const cName = (typeof c === 'string') ? c : (c.name || "Unknown Company");
            if (cName !== "[object Object]") {
                const op = new Option(cName, cName); 
                companySelect.add(op); 
            }
        });
        financialYears.forEach(y => { 
            const yName = (typeof y === 'string') ? y : (y.abbr || y.year || "FY");
            const op = new Option(yName, yName); 
            yearSelect.add(op); 
        });

        // Original Yeti Design & Classic Rotation Logic
        const armL = document.querySelector('.armL');
        const armR = document.querySelector('.armR');
        const eyeL = document.querySelector('.eye-L');
        const eyeR = document.querySelector('.eye-R');
        const pupilL = document.querySelector('.pupil-L');
        const pupilR = document.querySelector('.pupil-R');
        const passwordInput = document.getElementById('password');

        // Set Anchor/Pivot points for Rotation
        gsap.set(armL, { transformOrigin: "bottom right" });
        gsap.set(armR, { transformOrigin: "bottom left" });

        passwordInput.addEventListener('focus', () => {
            // Original Rotation: Rotate up to cover eyes
            gsap.to(armL, { rotation: 110, x: 55, y: -75, ease: "power2.out", duration: 0.5 });
            gsap.to(armR, { rotation: -110, x: -55, y: -75, ease: "power2.out", duration: 0.5 });
        });

        passwordInput.addEventListener('blur', () => {
            // Restore Original position
            gsap.to(armL, { rotation: 0, x: 0, y: 0, ease: "power2.inOut", duration: 0.4 });
            gsap.to(armR, { rotation: 0, x: 0, y: 0, ease: "power2.inOut", duration: 0.4 });
        });

        // Eye Watching Mouse
        document.addEventListener('mousemove', (e) => {
            if (document.activeElement === passwordInput) return;
            const x = (e.clientX / window.innerWidth - 0.5) * 15;
            const y = (e.clientY / window.innerHeight - 0.5) * 15;
            gsap.to([pupilL, pupilR], { x: x, y: y, duration: 0.2 });
        });
        passwordInput.addEventListener('blur', () => {
            gsap.to(armL, { x: 0, y: 0, rotation: 0, ease: "power2.out" });
            gsap.to(armR, { x: 0, y: 0, rotation: 0, ease: "power2.out" });
        });

        // Form Submit
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const u = userSelect.value;
            const p = passwordInput.value;
            const userObj = users.find(usr => usr.username === u);
            const isDefaultAdmin = (u === 'Administrator' && p === 'admin123'); // Fallback for first-time use

            if ((userObj && p === userObj.password) || isDefaultAdmin) {
                localStorage.setItem('softifyx_session', JSON.stringify({
                    username: u,
                    role: userObj ? (userObj.role || 'Operator') : 'Admin', 
                    company: companySelect.value,
                    year: yearSelect.value,
                    loginTime: Date.now()
                }));
                window.location.href = 'index.html';
            } else {
                alert("Invalid username or password!");
                gsap.to("form", 0.05, { x: 10, repeat: 5, yoyo: true });
            }
        });
    </script>
</body>
</html>
