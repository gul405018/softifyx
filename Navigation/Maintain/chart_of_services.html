<div id="chartOfServicesContainer" data-module="Chart of Services" style="width: 1000px; height: 750px; display: flex; flex-direction: column; gap: 15px; background: #f1f5f9; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; position: relative; overflow-y: auto;">

    <!-- Section 1: Service Categories -->
    <div style="background: white; border: 1px solid #cbd5e0; border-radius: 4px; padding: 15px; display: flex; flex-direction: column; gap: 10px; position: relative;">
        <div style="position: absolute; top: -10px; left: 15px; background: #f1f5f9; padding: 0 10px; font-size: 14px; font-weight: 700; color: #1e40af; border: 1px solid #cbd5e0; border-radius: 4px;">Service Categories</div>
        
        <div style="display: flex; gap: 20px; margin-top: 5px;">
            <!-- Category List -->
            <div style="width: 350px; height: 180px; border: 1px solid #cbd5e0; background: white; overflow-y: auto; border-radius: 2px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                    <tbody id="servCatListBody">
                        <!-- Categories injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Category Form -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button class="serv-btn" onclick="window.ChartOfServices.addCategory()"><i class="fas fa-plus"></i> Add</button>
                    <button class="serv-btn serv-btn-save" onclick="window.ChartOfServices.saveCategory()"><i class="fas fa-save"></i> Save</button>
                    <button class="serv-btn serv-btn-cancel" onclick="window.ChartOfServices.resetCatForm()"><i class="fas fa-times"></i> Cancel</button>
                    <button class="serv-btn serv-btn-delete" onclick="window.ChartOfServices.deleteCategory()"><i class="fas fa-trash"></i> Delete</button>
                </div>

                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="width: 120px; font-size: 13px; font-weight: 700; color: #334155;">Category Code</span>
                        <input type="text" id="servCatCode" style="width: 150px; height: 28px; border: 1px solid #94a3b8; padding: 0 8px; outline: none; font-weight: 700;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="width: 120px; font-size: 13px; font-weight: 700; color: #334155;">Category Name</span>
                        <input type="text" id="servCatName" style="flex: 1; height: 28px; border: 1px solid #94a3b8; padding: 0 8px; outline: none;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 2: List of Services -->
    <div style="background: white; border: 1px solid #cbd5e0; border-radius: 4px; padding: 15px; display: flex; flex-direction: column; gap: 10px; position: relative;">
        <div style="position: absolute; top: -10px; left: 15px; background: #f1f5f9; padding: 0 10px; font-size: 14px; font-weight: 700; color: #1e40af; border: 1px solid #cbd5e0; border-radius: 4px;">List of Services</div>
        
        <div style="display: flex; gap: 20px; margin-top: 5px;">
            <!-- Service List -->
            <div style="width: 350px; height: 350px; border: 1px solid #cbd5e0; background: white; overflow-y: auto; border-radius: 2px;">
                <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                    <tbody id="servItemListBody">
                        <!-- Services injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Service Form -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 12px;">
                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button class="serv-btn" onclick="window.ChartOfServices.addService()"><i class="fas fa-plus"></i> Add</button>
                    <button class="serv-btn serv-btn-save" onclick="window.ChartOfServices.saveService()"><i class="fas fa-save"></i> Save</button>
                    <button class="serv-btn serv-btn-cancel" onclick="window.ChartOfServices.resetItemForm()"><i class="fas fa-times"></i> Cancel</button>
                    <button class="serv-btn serv-btn-delete" onclick="window.ChartOfServices.deleteService()"><i class="fas fa-trash"></i> Delete</button>
                </div>

                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="width: 120px; font-size: 13px; font-weight: 700; color: #334155;">Service Code</span>
                        <input type="text" id="servItemCode" style="width: 150px; height: 28px; border: 1px solid #94a3b8; padding: 0 8px; outline: none; font-weight: 700;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span style="width: 120px; font-size: 13px; font-weight: 700; color: #334155;">Service Name</span>
                        <input type="text" id="servItemName" style="flex: 1; height: 28px; border: 1px solid #94a3b8; padding: 0 8px; outline: none;">
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <span style="width: 120px; font-size: 13px; font-weight: 700; color: #334155; padding-top: 5px;">Description</span>
                        <textarea id="servItemDesc" style="flex: 1; height: 60px; border: 1px solid #94a3b8; padding: 8px; outline: none; resize: none; font-family: inherit; font-size: 12px;"></textarea>
                    </div>
                    
                    <div style="display: flex; gap: 20px; margin-top: 10px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="width: 120px; font-size: 13px; font-weight: 700; color: #334155;">Selling Price</span>
                            <input type="number" id="servItemPrice" value="0" style="width: 100px; height: 28px; border: 1px solid #94a3b8; padding: 0 8px; outline: none; text-align: right; font-weight: 700;">
                        </div>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="font-size: 13px; font-weight: 700; color: #334155;">Measurement Unit</span>
                            <input type="text" id="servItemUnit" style="width: 80px; height: 28px; border: 1px solid #94a3b8; padding: 0 8px; outline: none; text-align: center;">
                        </div>
                    </div>

                    <div style="display: flex; align-items: center; gap: 20px;">
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span style="width: 120px; font-size: 13px; font-weight: 700; color: #334155;">Sales Tax Rate</span>
                            <div style="display: flex; align-items: center; border: 1px solid #94a3b8;">
                                <input type="number" id="servItemTax" value="0" style="width: 60px; height: 28px; border: none; padding: 0 8px; outline: none; text-align: right;">
                                <span style="background: #f1f5f9; padding: 0 8px; height: 28px; display: flex; align-items: center; border-left: 1px solid #94a3b8; font-size: 12px; font-weight: 700;">%</span>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <label style="display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: #334155; cursor: pointer;">
                                <input type="radio" name="servTaxType" value="Percent" checked> Percent
                            </label>
                            <label style="display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: #334155; cursor: pointer;">
                                <input type="radio" name="servTaxType" value="Amount"> Amount
                            </label>
                        </div>
                    </div>

                    <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                        <span style="width: 120px; font-size: 13px; font-weight: 700; color: #334155;">Inactive Service</span>
                        <input type="checkbox" id="servItemInactive" style="width: 18px; height: 18px; cursor: pointer;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Keys -->
    <div style="text-align: right; color: #ef4444; font-size: 13px; font-weight: 700; margin-top: 10px;">
        Press: Ctrl+N to add new account, Ctrl+S to save changes and ESC to cancel
    </div>

    <style>
        .serv-btn {
            height: 32px;
            padding: 0 15px;
            font-size: 12px;
            font-weight: 700;
            background: #f1f5f9;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            color: #334155;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .serv-btn:hover { background: #e2e8f0; border-color: #64748b; }
        .serv-btn i { font-size: 14px; }
        .serv-btn-save { color: #166534; }
        .serv-btn-save:hover { background: #dcfce7; border-color: #166534; }
        .serv-btn-cancel { color: #991b1b; }
        .serv-btn-cancel:hover { background: #fee2e2; border-color: #991b1b; }
        .serv-btn-delete { color: #525252; }
        .serv-btn-delete:hover { background: #d4d4d4; border-color: #525252; }

        #servCatListBody tr, #servItemListBody tr { cursor: pointer; border-bottom: 1px solid #e2e8f0; }
        #servCatListBody tr:hover, #servItemListBody tr:hover { background: #f8fafc; }
        #servCatListBody tr.active, #servItemListBody tr.active { background: #eff6ff; }
        #servCatListBody td, #servItemListBody td { padding: 8px 12px; color: #334155; }
        
        /* Custom scrollbar for containers */
        #chartOfServicesContainer::-webkit-scrollbar { width: 8px; }
        #chartOfServicesContainer::-webkit-scrollbar-track { background: #f1f5f9; }
        #chartOfServicesContainer::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 4px; }
    </style>
</div>
