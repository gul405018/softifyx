<div id="voucherPrefsContainer" data-module="Voucher Posting Preferences" style="width: 500px; height: 350px; display: flex; flex-direction: column; gap: 20px; background: white; padding: 30px; font-family: 'Segoe UI', Arial, sans-serif; position: relative; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">

    <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px;">
        <label style="display: flex; align-items: center; gap: 15px; cursor: pointer; padding: 20px 30px; border: 1px dashed #cbd5e0; border-radius: 8px; background: #f8fafc; transition: all 0.2s; user-select: none;">
            <input type="checkbox" id="autoPostVouchers" style="width: 22px; height: 22px; cursor: pointer; accent-color: #1e3a8a;">
            <span style="font-size: 16px; font-weight: 700; color: #1e3a8a; font-style: italic;">Automatically post vouchers, when saved.</span>
        </label>
    </div>

    <!-- Bottom Buttons -->
    <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 20px;">
        <button class="pref-btn pref-btn-save" onclick="window.VoucherPrefs.save()">
            Save
        </button>
        <button class="pref-btn pref-btn-cancel" onclick="closeModularPopup()">
            Cancel
        </button>
    </div>

    <style>
        .pref-btn {
            height: 35px;
            min-width: 90px;
            padding: 0 20px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: none;
            color: white;
        }
        .pref-btn-save { background: #1e3a8a; }
        .pref-btn-save:hover { background: #1e40af; }
        .pref-btn-cancel { background: #94a3b8; }
        .pref-btn-cancel:hover { background: #64748b; }

        label:hover {
            background: #eff6ff;
            border-color: #1e3a8a;
        }
    </style>
</div>
