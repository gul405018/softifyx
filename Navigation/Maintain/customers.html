<div id="customersContainer" data-module="Customers" style="height: 600px; width: 100%; display: flex; flex-direction: column; gap: 8px; background: white; padding: 12px; overflow: hidden; border-radius: 4px;">

    <!-- Section 1: Customer Type -->
    <div style="flex: 0.3; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 10px; border-radius: 4px;">
        <div class="form-section-header">Customer Type</div>
        <div style="display: flex; gap: 15px; flex: 1;">
            <!-- Left: List -->
            <div style="flex: 1;">
                <select id="customerTypeList" size="4" class="coa-input" style="height: 80px;" onchange="onCustomerTypeSelect(this.value)"></select>
            </div>
            <!-- Right: Actions & Fields -->
            <div style="flex: 1.2; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn coa-add" onclick="resetCustomerTypeForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveCustomerType()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetCustomerTypeForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteCustomerType()">Delete</button>
                </div>
                <div style="display: grid; grid-template-columns: 120px 1fr; gap: 8px;">
                    <label class="coa-label">Sub Type Code</label>
                    <input type="text" id="custSubTypeCode" class="coa-input" disabled>
                    <label class="coa-label">Customer Type</label>
                    <input type="text" id="custTypeName" class="coa-input" disabled>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 2: List of Customers -->
    <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 10px; border-radius: 4px; overflow: hidden;">
        <div class="form-section-header">List of Customers</div>
        <div style="display: flex; gap: 15px; flex: 1; overflow: hidden;">
            <!-- Left: Grid List -->
            <div style="flex: 0.8; display: flex; flex-direction: column;">
                <select id="customerList" size="15" class="coa-input" style="flex: 1;" onchange="onCustomerSelect(this.value)"></select>
            </div>
            <!-- Right: Detailed Fields -->
            <div style="flex: 1.5; overflow-y: auto; padding-right: 5px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px; margin-bottom: 10px; position: sticky; top: 0; background: white; z-index: 1;">
                    <button class="coa-btn coa-chart" onclick="findCustomer()"><i class="fas fa-search"></i> Find</button>
                    <button class="coa-btn coa-add" onclick="resetCustomerForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveCustomer()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetCustomerForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteCustomer()">Delete</button>
                </div>
                <div style="display: grid; grid-template-columns: 100px 1fr 100px 1fr; gap: 6px 8px;">
                    <label class="coa-label">Account Code</label>
                    <input type="text" id="custAccountCode" class="coa-input" style="grid-column: span 3; width: 120px;" disabled>
                    
                    <label class="coa-label">Account Name</label>
                    <input type="text" id="custAccountName" class="coa-input" style="grid-column: span 3;" disabled>

                    <label class="coa-label">Region</label>
                    <div style="display: flex; gap: 2px;">
                        <select id="custRegion" class="coa-input" disabled onchange="loadSubRegions(this.value)"></select>
                        <button class="coa-btn" style="min-width: 30px; height: 30px; padding: 0;" onclick="manageRegions()">..</button>
                    </div>
                    <label class="coa-label" style="text-align: right;">Sub-Region</label>
                    <select id="custSubRegion" class="coa-input" disabled></select>

                    <label class="coa-label">Address</label>
                    <textarea id="custAddress" class="coa-input" style="grid-column: span 3; height: 40px; resize: none;" disabled></textarea>

                    <label class="coa-label">Mobile</label>
                    <input type="text" id="custMobile" class="coa-input" disabled>
                    <label class="coa-label" style="text-align: right;">E-Mail</label>
                    <input type="text" id="custEmail" class="coa-input" disabled>

                    <label class="coa-label">Credit Limit</label>
                    <input type="number" id="custCreditLimit" class="coa-input" disabled>
                    <label class="coa-label" style="text-align: right;">Terms</label>
                    <input type="text" id="custCreditTerms" class="coa-input" disabled>
                </div>
            </div>
        </div>
    </div>
</div>
