<div id="customersContainer" data-module="Customers"
    style="width: 930px; min-height: 600px; display: flex; flex-direction: column; gap: 15px; background: white; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; position: relative;">

    <!-- Section 1: Customer Type -->
    <div style="flex: 0.4; display: flex; flex-direction: column; min-height: 160px; border: 1px solid #e2e8f0; padding: 15px; border-radius: 4px; background: white;">
        <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">Customer Type</div>
        <div style="display: flex; gap: 20px; flex: 1; align-items: stretch;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden;">
                <select id="customerTypeList" size="5"
                    style="width: 100%; height: 100%; border: none; outline: none; font-size: 13px; background: white;"
                    onchange="onCustomerTypeSelect(this.value)"></select>
            </div>

            <!-- Right: Fields & Buttons -->
            <div style="flex: 1.2; display: flex; flex-direction: column; gap: 12px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 15px; background: white;">
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="coa-btn coa-btn-chart" onclick="printCustomers('type')">Chart</button>
                    <button class="coa-btn coa-btn-add" onclick="resetCustomerTypeForm(true)">Add</button>
                    <button class="coa-btn coa-btn-save" onclick="saveCustomerType()">Save</button>
                    <button class="coa-btn coa-btn-delete" onclick="deleteCustomerType()">Delete</button>
                    <button class="coa-btn coa-btn-cancel" onclick="resetCustomerTypeForm()">Cancel</button>
                </div>
                <div style="display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-content: start; margin-top: 5px;">
                    <label class="coa-label">Sub Type Code</label>
                    <input type="text" id="custSubTypeCode" class="coa-input" style="width: 120px;" disabled>

                    <label class="coa-label">Customer Type</label>
                    <input type="text" id="custTypeName" class="coa-input" disabled>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 2: List of Customers -->
    <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 15px; border-radius: 4px; background: white;">
        <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">List of Customers</div>
        <div style="display: flex; gap: 20px; flex: 1; align-items: stretch;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden;">
                <select id="customerList" size="10"
                    style="width: 100%; flex: 1; border: none; outline: none; font-size: 13px; background: white;"
                    onchange="onCustomerSelect(this.value)"></select>
            </div>

            <!-- Right: Detailed Fields -->
            <div style="flex: 1.2; display: flex; flex-direction: column; gap: 12px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 15px; background: white;">
                <div style="display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 5px;">
                    <button class="coa-btn coa-btn-chart" onclick="printCustomers('list')">Chart</button>
                    <button class="coa-btn coa-btn-chart" style="background: #1e3a8a !important;"
                        onclick="findCustomer()"><i class="fas fa-search"></i> Find</button>
                    <button class="coa-btn coa-btn-add" onclick="resetCustomerForm(true)">Add</button>
                    <button class="coa-btn coa-btn-save" onclick="saveCustomer()">Save</button>
                    <button class="coa-btn coa-btn-delete" onclick="deleteCustomer()">Delete</button>
                    <button class="coa-btn coa-btn-cancel" onclick="resetCustomerForm()">Cancel</button>
                </div>

                <div style="display: grid; grid-template-columns: 100px 1fr 100px 1fr; gap: 10px; align-content: start;">
                    <label class="coa-label">Account Code</label>
                    <input type="text" id="custAccountCode" class="coa-input" style="grid-column: span 3; width: 120px;"
                        disabled>

                    <label class="coa-label">Account Name</label>
                    <input type="text" id="custAccountName" class="coa-input" style="grid-column: span 3;" disabled>

                    <label class="coa-label">Contact Person</label>
                    <input type="text" id="custContactPerson" class="coa-input" style="grid-column: span 3;" disabled>

                    <label class="coa-label">Address</label>
                    <textarea id="custAddress" class="coa-input"
                        style="grid-column: span 3; height: 50px; resize: none; padding-top: 6px;" disabled></textarea>

                    <label class="coa-label">Region</label>
                    <div style="display: flex; gap: 4px;">
                        <select id="custRegion" class="coa-input" disabled onchange="loadSubRegions(this.value)">
                            <option value="">None</option>
                        </select>
                        <button class="small-manage-btn" onclick="manageRegions()">..</button>
                    </div>
                    <label class="coa-label" style="text-align: right;">Sub-Region</label>
                    <select id="custSubRegion" class="coa-input" disabled>
                        <option value="">None</option>
                    </select>

                    <label class="coa-label">Telephone</label>
                    <input type="text" id="custTelephone" class="coa-input" disabled>
                    <label class="coa-label" style="text-align: right;">Mobile</label>
                    <input type="text" id="custMobile" class="coa-input" disabled>

                    <label class="coa-label">Fax</label>
                    <input type="text" id="custFax" class="coa-input" disabled>
                    <label class="coa-label" style="text-align: right;">Website</label>
                    <input type="text" id="custWebsite" class="coa-input" disabled>

                    <label class="coa-label">E-Mail</label>
                    <input type="text" id="custEmail" class="coa-input" style="grid-column: span 3;" disabled>

                    <label class="coa-label">S. T. Reg. No.</label>
                    <input type="text" id="custStReg" class="coa-input" disabled>
                    <label class="coa-label" style="text-align: right;">N.T.N / C.N.I.C.</label>
                    <input type="text" id="custNtn" class="coa-input" disabled>

                    <label class="coa-label">Business Sector</label>
                    <div style="display: flex; gap: 4px;">
                        <select id="custSector" class="coa-input" disabled>
                            <option value="">None</option>
                        </select>
                        <button class="small-manage-btn" onclick="manageSectors()">..</button>
                    </div>
                    <label class="coa-label" style="text-align: right;">Acc. Manager</label>
                    <div style="display: flex; gap: 4px;">
                        <select id="custAccManager" class="coa-input" disabled>
                            <option value="">None</option>
                        </select>
                        <button class="small-manage-btn" onclick="manageManagers()">..</button>
                    </div>

                    <label class="coa-label">Credit Limit</label>
                    <input type="number" id="custCreditLimit" class="coa-input" value="0" disabled>
                    <label class="coa-label" style="text-align: right;">Credit Terms</label>
                    <input type="text" id="custCreditTerms" class="coa-input" value="CASH" disabled>

                    <label class="coa-label">Remarks</label>
                    <textarea id="custRemarks" class="coa-input"
                        style="grid-column: span 3; height: 40px; resize: none; padding-top: 6px;" disabled></textarea>
                </div>
            </div>
        </div>
    </div>

    <style>
        .coa-btn {
            height: 30px;
            min-width: 70px;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .coa-btn-chart { background: #0891b2; }
        .coa-btn-chart:hover { background: #0e7490; }
        .coa-btn-add { background: #22c55e; }
        .coa-btn-add:hover { background: #16a34a; }
        .coa-btn-save { background: #1e3a8a; }
        .coa-btn-save:hover { background: #1e40af; }
        .coa-btn-cancel { background: #94a3b8; }
        .coa-btn-cancel:hover { background: #64748b; }
        .coa-btn-delete { background: #ef4444; }
        .coa-btn-delete:hover { background: #dc2626; }

        .coa-label { font-size: 11px; font-weight: 700; color: #475569; align-self: center; }
        .coa-input {
            height: 28px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            padding: 0 8px;
            font-size: 12px;
            outline: none;
            width: 100%;
            transition: all 0.2s;
            background: white;
        }

        .coa-input:focus:not(:disabled) {
            border-color: #1e3a8a;
            background: #eff6ff;
        }

        .small-manage-btn {
            padding: 0 8px;
            height: 28px;
            background: #f1f5f9;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 800;
            color: #1e3a8a;
            transition: all 0.2s;
        }

        .small-manage-btn:hover { background: #e2e8f0; color: #1e40af; }

        select:disabled,
        input:disabled,
        textarea:disabled { background-color: #f8fafc; color: #64748b; }

        option { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #475569; }
        option:checked { background: #eff6ff !important; color: #1e3a8a !important; font-weight: 700; border-left: 3px solid #1e3a8a; }
    </style>
</div>
</div>
