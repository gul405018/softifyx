<div id="jobsContainer" data-module="Jobs" style="min-height: 600px; display: flex; flex-direction: column; gap: 8px; background: white; padding: 12px; font-family: 'Segoe UI', Arial, sans-serif; border-radius: 4px; width: 930px; position: relative;">

    <!-- Section 1: Top List of Jobs -->
    <div style="flex: 0.8; display: flex; flex-direction: column; min-height: 200px; border: 1px solid #e2e8f0; padding: 8px; border-radius: 4px; background: #f8fafc;">
        <div style="font-size: 12px; font-weight: 700; color: #1F4E79; margin-bottom: 5px; text-transform: uppercase; border-bottom: 2px solid #1F4E79; padding-bottom: 2px;">
            Job List
        </div>
        <div style="flex: 1; background: white; border: 1px solid #cbd5e0; overflow-y: auto;">
            <table style="width: 100%; border-collapse: collapse; font-size: 11px;">
                <thead style="position: sticky; top: 0; background: #1F4E79; color: white;">
                    <tr>
                        <th style="padding: 4px; text-align: left; border: 1px solid #cbd5e0;">Job No</th>
                        <th style="padding: 4px; text-align: left; border: 1px solid #cbd5e0;">Date</th>
                        <th style="padding: 4px; text-align: left; border: 1px solid #cbd5e0;">Description</th>
                        <th style="padding: 4px; text-align: left; border: 1px solid #cbd5e0;">Customer</th>
                        <th style="padding: 4px; text-align: right; border: 1px solid #cbd5e0;">Value</th>
                        <th style="padding: 4px; text-align: left; border: 1px solid #cbd5e0;">Comp. Date</th>
                        <th style="padding: 4px; text-align: left; border: 1px solid #cbd5e0;">Status</th>
                    </tr>
                </thead>
                <tbody id="jobListBody">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Section 2: Bottom Form Details -->
    <div style="flex: 1.2; border: 1px solid #e2e8f0; padding: 12px; border-radius: 4px; background: white; display: flex; flex-direction: column; gap: 10px;">
        <div style="display: flex; justify-content: flex-end; gap: 8px;">
            <button class="jobs-btn jobs-add" onclick="window.JobsModule.resetForm(true)">Add</button>
            <button class="jobs-btn jobs-save" onclick="window.JobsModule.saveJob()">Save</button>
            <button class="jobs-btn jobs-cancel" onclick="window.JobsModule.resetForm()">Cancel</button>
            <button class="jobs-btn jobs-print" onclick="window.JobsModule.printJob()">Job Card</button>
            <button class="jobs-btn jobs-delete" onclick="window.JobsModule.deleteJob()" style="margin-left: 20px;">Delete</button>
        </div>

        <div style="display: flex; gap: 20px;">
            <!-- Left Side: Job Info -->
            <div style="flex: 1; display: grid; grid-template-columns: 120px 1fr 60px 1fr; gap: 8px 10px; align-content: start;">
                <label class="jobs-label">Job No</label>
                <input type="text" id="jobNo" class="jobs-input" style="width: 100px; color: blue; font-weight: 700;">
                
                <label class="jobs-label" style="text-align: right;">Date</label>
                <input type="date" id="jobDate" class="jobs-input">

                <label class="jobs-label">Job Description</label>
                <textarea id="jobDescription" class="jobs-input" style="grid-column: span 3; height: 50px; resize: none;"></textarea>

                <label class="jobs-label">Order No. & Date</label>
                <input type="text" id="jobOrderRef" class="jobs-input" style="grid-column: span 3;">

                <label class="jobs-label">Exp. Delivery Date</label>
                <input type="date" id="jobExpDate" class="jobs-input" style="grid-column: span 3;">

                <label class="jobs-label">Job Incharge</label>
                <select id="jobIncharge" class="jobs-input" style="grid-column: span 3;">
                    <option value="">Select Incharge</option>
                </select>

                <label class="jobs-label">Estimated Cost</label>
                <input type="number" id="jobEstCost" class="jobs-input" value="0">
                
                <label class="jobs-label" style="text-align: right;">Value of Job</label>
                <input type="number" id="jobValue" class="jobs-input" value="0">

                <label class="jobs-label">Job Completed</label>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="jobIsCompleted" style="width: 16px; height: 16px; cursor: pointer;">
                    <span class="jobs-label">Completion Date</span>
                    <input type="date" id="jobCompDate" class="jobs-input" style="flex: 1;">
                </div>

                <label class="jobs-label">Delivery Ref. & Dt</label>
                <input type="text" id="jobDelRef" class="jobs-input" style="grid-column: span 3;">
            </div>

            <!-- Right Side: Customer Info -->
            <div style="width: 350px; display: flex; flex-direction: column; gap: 8px;">
                <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 1px solid #1e3a8a; padding-bottom: 2px; text-transform: uppercase;">Customer Information</div>
                <div style="display: grid; grid-template-columns: 80px 1fr; gap: 8px; padding: 10px; border: 1px solid #e2e8f0; border-radius: 4px;">
                    <label class="jobs-label">Code</label>
                    <div style="position: relative;">
                        <input type="text" id="jobCustCode" class="jobs-input" placeholder="Type to search..." autocomplete="off">
                        <div id="jobCustSuggest" class="jobs-suggest"></div>
                    </div>

                    <label class="jobs-label">Name</label>
                    <input type="text" id="jobCustName" class="jobs-input" readonly style="background: #f1f5f9;">

                    <label class="jobs-label">Contact</label>
                    <input type="text" id="jobCustContact" class="jobs-input" readonly style="background: #f1f5f9;">

                    <label class="jobs-label">Address</label>
                    <textarea id="jobCustAddress" class="jobs-input" style="height: 60px; resize: none; background: #f1f5f9;" readonly></textarea>

                    <label class="jobs-label">Telephone</label>
                    <input type="text" id="jobCustPhone" class="jobs-input" readonly style="background: #f1f5f9;">
                </div>

                <label class="jobs-label" style="margin-top: 5px;">Remarks</label>
                <textarea id="jobRemarks" class="jobs-input" style="height: 45px; resize: none;"></textarea>
            </div>
        </div>
    </div>

    <style>
        .jobs-btn {
            height: 28px;
            min-width: 70px;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #cbd5e0;
            background: white;
            transition: all 0.2s;
        }
        .jobs-add { color: #16a34a; }
        .jobs-add:hover { background: #f0fdf4; border-color: #16a34a; }
        .jobs-save { color: #1F4E79; }
        .jobs-save:hover { background: #eff6ff; border-color: #1F4E79; }
        .jobs-cancel { color: #64748b; }
        .jobs-cancel:hover { background: #f8fafc; border-color: #64748b; }
        .jobs-print { color: #0891b2; }
        .jobs-print:hover { background: #ecfeff; border-color: #0891b2; }
        .jobs-delete { color: #ef4444; border-color: #ef4444; }
        .jobs-delete:hover { background: #fef2f2; }

        .jobs-label { font-size: 11px; font-weight: 600; color: #334155; }
        .jobs-input {
            height: 24px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            padding: 0 6px;
            font-size: 12px;
            outline: none;
            width: 100%;
        }
        .jobs-input:focus { border-color: #1e3a8a; }
        
        textarea.jobs-input { padding: 4px 6px; }

        #jobListBody tr { cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        #jobListBody tr:hover { background: #f8fafc; }
        #jobListBody tr.active { background: #eff6ff; color: #1e3a8a; font-weight: 700; }
        #jobListBody td { padding: 5px 8px; border: 1px solid #e2e8f0; }

        .jobs-suggest {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: white;
            border: 1px solid #cbd5e0;
            border-radius: 0 0 4px 4px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .jobs-suggest div {
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .jobs-suggest div:hover { background: #f1f5f9; }
    </style>
</div>
