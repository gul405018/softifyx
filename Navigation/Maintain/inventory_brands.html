<div id="brandsMaintenanceContainer" data-module="Inventory Brands" style="width: 500px; height: 350px; background: #f8fafc; display: flex; flex-direction: column; padding: 15px; font-family: 'Segoe UI', sans-serif; gap: 20px; border-radius: 8px;">
    
    <!-- Top Row: Header (Left) and Buttons (Right) -->
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
        <div style="font-size: 24px; font-weight: bold; font-style: italic; color: #475569; text-shadow: 2px 2px 2px rgba(0,0,0,0.1); background: #e2e8f0; padding: 5px 20px; border-radius: 4px; border-bottom: 2px solid #cbd5e0;">
            Inventory Brands
        </div>
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <!-- Price List Button (Single) -->
            <button class="brand-btn brand-btn-secondary" onclick="alert('Brand Price List logic coming soon...')">
                <i class="fas fa-print"></i>
                <span>Price Lists</span>
            </button>
            
            <!-- Main Actions Group -->
            <div style="display: flex; gap: 2px; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden; background: white; padding: 2px;">
                <button class="brand-btn brand-btn-main" onclick="resetBrandForm(true)">
                    <i class="fas fa-file-alt"></i>
                    <span>Add</span>
                </button>
                <div style="width: 1px; background: #e2e8f0;"></div>
                <button class="brand-btn brand-btn-main" onclick="saveBrand()">
                    <i class="fas fa-check-circle"></i>
                    <span>Save</span>
                </button>
                <div style="width: 1px; background: #e2e8f0;"></div>
                <button class="brand-btn brand-btn-danger" onclick="deleteBrand()">
                    <i class="fas fa-times-circle"></i>
                    <span>Cancel</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Row: List (Left) and Input (Right) -->
    <div style="display: flex; gap: 20px; flex: 1;">
        <!-- Brand Navigation Listbox -->
        <div style="width: 150px; display: flex; flex-direction: column;">
            <select id="brandMaintList" size="10" style="width: 100%; height: 100%; border: 2px inset #fff; outline: none; border-radius: 0; font-size: 13px; box-shadow: inset 1px 1px 3px rgba(0,0,0,0.2);" onchange="onBrandMaintSelect(this.value)"></select>
        </div>
        
        <!-- Brand Name Input Area -->
        <div style="flex: 1; display: flex; align-items: flex-end; padding-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                <label style="font-size: 14px; font-weight: 600; font-style: italic; color: #64748b; white-space: nowrap;">Brand Name</label>
                <input type="text" id="brandMaintName" autocomplete="off" style="flex: 1; height: 30px; border: 1px solid #cbd5e0; outline: none; padding: 0 10px; font-size: 14px; border-radius: 2px; box-shadow: inset 1px 1px 2px rgba(0,0,0,0.05);" disabled>
            </div>
        </div>
    </div>

    <style>
        .brand-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 5px 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            min-width: 65px;
            transition: all 0.2s;
        }
        .brand-btn i { font-size: 16px; }
        .brand-btn span { font-size: 10px; font-weight: 700; text-transform: uppercase; }
        
        .brand-btn-secondary { background: white; border: 1px solid #cbd5e0; border-radius: 4px; color: #475569; }
        .brand-btn-secondary:hover { background: #f1f5f9; border-color: #94a3b8; }
        
        .brand-btn-main { color: #1e293b; }
        .brand-btn-main:hover { background: #f8fafc; color: #2563eb; }
        .brand-btn-main i { color: #10b981; } /* Green theme for Add/Save like screenshot */
        
        .brand-btn-danger { color: #1e293b; }
        .brand-btn-danger:hover { background: #fef2f2; color: #dc2626; }
        .brand-btn-danger i { color: #ef4444; } /* Red for cancel */
        
        #brandMaintList option { padding: 4px 8px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
        #brandMaintList option:checked { background: #1e293b !important; color: white !important; }
    </style>
</div>
