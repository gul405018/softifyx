<div id="locationsMaintenanceContainer" data-module="Inventory Locations" style="width: 930px; height: 500px; background: white; display: flex; flex-direction: column; padding: 20px; font-family: 'Segoe UI', sans-serif; position: relative;">
    
    <!-- Section Header -->
    <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">Inventory Locations Maintenance</div>

    <!-- Top Row: Buttons (Right) -->
    <div style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 20px;">
        <div style="display: flex; gap: 8px;">
            <button class="loc-btn loc-btn-add" onclick="resetLocationForm(true)">
                <i class="fas fa-plus"></i> Add
            </button>
            <button class="loc-btn loc-btn-save" onclick="saveLocationMaint()">
                <i class="fas fa-save"></i> Save
            </button>
            <button class="loc-btn loc-btn-delete" onclick="deleteLocationMaint()">
                <i class="fas fa-trash"></i> Delete
            </button>
            <button class="loc-btn loc-btn-cancel" onclick="closeSecondaryModal()">Cancel</button>
        </div>
    </div>

    <!-- Bottom Row: List (Left) and Input (Right) -->
    <div style="display: flex; gap: 20px; flex: 1; overflow: hidden;">
        <!-- Location Navigation Listbox -->
        <div style="width: 300px; display: flex; flex-direction: column;">
            <select id="locationMaintList" size="15" 
                    style="width: 100%; height: 100%; border: 1px solid #cbd5e0; outline: none; border-radius: 4px; font-size: 13px; background: white;" 
                    onchange="onLocationMaintSelect(this.value)">
            </select>
        </div>
        
        <!-- Location Input Area -->
        <div style="flex: 1; padding: 20px; background: white; border-radius: 4px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 15px;">
            <div style="display: flex; flex-direction: column; gap: 6px;">
                <label style="font-size: 13px; font-weight: 700; color: #475569;">Location Name</label>
                <input type="text" id="locationMaintName" autocomplete="off" 
                       style="width: 100%; height: 35px; border: 1px solid #cbd5e0; outline: none; padding: 0 12px; font-size: 14px; border-radius: 4px;" 
                       disabled placeholder="Select or click Add...">
            </div>

            <div style="display: flex; flex-direction: column; gap: 6px; flex: 1;">
                <label style="font-size: 13px; font-weight: 700; color: #475569;">Description</label>
                <textarea id="locationMaintDesc" 
                          style="width: 100%; flex: 1; border: 1px solid #cbd5e0; outline: none; padding: 10px 12px; font-size: 14px; border-radius: 4px; resize: none; font-family: inherit;" 
                          disabled></textarea>
            </div>
        </div>
    </div>

    <style>
        .loc-btn {
            height: 30px;
            min-width: 80px;
            padding: 0 15px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .loc-btn-add { background: #22c55e; }
        .loc-btn-add:hover { background: #16a34a; }
        .loc-btn-save { background: #1e3a8a; }
        .loc-btn-save:hover { background: #1e40af; }
        .loc-btn-cancel { background: #94a3b8; color: white; }
        .loc-btn-cancel:hover { background: #64748b; }
        .loc-btn-delete { background: #ef4444; }
        .loc-btn-delete:hover { background: #dc2626; }
        
        #locationMaintList option { 
            padding: 10px 12px; 
            font-size: 13px; 
            border-bottom: 1px solid #f1f5f9; 
            color: #475569;
        }
        #locationMaintList option:checked { background: #eff6ff !important; color: #1e3a8a !important; font-weight: 700; border-left: 3px solid #1e3a8a; }
    </style>
</div>
