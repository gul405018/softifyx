<div id="invCOAContainer" data-module="Chart of Inventory" style="width: 930px; height: 750px; display: flex; flex-direction: column; gap: 5px; background: white; padding: 6px; font-family: 'Segoe UI', Arial, sans-serif; overflow-y: auto; border-radius: 4px;">

    <!-- Section 1: Inventory Categories -->
    <fieldset style="border: 1px solid #cbd5e0; padding: 6px; border-radius: 4px; flex: 1; display: flex; flex-direction: column; min-height: 140px;">
        <legend style="padding: 0 5px; font-size: 12px; font-weight: 700; color: #64748b;">Inventory Categories</legend>
        <div style="display: flex; gap: 15px; height: 100%;">
            <!-- List -->
            <div style="width: 290px;">
                <select id="invMainList" size="7" style="width: 100%; height: 100%; border: 1px solid #cbd5e0; outline: none; font-size: 13px; border-radius: 2px;" onchange="onInvMainSelect(this.value)"></select>
            </div>
            <!-- Fields & Buttons -->
            <div style="width: 590px; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="inv-btn inv-btn-chart" onclick="printInvChart('main')">Chart</button>
                    <button class="inv-btn inv-btn-chart" onclick="printInvPriceList('main')">Price List</button>
                    <button class="inv-btn inv-btn-add" onclick="resetInvMainForm(true)">Add</button>
                    <button class="inv-btn inv-btn-save" onclick="saveInvMain()">Save</button>
                    <button class="inv-btn inv-btn-delete" onclick="deleteInvMain()">Delete</button>
                    <button class="inv-btn inv-btn-cancel" onclick="resetInvMainForm()">Cancel</button>
                </div>
                <div style="display: grid; grid-template-columns: 120px 1fr; gap: 5px; align-items: center;">
                    <label class="inv-label">Main Category Code</label>
                    <input type="text" id="invMainCode" class="inv-input" style="width: 100px; text-align: center; font-weight: 700;" disabled>
                    
                    <label class="inv-label">Main Category Name</label>
                    <input type="text" id="invMainName" class="inv-input" style="font-weight: 700; text-align: center;" disabled>
                </div>
            </div>
        </div>
    </fieldset>

    <!-- Section 2: Sub Inventory Categories -->
    <fieldset style="border: 1px solid #cbd5e0; padding: 6px; border-radius: 4px; flex: 1; display: flex; flex-direction: column; min-height: 140px;">
        <legend style="padding: 0 5px; font-size: 12px; font-weight: 700; color: #64748b;">Sub Inventory Categories</legend>
        <div style="display: flex; gap: 15px; height: 100%;">
            <!-- List -->
            <div style="width: 290px;">
                <select id="invSubList" size="7" style="width: 100%; height: 100%; border: 1px solid #cbd5e0; outline: none; font-size: 13px; border-radius: 2px;" onchange="onInvSubSelect(this.value)"></select>
            </div>
            <!-- Fields & Buttons -->
            <div style="width: 590px; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="inv-btn inv-btn-chart" onclick="printInvChart('sub')">Chart</button>
                    <button class="inv-btn inv-btn-chart" onclick="printInvPriceList('sub')">Price List</button>
                    <button class="inv-btn inv-btn-add" onclick="resetInvSubForm(true)">Add</button>
                    <button class="inv-btn inv-btn-save" onclick="saveInvSub()">Save</button>
                    <button class="inv-btn inv-btn-delete" onclick="deleteInvSub()">Delete</button>
                    <button class="inv-btn inv-btn-cancel" onclick="resetInvSubForm()">Cancel</button>
                </div>
                <div style="display: grid; grid-template-columns: 120px 1fr; gap: 5px; align-items: center;">
                    <label class="inv-label">Sub Category Code</label>
                    <input type="text" id="invSubCode" class="inv-input" style="width: 120px; text-align: center; font-weight: 700;" disabled>
                    
                    <label class="inv-label">Sub Category Name</label>
                    <input type="text" id="invSubName" class="inv-input" style="font-weight: 700; text-align: center;" disabled>
                </div>
            </div>
        </div>
    </fieldset>

    <!-- Section 3: List of Inventory Items -->
    <fieldset style="border: 1px solid #cbd5e0; padding: 6px; border-radius: 4px; flex: 2; display: flex; flex-direction: column; min-height: 250px;">
        <legend style="padding: 0 5px; font-size: 12px; font-weight: 700; color: #64748b;">List of Inventory Items</legend>
        <div style="display: flex; gap: 15px; height: 100%;">
            <!-- List -->
            <div style="width: 290px;">
                <select id="invItemList" size="12" style="width: 100%; height: 100%; border: 1px solid #cbd5e0; outline: none; font-size: 13px; border-radius: 2px;" onchange="onInvItemSelect(this.value)"></select>
            </div>
            <!-- Fields & Buttons -->
            <div style="width: 590px; display: flex; flex-direction: column; gap: 4px;">
                <div style="display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 5px;">
                    <button class="inv-btn inv-btn-chart">Chart</button>
                    <button class="inv-btn inv-btn-chart">Price List</button>
                    <button class="inv-btn inv-btn-chart" onclick="findInvItem()"><i class="fas fa-search"></i> Find</button>
                    <button class="inv-btn inv-btn-add" onclick="resetInvItemForm(true)">Add</button>
                    <button class="inv-btn inv-btn-save" onclick="saveInvItem()">Save</button>
                    <button class="inv-btn inv-btn-delete" onclick="deleteInvItem()">Delete</button>
                    <button class="inv-btn inv-btn-cancel" onclick="resetInvItemForm()">Cancel</button>
                </div>
                
                <div style="display: grid; grid-template-columns: 120px 1fr; gap: 4px; align-items: center;">
                    <label class="inv-label">Item Code</label>
                    <input type="text" id="invItemCode" class="inv-input" style="width: 200px; text-align: center; font-weight: 700;" disabled>
                    
                    <label class="inv-label">Item Name</label>
                    <input type="text" id="invItemName" class="inv-input" style="font-weight: 700; text-align: center;" disabled>
                    
                    <label class="inv-label">Item Description</label>
                    <input type="text" id="invItemDesc" class="inv-input" disabled>
                </div>

                <div style="display: grid; grid-template-columns: 120px 1fr 100px 1fr; gap: 4px; align-items: center;">
                    <label class="inv-label">Brand Name</label>
                    <div style="display: flex; gap: 2px;">
                        <select id="invItemBrand" class="inv-input" style="flex: 1; background: white;" disabled>
                            <option value="">None</option>
                        </select>
                        <button class="inv-btn" style="min-width: 25px; padding: 0 5px;" onclick="manageBrands()">..</button>
                    </div>
                    <label class="inv-label" style="text-align: right; padding-right: 5px;">Rack No.</label>
                    <input type="text" id="invItemRack" class="inv-input" disabled>
                </div>

                <div style="display: grid; grid-template-columns: 120px 1fr 100px 1fr; gap: 4px; align-items: center;">
                    <label class="inv-label">Purchase Price</label>
                    <input type="number" id="invItemPurchasePrice" class="inv-input" style="text-align: center;" disabled>
                    <label class="inv-label" style="text-align: right; padding-right: 5px;">Selling Price</label>
                    <input type="number" id="invItemSellingPrice" class="inv-input" style="text-align: center;" disabled>
                </div>

                <div style="display: grid; grid-template-columns: 120px 1fr 100px 1fr; gap: 4px; align-items: center;">
                    <label class="inv-label">Measurement Unit</label>
                    <select id="invItemUnit" class="inv-input" style="background: white;" disabled>
                        <option value="Pcs">Pcs</option>
                        <option value="Kgs">Kgs</option>
                        <option value="Nos">Nos</option>
                        <option value="Boxes">Boxes</option>
                        <option value="Feet">Feet</option>
                        <option value="Meter">Meter</option>
                    </select>
                    <label class="inv-label" style="text-align: right; padding-right: 5px;">Quantity/Piece</label>
                    <input type="number" id="invItemQtyPerPiece" class="inv-input" style="text-align: center;" disabled>
                </div>

                <div style="display: grid; grid-template-columns: 120px 1fr 100px 1fr; gap: 4px; align-items: center;">
                    <label class="inv-label">Sales Tax Rate</label>
                    <div style="display: flex; align-items: center; gap: 4px;">
                        <input type="number" id="invItemTaxRate" class="inv-input" style="text-align: center;" disabled>
                        <span style="font-size: 11px; font-weight: 700;">%</span>
                    </div>
                    <div></div>
                    <div style="display: flex; gap: 15px; font-size: 10px; font-weight: 600;">
                        <label style="display: flex; align-items: center; gap: 3px;"><input type="radio" name="taxType" value="Percent" checked disabled> Percent</label>
                        <label style="display: flex; align-items: center; gap: 3px;"><input type="radio" name="taxType" value="Amount" disabled> Amount</label>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 120px 1fr; gap: 4px; align-items: center;">
                    <label class="inv-label">Valuation Method</label>
                    <div style="display: flex; gap: 15px; font-size: 10px; font-weight: 600;">
                        <label style="display: flex; align-items: center; gap: 3px;"><input type="radio" name="costValuation" value="Weighted Average" checked disabled> Weighted Average Price</label>
                        <label style="display: flex; align-items: center; gap: 3px;"><input type="radio" name="costValuation" value="Manual" disabled> Manual Valuation Cost</label>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 120px 1fr 100px 1fr; gap: 4px; align-items: center;">
                    <label class="inv-label">Valuation Cost</label>
                    <input type="number" id="invItemValuationCost" class="inv-input" style="text-align: center;" disabled>
                    <label class="inv-label" style="text-align: right; padding-right: 5px;">Order Quantity</label>
                    <input type="number" id="invItemOrderQty" class="inv-input" style="text-align: center;" disabled>
                </div>

                <div style="display: flex; align-items: center; gap: 10px; margin-top: 1px;">
                    <label class="inv-label" style="min-width: 120px;">Inactive Item</label>
                    <input type="checkbox" id="invItemInactive" disabled>
                </div>
            </div>
        </div>
    </fieldset>

    <style>
        .inv-btn {
            height: 30px;
            min-width: 70px;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .inv-btn-chart { background: #0891b2; }
        .inv-btn-chart:hover { background: #0e7490; }
        .inv-btn-add { background: #22c55e; }
        .inv-btn-add:hover { background: #16a34a; }
        .inv-btn-save { background: #1e3a8a; }
        .inv-btn-save:hover { background: #1e40af; }
        .inv-btn-cancel { background: #94a3b8; }
        .inv-btn-cancel:hover { background: #64748b; }
        .inv-btn-delete { background: #ef4444; }
        .inv-btn-delete:hover { background: #dc2626; }
        
        .inv-label { font-size: 10px; font-weight: 700; color: #475569; text-transform: uppercase; }
        .inv-input {
            height: 28px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            padding: 0 8px;
            font-size: 12px;
            outline: none;
            width: 100%;
            transition: all 0.2s;
            background: white;
        }
        .inv-input:focus:not(:disabled) { border-color: #1e3a8a; background: #eff6ff; }
        .inv-input:disabled { background: #f8fafc; color: #64748b; }
        
        fieldset { border: 1px solid #e2e8f0 !important; background: #fff; margin-bottom: 10px; padding: 15px !important; }
        legend { font-size: 11px; font-weight: 800; color: #1e3a8a; text-transform: uppercase; border-bottom: 2px solid #1e3a8a; padding: 0 10px 4px 10px !important; margin-bottom: 10px; }
        
        select option { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #475569; }
        select option:checked { background: #eff6ff !important; color: #1e3a8a !important; font-weight: 700; border-left: 3px solid #1e3a8a; }
    </style>
</div>
