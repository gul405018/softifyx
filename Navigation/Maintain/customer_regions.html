<div id="regionsContainer" data-module="Customer Regions" style="width: 930px; height: 550px; display: flex; flex-direction: column; gap: 15px; background: white; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; position: relative;">

    <!-- Section 1: Main Region -->
    <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; padding: 15px;">
        <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">Main Region</div>
        
        <div style="display: flex; gap: 20px; flex: 1; align-items: stretch;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden;">
                <select id="mainRegionList" size="2" style="width: 100%; flex: 1; border: none; outline: none; font-size: 13px; background: white;" onchange="onMainRegionSelect(this.value)"></select>
            </div>
            
            <!-- Right: Fields & Buttons -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 15px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 15px; background: white;">
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="coa-btn coa-btn-add" onclick="resetMainRegionForm(true)">Add</button>
                    <button class="coa-btn coa-btn-save" onclick="saveMainRegion()">Save</button>
                    <button class="coa-btn coa-btn-delete" onclick="deleteMainRegion()">Delete</button>
                    <button class="coa-btn coa-btn-cancel" onclick="resetMainRegionForm()">Cancel</button>
                </div>
                
                <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                    <label style="font-size: 13px; font-weight: 700; color: #475569; white-space: nowrap;">Main Region</label>
                    <input type="text" id="mainRegionName" style="flex: 1; height: 32px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 12px; font-size: 14px; outline: none;" placeholder="Enter Region Name" disabled>
                </div>
            </div>
        </div>
    </div>


    <!-- Section 2: Sub Region -->
    <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; border-radius: 4px; overflow: hidden; padding: 15px;">
        <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">Sub Region</div>
        
        <div style="display: flex; gap: 20px; flex: 1; align-items: stretch;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden;">
                <select id="subRegionList" size="2" style="width: 100%; flex: 1; border: none; outline: none; font-size: 13px; background: white;" onchange="onSubRegionSelect(this.value)"></select>
            </div>
            
            <!-- Right: Fields & Buttons -->
            <div style="flex: 1; display: flex; flex-direction: column; gap: 15px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 15px; background: white;">
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="coa-btn coa-btn-add" onclick="resetSubRegionForm(true)">Add</button>
                    <button class="coa-btn coa-btn-save" onclick="saveSubRegion()">Save</button>
                    <button class="coa-btn coa-btn-delete" onclick="deleteSubRegion()">Delete</button>
                    <button class="coa-btn coa-btn-cancel" onclick="resetSubRegionForm()">Cancel</button>
                </div>
                
                <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                    <label style="font-size: 13px; font-weight: 700; color: #475569; white-space: nowrap;">Sub Region</label>
                    <input type="text" id="subRegionName" style="flex: 1; height: 32px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 12px; font-size: 14px; outline: none;" placeholder="Enter Sub Region Name" disabled>
                </div>
            </div>
        </div>
    </div>

    <style>
        .coa-btn {
            height: 30px;
            min-width: 80px;
            padding: 0 15px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .coa-btn-add { background: #22c55e; }
        .coa-btn-add:hover { background: #16a34a; }
        .coa-btn-save { background: #1e3a8a; }
        .coa-btn-save:hover { background: #1e40af; }
        .coa-btn-cancel { background: #94a3b8; }
        .coa-btn-cancel:hover { background: #64748b; }
        .coa-btn-delete { background: #ef4444; }
        .coa-btn-delete:hover { background: #dc2626; }
        
        select option { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #475569; }
        select option:checked { background: #eff6ff !important; color: #1e3a8a !important; font-weight: 700; border-left: 3px solid #1e3a8a; }
    </style>
</div>
