<div class="modular-modal-content" style="padding: 15px; font-family: 'Segoe UI', sans-serif; background: #f1f5f9;">
    <div style="background: #cbd5e0; padding: 5px 15px; margin: -15px -15px 15px -15px; border-bottom: 1px solid #94a3b8;">
        <h1 style="margin: 0; font-size: 16px; color: #475569; letter-spacing: 0.5px; font-style: italic; font-weight: 800;">REGIONS</h1>
    </div>

    <!-- Main Region -->
    <div style="background: white; border: 1px solid #cbd5e0; border-radius: 6px; padding: 10px; margin-bottom: 15px;">
        <div style="position: relative; margin-top: -20px; margin-left: 10px; background: white; padding: 0 5px; display: inline-block; font-size: 11px; color: #1F4E79; font-weight: 700;">Main Region</div>
        <div style="display: flex; gap: 15px;">
            <select id="mainRegionList" size="5" style="flex: 1; border: 1px solid #cbd5e0; border-radius: 4px; outline: none;" onchange="onMainRegionSelect(this.value)"></select>
            <div style="flex: 1.5; display: flex; flex-direction: column; justify-content: center; gap: 10px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn coa-add" onclick="resetMainRegionForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveMainRegion()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetMainRegionForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteMainRegion()">Delete</button>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label class="coa-label" style="white-space:nowrap;">Main Region</label>
                    <input type="text" id="mainRegionName" class="coa-input" disabled>
                </div>
            </div>
        </div>
    </div>

    <!-- Sub Region -->
    <div style="background: white; border: 1px solid #cbd5e0; border-radius: 6px; padding: 10px;">
        <div style="position: relative; margin-top: -20px; margin-left: 10px; background: white; padding: 0 5px; display: inline-block; font-size: 11px; color: #1F4E79; font-weight: 700;">Sub Region</div>
        <div style="display: flex; gap: 15px;">
            <select id="subRegionList" size="5" style="flex: 1; border: 1px solid #cbd5e0; border-radius: 4px; outline: none;" onchange="onSubRegionSelect(this.value)"></select>
            <div style="flex: 1.5; display: flex; flex-direction: column; justify-content: center; gap: 10px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn coa-add" onclick="resetSubRegionForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveSubRegion()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetSubRegionForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteSubRegion()">Delete</button>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label class="coa-label" style="white-space:nowrap;">Sub Region</label>
                    <input type="text" id="subRegionName" class="coa-input" disabled>
                </div>
            </div>
        </div>
    </div>

    <style>
        .coa-btn { background: #ffffff; border: 1px solid #ccc; padding: 2px 10px; font-size: 11px; font-weight: 600; cursor: pointer; min-width: 55px; border-radius: 4px; height: 26px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .coa-add { color: #28a745; }
        .coa-save { color: #1F4E79; }
        .coa-cancel { color: #dc3545; }
        .coa-delete { color: #334155; }
        .coa-label { font-size: 12px; font-weight: 600; color: #475569; }
        .coa-input { height: 28px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 8px; font-size: 13px; width: 100%; }
        .coa-input:disabled { background: #f8fafc; }
    </style>
</div>
