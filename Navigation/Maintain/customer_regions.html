<div id="regionsContainer" data-module="Customer Regions" style="height: 600px; width: 100%; display: flex; flex-direction: column; gap: 8px; background: white; padding: 12px; overflow: hidden; border-radius: 4px;">

    <!-- Section 1: Main Region -->
    <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 10px; border-radius: 4px; overflow: hidden;">
        <div class="form-section-header">Main Region</div>
        <div style="display: flex; gap: 15px; flex: 1; overflow: hidden;">
            <!-- Left: List -->
            <div style="flex: 0.8; display: flex; flex-direction: column;">
                <select id="mainRegionList" size="10" class="coa-input" style="flex: 1;" onchange="onMainRegionSelect(this.value)"></select>
            </div>
            <!-- Right: Actions & Fields -->
            <div style="flex: 1.2; display: flex; flex-direction: column; gap: 12px; justify-content: center;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn coa-add" onclick="resetMainRegionForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveMainRegion()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetMainRegionForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteMainRegion()">Delete</button>
                </div>
                <div style="display: grid; grid-template-columns: 120px 1fr; gap: 8px;">
                    <label class="coa-label">Main Region Name</label>
                    <input type="text" id="mainRegionName" class="coa-input" placeholder="Enter Region Name" disabled>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 2: Sub Region -->
    <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 10px; border-radius: 4px; overflow: hidden;">
        <div class="form-section-header">Sub Region</div>
        <div style="display: flex; gap: 15px; flex: 1; overflow: hidden;">
            <!-- Left: List -->
            <div style="flex: 0.8; display: flex; flex-direction: column;">
                <select id="subRegionList" size="10" class="coa-input" style="flex: 1;" onchange="onSubRegionSelect(this.value)"></select>
            </div>
            <!-- Right: Actions & Fields -->
            <div style="flex: 1.2; display: flex; flex-direction: column; gap: 12px; justify-content: center;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn coa-add" onclick="resetSubRegionForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveSubRegion()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetSubRegionForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteSubRegion()">Delete</button>
                </div>
                <div style="display: grid; grid-template-columns: 120px 1fr; gap: 8px;">
                    <label class="coa-label">Sub Region Name</label>
                    <input type="text" id="subRegionName" class="coa-input" placeholder="Enter Sub Region Name" disabled>
                </div>
            </div>
        </div>
    </div>
</div>
