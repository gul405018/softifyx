<div class="modular-modal-content" style="padding: 15px; font-family: 'Segoe UI', sans-serif; background: #f1f5f9; min-width: 650px;">
    <div style="background: #cbd5e0; padding: 5px 15px; margin: -15px -15px 15px -15px; border-bottom: 1px solid #94a3b8;">
        <h1 style="margin: 0; font-size: 16px; color: #475569; letter-spacing: 0.5px; font-style: italic; font-weight: 800;">EMPLOYEES</h1>
    </div>

    <div style="display: flex; gap: 20px; align-items: flex-start; margin-top: 10px;">
        <!-- Left Side: List -->
        <select id="employeeList" size="15" style="width: 250px; height: 350px; border: 1px solid #cbd5e0; border-radius: 4px; outline: none; padding: 5px;" onchange="onEmployeeSelect(this.value)"></select>

        <!-- Right Side: Detail Form -->
        <div style="flex: 1; background: white; border: 1px solid #cbd5e0; border-radius: 6px; padding: 15px;">
            <!-- Buttons -->
            <div style="display: flex; justify-content: flex-end; gap: 4px; margin-bottom: 20px;">
                <button class="coa-btn coa-add" onclick="resetEmployeeForm(true)">Add</button>
                <button class="coa-btn coa-save" onclick="saveEmployee()">Save</button>
                <button class="coa-btn coa-cancel" onclick="resetEmployeeForm()">Cancel</button>
                <button class="coa-btn coa-delete" onclick="deleteEmployee()">Delete</button>
            </div>

            <!-- Fields -->
            <div style="display: grid; grid-template-columns: 100px 1fr 80px 120px; gap: 8px 10px; align-items: center;">
                <label class="coa-label">Name</label>
                <input type="text" id="empName" class="coa-input" style="grid-column: span 3; font-weight: 700; text-align: center;" disabled>

                <label class="coa-label">Father Name</label>
                <input type="text" id="empFatherName" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Address</label>
                <input type="text" id="empAddress" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Telephone</label>
                <input type="text" id="empTel" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">E-Mail</label>
                <input type="text" id="empEmail" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">N.I.C. No.</label>
                <input type="text" id="empNIC" class="coa-input" disabled>
                <label class="coa-label" style="text-align: right;">Date of Birth</label>
                <input type="date" id="empDOB" class="coa-input" disabled>

                <label class="coa-label">Joining Date</label>
                <input type="date" id="empJoining" class="coa-input" disabled>
                <label class="coa-label" style="text-align: right;">Salary</label>
                <input type="number" id="empSalary" class="coa-input" disabled>

                <label class="coa-label">Designation</label>
                <input type="text" id="empDesignation" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Department</label>
                <select id="empDept" class="coa-input" style="grid-column: span 3;" disabled>
                    <option value="None">None</option>
                    <option value="Sales">Sales</option>
                    <option value="Account">Account</option>
                    <option value="Purchase">Purchase</option>
                    <option value="Admin">Admin</option>
                </select>

                <label class="coa-label">Remarks</label>
                <input type="text" id="empRemarks" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Reference</label>
                <input type="text" id="empReference" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Job Left</label>
                <input type="checkbox" id="empJobLeft" style="width: 20px; height: 20px;" disabled>
                <label class="coa-label" style="text-align: right;">Leaving Date</label>
                <input type="date" id="empLeavingDate" class="coa-input" disabled>
            </div>
        </div>
    </div>

    <style>
        .coa-btn { background: #ffffff; border: 1px solid #ccc; padding: 2px 10px; font-size: 11px; font-weight: 600; cursor: pointer; min-width: 55px; border-radius: 4px; height: 26px; }
        .coa-add { color: #28a745; }
        .coa-save { color: #1F4E79; }
        .coa-cancel { color: #dc3545; }
        .coa-delete { color: #334155; }
        .coa-label { font-size: 11px; font-weight: 600; color: #475569; font-style: italic; }
        .coa-input { height: 28px; border: 1px solid #cbd5e0; border-radius: 3px; padding: 0 8px; font-size: 13px; width: 100%; border-bottom: 1px solid #94a3b8; }
        .coa-input:focus { background: #f8fafc; border-bottom: 2px solid #1F4E79; }
        .coa-input:disabled { background: transparent; border-bottom: 1px solid #e2e8f0; color: #1e293b; }
    </style>
</div>
