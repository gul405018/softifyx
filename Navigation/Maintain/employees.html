<div id="employeesContainer" data-module="Employees"
    style="width: 100%; min-height: 600px; display: flex; flex-direction: column; background: white; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; border: 1px solid #ccc;">

    <!-- Legacy Gray Header -->
    <div style="background: #EBEBEB; padding: 5px 15px; border-bottom: 1px solid #999; display: flex; align-items: center;">
        <span style="font-size: 18px; font-weight: bold; font-style: italic; color: #666; letter-spacing: 1px; text-transform: uppercase;">Employees</span>
    </div>

    <div style="display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden;">
        <!-- Left: Employee List Sidebar -->
        <div style="width: 320px; display: flex; flex-direction: column; border: 1px solid #999; background: white;">
            <select id="employeeList" size="20" 
                style="width: 100%; flex: 1; border: none; outline: none; font-size: 13px; padding: 2px;"
                onchange="onEmployeeSelect(this.value)">
                <!-- Dynamically populated -->
            </select>
        </div>

        <!-- Right: Detail Form Area -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
            
            <!-- Legacy Icon Buttons -->
            <div style="display: flex; justify-content: flex-end; gap: 0; border: 1px solid #999; width: fit-content; align-self: flex-end; background: #f0f0f0;">
                <button class="legacy-btn" id="employeeAddBtn" onclick="resetEmployeeForm(true)">
                    <i class="fas fa-file" style="color: #666;"></i>
                    <span>Add</span>
                </button>
                <button class="legacy-btn" id="employeeSaveBtn" onclick="saveEmployee()">
                    <i class="fas fa-check" style="color: #28a745;"></i>
                    <span>Save</span>
                </button>
                <button class="legacy-btn" id="employeeCancelBtn" onclick="resetEmployeeForm()">
                    <i class="fas fa-times-circle" style="color: #dc3545;"></i>
                    <span>Cancel</span>
                </button>
                <button class="legacy-btn" id="employeeDeleteBtn" onclick="deleteEmployee()">
                    <i class="fas fa-trash-alt" style="color: #555;"></i>
                    <span>Delete</span>
                </button>
            </div>

            <!-- Table-Grid Form -->
            <div class="legacy-form-grid">
                <div class="legacy-row">
                    <div class="legacy-label">Name</div>
                    <div class="legacy-input-cell">
                        <input type="text" id="employeeName" class="legacy-input" placeholder="*" disabled>
                    </div>
                </div>
                <div class="legacy-row">
                    <div class="legacy-label">Father Name</div>
                    <div class="legacy-input-cell">
                        <input type="text" id="employeeFatherName" class="legacy-input" disabled>
                    </div>
                </div>
                <div class="legacy-row">
                    <div class="legacy-label">Address</div>
                    <div class="legacy-input-cell">
                        <textarea id="employeeAddress" class="legacy-input" style="height: 50px; padding: 4px;" disabled></textarea>
                    </div>
                </div>
                <div class="legacy-row">
                    <div class="legacy-label">Telephone</div>
                    <div class="legacy-input-cell">
                        <input type="text" id="employeeTelephone" class="legacy-input" disabled>
                    </div>
                </div>
                <div class="legacy-row">
                    <div class="legacy-label">E-Mail</div>
                    <div class="legacy-input-cell">
                        <input type="email" id="employeeEmail" class="legacy-input" disabled>
                    </div>
                </div>
                
                <!-- Split Row for NIC and DOB -->
                <div class="legacy-row">
                    <div class="legacy-label">N.I.C. No.</div>
                    <div class="legacy-input-cell" style="display: flex; align-items: center; border-right: none;">
                        <input type="text" id="employeeNIC" class="legacy-input" style="flex: 1;" disabled>
                        <div class="legacy-label" style="border-left: 1px solid #999; border-bottom: none; width: 120px;">Date of Birth</div>
                        <input type="date" id="employeeDOB" class="legacy-input" style="flex: 1; border-left: 1px solid #999;" disabled>
                    </div>
                </div>

                <!-- Split Row for Joining Date and Salary -->
                <div class="legacy-row">
                    <div class="legacy-label">Joining Date</div>
                    <div class="legacy-input-cell" style="display: flex; align-items: center; border-right: none;">
                        <input type="date" id="employeeJoiningDate" class="legacy-input" style="flex: 1;" disabled>
                        <div class="legacy-label" style="border-left: 1px solid #999; border-bottom: none; width: 80px;">Salary</div>
                        <input type="number" id="employeeSalary" class="legacy-input" style="flex: 1; border-left: 1px solid #999;" disabled>
                    </div>
                </div>

                <div class="legacy-row">
                    <div class="legacy-label">Designation</div>
                    <div class="legacy-input-cell">
                        <input type="text" id="employeeDesignation" class="legacy-input" disabled>
                    </div>
                </div>

                <div class="legacy-row">
                    <div class="legacy-label">Department</div>
                    <div class="legacy-input-cell">
                        <select id="employeeDepartment" class="legacy-input" style="background: white;" disabled>
                            <option value="">Select Department</option>
                            <option value="Admin">Admin</option>
                            <option value="Sales">Sales</option>
                            <option value="Accounts">Accounts</option>
                            <option value="Purchase">Purchase</option>
                            <option value="Store">Store</option>
                            <option value="HR">HR</option>
                        </select>
                    </div>
                </div>

                <div class="legacy-row">
                    <div class="legacy-label">Remarks</div>
                    <div class="legacy-input-cell">
                        <input type="text" id="employeeRemarks" class="legacy-input" disabled>
                    </div>
                </div>

                <div class="legacy-row">
                    <div class="legacy-label">Reference</div>
                    <div class="legacy-input-cell">
                        <input type="text" id="employeeReference" class="legacy-input" disabled>
                    </div>
                </div>

                <!-- Last Row for Job Left and Leaving Date -->
                <div class="legacy-row" style="border-bottom: 1px solid #999;">
                    <div class="legacy-label" style="display: flex; align-items: center; gap: 5px;">
                        Job Left <input type="checkbox" id="employeeJobLeft" onchange="document.getElementById('employeeLeavingDate').disabled = !this.checked">
                    </div>
                    <div class="legacy-input-cell" style="display: flex; align-items: center; justify-content: flex-end; gap: 10px; border-right: none; padding-right: 10px;">
                        <span class="legacy-label" style="border: none; width: auto;">Leaving Date</span>
                        <input type="date" id="employeeLeavingDate" class="legacy-input" style="width: 150px; border: 1px solid #999;" disabled>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .legacy-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 50px;
            background: #f0f0f0;
            border: none;
            border-right: 1px solid #999;
            cursor: pointer;
            transition: background 0.2s;
        }
        .legacy-btn:last-child { border-right: none; }
        .legacy-btn:hover { background: #e0e0e0; }
        .legacy-btn i { font-size: 18px; margin-bottom: 2px; }
        .legacy-btn span { font-size: 11px; font-weight: 600; color: #333; }

        .legacy-form-grid {
            display: flex;
            flex-direction: column;
            border: 1px solid #999;
            border-bottom: none;
        }
        .legacy-row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid #999;
            background: white;
        }
        .legacy-row:last-child { border-bottom: none; }
        
        .legacy-label {
            width: 130px;
            background: #fdfdfd;
            border-right: 1px solid #999;
            padding: 4px 8px;
            font-size: 13px;
            font-weight: bold;
            font-style: italic;
            color: #555;
            display: flex;
            align-items: center;
        }
        .legacy-input-cell {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .legacy-input {
            width: 100%;
            border: none;
            padding: 4px 8px;
            font-size: 13px;
            outline: none;
            background: transparent;
        }
        .legacy-input:disabled { background: #f9f9f9; color: #333; }
        .legacy-input:focus { background: #fffde7; }
        
        input[type="date"].legacy-input {
            padding: 2px 8px;
        }
    </style>
</div>
