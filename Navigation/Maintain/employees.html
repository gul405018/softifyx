<div id="employeesContainer" data-module="Employees"
    style="width: 930px; min-height: 600px; display: flex; flex-direction: column; gap: 15px; background: white; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; position: relative;">

    <!-- Section Header -->
    <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 5px;">Employees Maintenance</div>

    <div style="display: flex; gap: 20px; flex: 1; align-items: stretch;">
        <!-- Left: Employee List -->
        <div class="employees-sidebar" style="flex: 1.5; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 15px; border-radius: 4px; background: white;">
            <div style="font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 10px; text-transform: uppercase;">Employee List</div>
            <select id="employeeList" size="20"
                style="width: 100%; flex: 1; border: 1px solid #cbd5e0; outline: none; font-size: 13px; border-radius: 4px; background: white;"
                onchange="onEmployeeSelect(this.value)"></select>
        </div>

        <!-- Right: Employee Details -->
        <div style="flex: 2.5; display: flex; flex-direction: column; gap: 15px; border: 1px solid #e2e8f0; padding: 20px; border-radius: 4px; background: white;">
            <!-- Buttons Header -->
            <div style="display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 10px;">
                <button class="coa-btn coa-btn-add" id="empAddBtn" onclick="resetEmployeeForm(true)">Add</button>
                <button class="coa-btn coa-btn-save" id="empSaveBtn" onclick="saveEmployee()" disabled>Save</button>
                <button class="coa-btn coa-btn-delete" id="empDeleteBtn" onclick="deleteEmployee()" disabled>Delete</button>
                <button class="coa-btn coa-btn-cancel" id="empCancelBtn" onclick="resetEmployeeForm(false)">Cancel</button>
            </div>

            <!-- Fields Grid -->
            <div style="display: grid; grid-template-columns: 110px 1fr 110px 1fr; gap: 12px; align-content: start;">
                
                <label class="coa-label">Name</label>
                <input type="text" id="empName" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Father Name</label>
                <input type="text" id="empFatherName" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Address</label>
                <textarea id="empAddress" class="coa-input" style="grid-column: span 3; height: 50px; resize: none; padding-top: 6px;" disabled></textarea>

                <label class="coa-label">Telephone</label>
                <input type="text" id="empTelephone" class="coa-input" disabled>
                <label class="coa-label" style="text-align: right;">E-Mail</label>
                <input type="email" id="empEmail" class="coa-input" disabled>

                <label class="coa-label">N.I.C. No.</label>
                <input type="text" id="empNicNo" class="coa-input" disabled>
                <label class="coa-label" style="text-align: right;">Date of Birth</label>
                <input type="date" id="empDob" class="coa-input" disabled>

                <label class="coa-label">Joining Date</label>
                <input type="date" id="empJoiningDate" class="coa-input" disabled>
                <label class="coa-label" style="text-align: right;">Salary</label>
                <input type="number" id="empSalary" class="coa-input" value="0" disabled>

                <label class="coa-label">Designation</label>
                <input type="text" id="empDesignation" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Department</label>
                <select id="empDepartment" class="coa-input" style="grid-column: span 3;" disabled>
                    <option value="">-- Select Department --</option>
                </select>

                <label class="coa-label">Remarks</label>
                <textarea id="empRemarks" class="coa-input" style="grid-column: span 3; height: 40px; resize: none; padding-top: 6px;" disabled></textarea>

                <label class="coa-label">Reference</label>
                <input type="text" id="empReference" class="coa-input" style="grid-column: span 3;" disabled>

                <label class="coa-label">Job Left</label>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <input type="checkbox" id="empJobLeft" onchange="toggleLeavingDate(this.checked)" disabled>
                </div>
                <label class="coa-label" style="text-align: right;">Leaving Date</label>
                <input type="date" id="empLeavingDate" class="coa-input" disabled>
            </div>
        </div>
    </div>

    <style>
        .coa-btn {
            height: 30px;
            min-width: 80px;
            padding: 0 15px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .coa-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #cbd5e0 !important;
            color: #64748b !important;
        }

        .coa-btn-add { background: #22c55e; }
        .coa-btn-add:hover:not(:disabled) { background: #16a34a; }
        .coa-btn-save { background: #1e3a8a; }
        .coa-btn-save:hover:not(:disabled) { background: #1e40af; }
        .coa-btn-cancel { background: #94a3b8; }
        .coa-btn-cancel:hover:not(:disabled) { background: #64748b; }
        .coa-btn-delete { background: #ef4444; }
        .coa-btn-delete:hover:not(:disabled) { background: #dc2626; }

        .coa-label { font-size: 11px; font-weight: 700; color: #475569; align-self: center; }
        .coa-input {
            height: 30px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            padding: 0 10px;
            font-size: 13px;
            outline: none;
            width: 100%;
            transition: all 0.2s;
            background: white;
        }

        .coa-input:focus:not(:disabled) {
            border-color: #1e3a8a;
            background: #eff6ff;
        }

        .coa-input:disabled { background-color: #f8fafc; color: #64748b; }
        
        #employeeList option { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #475569; }
        #employeeList option:checked { background: #eff6ff !important; color: #1e3a8a !important; font-weight: 700; border-left: 3px solid #1e3a8a; }
    </style>
</div>
