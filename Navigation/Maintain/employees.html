<div id="employeesContainer" data-module="Employees"
    style="height: 600px; display: flex; flex-direction: column; gap: 4px; background: white; padding: 10px; font-family: 'Segoe UI', Arial, sans-serif; border-radius: 4px; overflow: hidden;">


    <!-- Section 1: Employee Category -->
    <div
        style="height: 140px; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 6px; border-radius: 4px;">
        <div
            style="font-size: 11px; font-weight: 700; color: #1F4E79; margin-bottom: 4px; text-transform: uppercase; border-bottom: 2px solid #1F4E79; padding-bottom: 1px;">
            Employee Category / Department</div>
        <div style="display: flex; gap: 10px; flex: 1; align-items: stretch;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column;">
                <select id="empCategoryList" size="5"
                    style="width: 100%; height: 95px; border: 1px solid #cbd5e0; outline: none; font-size: 12px; border-radius: 4px;"
                    onchange="onEmployeeCategorySelect(this.value)"></select>
            </div>

            <!-- Right: Fields & Buttons -->
            <div style="flex: 1.2; display: flex; flex-direction: column; gap: 6px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn coa-chart" onclick="printEmployees('type')">Chart</button>
                    <button class="coa-btn coa-add" onclick="resetEmployeeCategoryForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveEmployeeCategory()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetEmployeeCategoryForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteEmployeeCategory()">Delete</button>
                </div>
                <div
                    style="display: grid; grid-template-columns: 130px 1fr; gap: 6px 8px; align-content: start; margin-top: 2px; flex: 1;">
                    <label class="coa-label">Category Code</label>
                    <input type="text" id="empCategoryCode" class="coa-input" style="width: 90px;" disabled>

                    <label class="coa-label">Category Name</label>
                    <input type="text" id="empCategoryName" class="coa-input" disabled>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 2: List of Employees -->
    <div
        style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 6px; border-radius: 4px; overflow: hidden;">
        <div
            style="font-size: 11px; font-weight: 700; color: #1F4E79; margin-bottom: 4px; text-transform: uppercase; border-bottom: 2px solid #1F4E79; padding-bottom: 1px;">
            List of Employees</div>
        <div style="display: flex; gap: 10px; flex: 1; align-items: stretch; overflow: hidden;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <select id="employeeList" size="10"
                    style="width: 100%; flex: 1; border: 1px solid #cbd5e0; outline: none; font-size: 12px; border-radius: 4px;"
                    onchange="onEmployeeSelect(this.value)"></select>
            </div>

            <!-- Right: Detailed Fields -->
            <div style="flex: 1.2; display: flex; flex-direction: column; gap: 4px; overflow-y: auto; padding-right: 4px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn coa-chart" onclick="printEmployees('list')">Chart</button>
                    <button class="coa-btn coa-chart" style="background: #1F4E79 !important;"
                        onclick="findEmployee()"><i class="fas fa-search"></i> Find</button>
                    <button class="coa-btn coa-add" onclick="resetEmployeeForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveEmployee()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetEmployeeForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteEmployee()">Delete</button>
                </div>

                <div
                    style="display: grid; grid-template-columns: 90px 1fr 90px 1fr; gap: 4px 6px; align-content: start;">
                    <label class="coa-label">Employee Code</label>
                    <input type="text" id="empAccountCode" class="coa-input" style="grid-column: span 3; width: 110px;"
                        disabled>

                    <label class="coa-label">Employee Name</label>
                    <input type="text" id="empAccountName" class="coa-input" style="grid-column: span 3;" disabled>

                    <label class="coa-label">Contact Person</label>
                    <input type="text" id="empContactPerson" class="coa-input" style="grid-column: span 3;" disabled>

                    <label class="coa-label">Address</label>
                    <textarea id="empAddress" class="coa-input"
                        style="grid-column: span 3; height: 35px; resize: none; padding-top: 2px;" disabled></textarea>

                    <label class="coa-label">Region</label>
                    <div style="display: flex; gap: 4px;">
                        <select id="empRegion" class="coa-input" disabled onchange="loadSubRegionsEmp(this.value)">
                            <option value="">None</option>
                        </select>
                        <button class="small-manage-btn" onclick="manageRegions()">..</button>
                    </div>
                    <label class="coa-label" style="text-align: right;">Sub-Region</label>
                    <select id="empSubRegion" class="coa-input" disabled>
                        <option value="">None</option>
                    </select>

                    <label class="coa-label">Telephone</label>
                    <input type="text" id="empTelephone" class="coa-input" disabled>
                    <label class="coa-label" style="text-align: right;">Mobile</label>
                    <input type="text" id="empMobile" class="coa-input" disabled>

                    <label class="coa-label">Fax</label>
                    <input type="text" id="empFax" class="coa-input" disabled>
                    <label class="coa-label" style="text-align: right;">Website</label>
                    <input type="text" id="empWebsite" class="coa-input" disabled>

                    <label class="coa-label">E-Mail</label>
                    <input type="text" id="empEmail" class="coa-input" style="grid-column: span 3;" disabled>

                    <label class="coa-label">CNIC No.</label>
                    <input type="text" id="empStReg" class="coa-input" disabled placeholder="00000-0000000-0">
                    <label class="coa-label" style="text-align: right;">N.T.N No.</label>
                    <input type="text" id="empNtn" class="coa-input" disabled>

                    <label class="coa-label">Designation</label>
                    <div style="display: flex; gap: 4px;">
                        <select id="empSector" class="coa-input" disabled>
                            <option value="">None</option>
                        </select>
                        <button class="small-manage-btn" onclick="manageSectors()">..</button>
                    </div>
                    <label class="coa-label" style="text-align: right;">Supervisor</label>
                    <div style="display: flex; gap: 4px;">
                        <select id="empAccManager" class="coa-input" disabled>
                            <option value="">None</option>
                        </select>
                    </div>

                    <label class="coa-label">Basic Salary</label>
                    <input type="number" id="empCreditLimit" class="coa-input" value="0" disabled>
                    <label class="coa-label" style="text-align: right;">Join Date</label>
                    <input type="text" id="empCreditTerms" class="coa-input" value="2026-01-01" disabled>

                    <label class="coa-label">Remarks</label>
                    <textarea id="empRemarks" class="coa-input"
                        style="grid-column: span 3; height: 30px; resize: none; padding-top: 2px;" disabled></textarea>
                </div>
            </div>
        </div>
    </div>


    <style>
        .coa-btn {
            background: #ffffff;
            border: 1px solid #1F4E79;
            padding: 1px 8px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            min-width: 55px;
            border-radius: 4px;
            color: #1F4E79;
            transition: all 0.2s;
            height: 24px;
        }

        .coa-btn:hover { background: #f1f5f9; box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1); }
        .coa-btn:active { transform: translateY(1px); }

        .coa-chart { background: #17a2b8 !important; color: white !important; border-color: #17a2b8 !important; }
        .coa-add { background: #28a745 !important; color: white !important; border-color: #28a745 !important; }
        .coa-save { background: #1F4E79 !important; color: white !important; border-color: #1F4E79 !important; }
        .coa-cancel { background: #6c757d !important; color: white !important; border-color: #6c757d !important; }
        .coa-delete { background: #dc3545 !important; color: white !important; border-color: #dc3545 !important; }

        .coa-label { font-size: 10px; font-weight: 600; color: #334155; align-self: center; }
        .coa-input { height: 24px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 5px; font-size: 11px; outline: none; width: 100%; transition: border 0.2s; }
        .coa-input:focus { border-color: #1F4E79; box-shadow: 0 0 0 1px rgba(31, 78, 121, 0.1); }

        .small-manage-btn { padding: 0 4px; height: 24px; background: #e2e8f0; border: 1px solid #cbd5e0; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 10px; }
        .small-manage-btn:hover { background: #cbd5e0; }

        select:disabled, input:disabled, textarea:disabled { background-color: #f8fafc; color: #64748b; }
        option:checked { background: #1F4E79 !important; color: white !important; }
        option { padding: 3px 6px; border-bottom: 1px solid #f1f5f9; }
    </style>
</div>
