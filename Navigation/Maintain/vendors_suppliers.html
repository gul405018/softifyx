<div class="coa-container" style="width: 1000px; height: 700px;">
    <!-- Top Section: Vendor / Supplier Type -->
    <div class="coa-section" style="height: 48%;">
        <div class="coa-header">
            <i class="fas fa-tags coa-header-icon"></i>
            Vendor / Supplier Type
        </div>
        <div class="coa-content">
            <div class="coa-list-panel">
                <select id="vendorTypeList" size="10" class="coa-list" onchange="onVendorTypeSelect(this.value)">
                    <!-- Populated via API linked to coa_sub -->
                </select>
            </div>
            <div class="coa-form-panel">
                <!-- Redundant Code/Name inputs removed as requested -->
                <div class="coa-actions">
                    <button class="coa-btn btn-chart" title="Chart" onclick="printCOA('sub')">
                        <i class="fas fa-print"></i>
                    </button>
                    <button class="coa-btn btn-add" title="Add" onclick="resetVendorTypeForm(true)">
                        <i class="fas fa-plus"></i> Add
                    </button>
                    <button class="coa-btn btn-save" title="Save" onclick="saveVendorType()">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button class="coa-btn btn-cancel" title="Cancel" onclick="resetVendorTypeForm()">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                    <button class="coa-btn btn-delete" title="Delete" onclick="deleteVendorType()">
                        <i class="fas fa-trash-alt"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Section: List of Vendors / Suppliers -->
    <div class="coa-section" style="height: 52%; margin-top: 10px;">
        <div class="coa-header">
            <i class="fas fa-users coa-header-icon"></i>
            List of Vendors / Suppliers
        </div>
        <div class="coa-content">
            <div class="coa-list-panel">
                <select id="vendorList" size="15" class="coa-list" onchange="onVendorSelect(this.value)">
                    <!-- Populated via API linked to coa_list + vendors table -->
                </select>
            </div>
            <div class="coa-form-panel scrollable-form">
                <div class="coa-form-row">
                    <label class="coa-label">Account Code</label>
                    <input type="text" id="vendAccountCode" class="coa-input" style="width: 120px;" disabled>
                </div>
                <div class="coa-form-row">
                    <label class="coa-label">Account Name</label>
                    <input type="text" id="vendAccountName" class="coa-input" style="flex: 1;" disabled>
                </div>
                <div class="coa-form-row">
                    <label class="coa-label">Contact Person</label>
                    <input type="text" id="vendContactPerson" class="coa-input" style="flex: 1;" disabled>
                </div>
                <div class="coa-form-row">
                    <label class="coa-label">Address</label>
                    <textarea id="vendAddress" class="coa-input" style="flex: 1; height: 50px;" disabled></textarea>
                </div>
                <div class="coa-form-row">
                    <div style="flex: 1; display: flex; align-items: center;">
                        <label class="coa-label" style="width: 100px;">Telephone</label>
                        <input type="text" id="vendTelephone" class="coa-input" style="flex: 1;" disabled>
                    </div>
                    <div style="flex: 1; display: flex; align-items: center; margin-left: 10px;">
                        <label class="coa-label" style="width: 100px;">Mobile</label>
                        <input type="text" id="vendMobile" class="coa-input" style="flex: 1;" disabled>
                    </div>
                </div>
                <div class="coa-form-row">
                    <div style="flex: 1; display: flex; align-items: center;">
                        <label class="coa-label" style="width: 100px;">Fax</label>
                        <input type="text" id="vendFax" class="coa-input" style="flex: 1;" disabled>
                    </div>
                    <div style="flex: 1; display: flex; align-items: center; margin-left: 10px;">
                        <label class="coa-label" style="width: 100px;">E-Mail</label>
                        <input type="email" id="vendEmail" class="coa-input" style="flex: 1;" disabled>
                    </div>
                </div>
                <div class="coa-form-row">
                    <label class="coa-label">Website</label>
                    <input type="text" id="vendWebsite" class="coa-input" style="flex: 1;" disabled>
                </div>
                <div class="coa-form-row">
                    <div style="flex: 1; display: flex; align-items: center;">
                        <label class="coa-label" style="width: 100px;">S. T. Reg. No.</label>
                        <input type="text" id="vendStReg" class="coa-input" style="flex: 1;" disabled>
                    </div>
                    <div style="flex: 1; display: flex; align-items: center; margin-left: 10px;">
                        <label class="coa-label" style="width: 100px;">N.T.N. / C.N.I.C.</label>
                        <input type="text" id="vendNtn" class="coa-input" style="flex: 1;" disabled>
                    </div>
                </div>
                <div class="coa-form-row">
                    <label class="coa-label">Credit Terms</label>
                    <select id="vendCreditTerms" class="coa-input" style="width: 150px;" disabled>
                        <option value="CASH">CASH</option>
                        <option value="7 DAYS">7 DAYS</option>
                        <option value="15 DAYS">15 DAYS</option>
                        <option value="30 DAYS">30 DAYS</option>
                        <option value="45 DAYS">45 DAYS</option>
                        <option value="60 DAYS">60 DAYS</option>
                        <option value="90 DAYS">90 DAYS</option>
                    </select>
                </div>
                <div class="coa-form-row">
                    <label class="coa-label">Remarks</label>
                    <input type="text" id="vendRemarks" class="coa-input" style="flex: 1;" disabled>
                </div>

                <div class="coa-actions" style="margin-top: 15px;">
                    <button class="coa-btn btn-chart" title="Chart" onclick="printCOA('list')">
                        <i class="fas fa-print"></i>
                    </button>
                    <button class="coa-btn btn-find" title="Find" onclick="findCOA()">
                        <i class="fas fa-search"></i>
                    </button>
                    <button class="coa-btn btn-add" title="Add" onclick="resetVendorForm(true)">
                        <i class="fas fa-plus"></i> Add
                    </button>
                    <button class="coa-btn btn-save" title="Save" onclick="saveVendor()">
                        <i class="fas fa-save"></i> Save
                    </button>
                    <button class="coa-btn btn-cancel" title="Cancel" onclick="resetVendorForm()">
                        <i class="fas fa-times"></i> Cancel
                    </button>
                    <button class="coa-btn btn-delete" title="Delete" onclick="deleteVendor()">
                        <i class="fas fa-trash-alt"></i> Delete
                    </button>
                </div>
                <div class="instruction-box">
                    <i class="fas fa-info-circle"></i> Press: Ctrl+N for Add, Ctrl+S for Save, Ctrl+X for Cancel
                </div>
            </div>
        </div>
    </div>
</div>
