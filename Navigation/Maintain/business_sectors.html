<div id="sectorsContainer" data-module="Business Sectors" style="width: 930px; height: 320px; display: flex; flex-direction: column; gap: 4px; background: white; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; position: relative;">

    <!-- Section Header -->
    <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">Business Sectors Maintenance</div>

    <div style="flex: 1; display: flex; gap: 20px; align-items: stretch;">
        <!-- Left: List -->
        <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden;">
            <select id="sectorList" size="2" style="width: 100%; flex: 1; border: none; outline: none; font-size: 13px; background: white;" onchange="onSectorSelect(this.value)"></select>
        </div>
        
        <!-- Right: Fields & Buttons -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 15px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 20px; background: white;">
            <div style="display: flex; justify-content: flex-end; gap: 8px;">
                <button class="coa-btn coa-btn-add" onclick="resetSectorForm(true)">Add</button>
                <button class="coa-btn coa-btn-save" onclick="saveSector()">Save</button>
                <button class="coa-btn coa-btn-delete" onclick="deleteSector()">Delete</button>
                <button class="coa-btn coa-btn-cancel" onclick="resetSectorForm()">Cancel</button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 15px; margin-top: 20px;">
                <label style="font-size: 13px; font-weight: 700; color: #475569; white-space: nowrap;">Sector Name</label>
                <input type="text" id="sectorName" style="flex: 1; height: 32px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 12px; font-size: 14px; outline: none;" placeholder="Enter Sector Name" disabled>
            </div>
        </div>
    </div>

    <style>
        .coa-btn {
            height: 30px;
            min-width: 80px;
            padding: 0 15px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .coa-btn-add { background: #22c55e; }
        .coa-btn-add:hover { background: #16a34a; }
        .coa-btn-save { background: #1e3a8a; }
        .coa-btn-save:hover { background: #1e40af; }
        .coa-btn-cancel { background: #94a3b8; }
        .coa-btn-cancel:hover { background: #64748b; }
        .coa-btn-delete { background: #ef4444; }
        .coa-btn-delete:hover { background: #dc2626; }
        
        #sectorList option { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #475569; }
        #sectorList option:checked { background: #eff6ff !important; color: #1e3a8a !important; font-weight: 700; border-left: 3px solid #1e3a8a; }
    </style>
</div>
