<div class="modular-modal-content" style="padding: 15px; font-family: 'Segoe UI', sans-serif; background: #f1f5f9; min-width: 450px;">
    <div style="background: #cbd5e0; padding: 5px 15px; margin: -15px -15px 15px -15px; border-bottom: 1px solid #94a3b8;">
        <h1 style="margin: 0; font-size: 16px; color: #475569; letter-spacing: 0.5px; font-style: italic; font-weight: 800;">BUSINESS SECTORS</h1>
    </div>

    <div style="background: white; border: 1px solid #cbd5e0; border-radius: 6px; padding: 15px; margin-top: 5px;">
        <div style="display: flex; gap: 20px;">
            <select id="sectorList" size="8" style="flex: 1; border: 1px solid #cbd5e0; border-radius: 4px; outline: none; min-width: 150px;" onchange="onSectorSelect(this.value)"></select>
            
            <div style="flex: 1.5; display: flex; flex-direction: column; justify-content: center; gap: 15px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn coa-add" onclick="resetSectorForm(true)">Add</button>
                    <button class="coa-btn coa-save" onclick="saveSector()">Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetSectorForm()">Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteSector()">Delete</button>
                </div>
                
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label class="coa-label" style="white-space:nowrap;">Sector</label>
                    <input type="text" id="sectorName" class="coa-input" style="font-weight: 700; text-align: center;" disabled>
                </div>
            </div>
        </div>
    </div>

    <style>
        .coa-btn { background: #ffffff; border: 1px solid #ccc; padding: 2px 10px; font-size: 11px; font-weight: 600; cursor: pointer; min-width: 55px; border-radius: 4px; height: 26px; }
        .coa-add { color: #28a745; }
        .coa-save { color: #1F4E79; }
        .coa-cancel { color: #dc3545; }
        .coa-delete { color: #334155; }
        .coa-label { font-size: 12px; font-weight: 600; color: #475569; }
        .coa-input { height: 30px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 8px; font-size: 13px; width: 100%; }
        .coa-input:disabled { background: #f8fafc; color: #1e293b; }
    </style>
</div>
