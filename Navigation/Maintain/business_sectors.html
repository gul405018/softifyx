<div id="sectorsContainer" data-module="Business Sectors" class="modal-square" style="display: flex; flex-direction: column; gap: 15px; background: white; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; border-radius: 8px;">
    
    <div style="display: flex; gap: 20px; flex: 1; align-items: stretch;">
        <!-- Left: List -->
        <div style="flex: 1; display: flex; flex-direction: column;">
            <select id="sectorList" size="10" style="width: 100%; flex: 1; border: 1px solid #cbd5e0; outline: none; font-size: 13px; border-radius: 4px; padding: 4px;" onchange="onSectorSelect(this.value)"></select>
        </div>
        
        <!-- Right: Fields & Buttons -->
        <div style="flex: 1.2; display: flex; flex-direction: column; gap: 12px; justify-content: flex-start;">
            <div style="display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 10px;">
                <button class="coa-btn coa-add" onclick="resetSectorForm(true)">Add</button>
                <button class="coa-btn coa-save" onclick="saveSector()">Save</button>
                <button class="coa-btn coa-cancel" onclick="resetSectorForm()">Cancel</button>
                <button class="coa-btn coa-delete" onclick="deleteSector()">Delete</button>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label class="coa-label" style="text-align: left;">Business Sector Name</label>
                <input type="text" id="sectorName" class="coa-input" placeholder="Enter Sector Name" disabled>
            </div>
        </div>
    </div>

    <style>
        .coa-btn {
            padding: 4px 10px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            height: 26px;
            min-width: 60px;
        }
        .coa-btn:hover { background: #f1f5f9; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        .coa-add { background: #28a745 !important; color: white !important; border-color: #28a745 !important; }
        .coa-save { background: #1F4E79 !important; color: white !important; border-color: #1F4E79 !important; }
        .coa-cancel { background: #6c757d !important; color: white !important; border-color: #6c757d !important; }
        .coa-delete { background: #dc3545 !important; color: white !important; border-color: #dc3545 !important; }
        
        .coa-label { font-size: 11px; font-weight: 700; color: #1F4E79; text-transform: uppercase; }
        .coa-input { height: 30px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 8px; font-size: 13px; outline: none; width: 100%; }
        
        select:disabled, input:disabled { background-color: #f8fafc; color: #64748b; cursor: not-allowed; }
        option { padding: 4px 8px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    </style>
</div>
