<div id="importOBWizard" style="padding: 20px; background: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1F4E79; padding-bottom: 10px; margin-bottom: 20px;">
        <h2 style="margin: 0; font-size: 18px; color: #1F4E79; display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-file-import"></i> Import Opening Balances
        </h2>
    </div>

    <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; line-height: 1.6;">
        <!-- The Note shown in screenshot -->
        <div style="font-style: italic; color: #334155; font-size: 14px; margin-bottom: 25px; border-left: 4px solid #1F4E79; padding-left: 15px;">
            <strong>NOTE:</strong> This will import all accounts balances from a previous year selected, 
            irrespective of whether their opening balances have already been entered or not.
        </div>

        <div style="display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="font-size: 13px; font-weight: 700; color: #1F4E79; white-space: nowrap;">
                    Select Financial Year to Import Balances from
                </label>
                <select id="importFromFY" style="flex: 1; height: 32px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 8px; font-size: 13px; outline: none; background: white;">
                    <option value="">Loading years...</option>
                </select>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                <button onclick="confirmOBImport()" style="background: #f1f5f9; border: 1px solid #94a3b8; padding: 8px 20px; border-radius: 4px; font-weight: 600; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s;">
                    <i class="fas fa-magic" style="color: #1F4E79;"></i> Import Balances
                </button>
            </div>
        </div>
    </div>

    <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
        <button onclick="closeSecondaryModularPopup()" style="background: #64748b; color: white; border: none; padding: 8px 20px; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 13px; height: 32px;">
            Cancel
        </button>
    </div>
</div>
