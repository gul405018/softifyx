<div id="coaContainer" data-module="Chart of Accounts" style="height: 580px; display: flex; flex-direction: column; gap: 8px; background: #e0e0e0; padding: 10px; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; border-radius: 4px;">
    
    <div style="font-style: italic; font-weight: 800; color: #7f8c8d; font-size: 18px; border-bottom: 2px solid #7f8c8d; margin-bottom: 5px; padding-bottom: 2px;">
        CHART OF ACCOUNTS
    </div>

    <!-- Group 1: Main Account Types -->
    <fieldset style="border: 1px solid #bdc3c7; border-radius: 4px; padding: 10px; background: #f5f5f5; flex: 1; display: flex; flex-direction: column;">
        <legend style="padding: 0 5px; font-size: 12px; font-weight: 700; color: #7f8c8d;">Main Account Types</legend>
        <div style="display: flex; gap: 15px; flex: 1;">
            <div style="flex: 1;">
                <select id="mainAccountList" size="4" style="width: 100%; height: 95px; border: 1px solid #bdc3c7; outline: none; font-size: 13px;" onchange="onMainAccountSelect(this.value)"></select>
            </div>
            <div style="flex: 1.5; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn" onclick="printCOA('main')"><i class="fas fa-print"></i> Chart</button>
                    <div style="width: 20px;"></div>
                    <button class="coa-btn" onclick="resetMainForm()"><i class="fas fa-file"></i> Add</button>
                    <button class="coa-btn coa-save" onclick="saveCOAMain()"><i class="fas fa-check"></i> Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetMainForm()"><i class="fas fa-times-circle"></i> Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteCOAMain()"><i class="fas fa-trash"></i> Delete</button>
                </div>
                <!-- Fields -->
                <div style="display: grid; grid-template-columns: 160px 1fr; gap: 6px; align-items: center;">
                    <label style="font-size: 12px; font-style: italic; font-weight: 700; color: #555;">Main Type Code</label>
                    <input type="number" id="mainTypeCode" style="width: 100px; height: 26px; border: 1px solid #7f8c8d; padding: 0 5px;">
                    
                    <label style="font-size: 12px; font-style: italic; font-weight: 700; color: #555;">Main Account Type</label>
                    <input type="text" id="mainAccountType" style="height: 26px; border: 1px solid #7f8c8d; padding: 0 5px;">
                    
                    <label style="font-size: 12px; font-style: italic; font-weight: 700; color: #555;">Financial Statements Component</label>
                    <select id="financialStatementComponent" style="height: 26px; border: 1px solid #7f8c8d; padding: 0 5px; background: white;">
                        <option value="Current Assets">Current Assets</option>
                        <option value="Non-Current Assets">Non-Current Assets</option>
                        <option value="Current Liabilities">Current Liabilities</option>
                        <option value="Non-Current Liabilities">Non-Current Liabilities</option>
                        <option value="Capital & Reserves">Capital & Reserves</option>
                        <option value="Income">Income</option>
                        <option value="Cost of Sales">Cost of Sales</option>
                        <option value="Other Income">Other Income</option>
                        <option value="Operating Expenses">Operating Expenses</option>
                        <option value="Financial Expenses">Financial Expenses</option>
                        <option value="Other Expenses">Other Expenses</option>
                        <option value="Taxation">Taxation</option>
                    </select>
                </div>
            </div>
        </div>
    </fieldset>

    <!-- Group 2: Sub Account Types -->
    <fieldset style="border: 1px solid #bdc3c7; border-radius: 4px; padding: 10px; background: #f5f5f5; flex: 1; display: flex; flex-direction: column;">
        <legend style="padding: 0 5px; font-size: 12px; font-weight: 700; color: #7f8c8d;">Sub Account Types</legend>
        <div style="display: flex; gap: 15px; flex: 1;">
            <div style="flex: 1;">
                <select id="subAccountList" size="4" style="width: 100%; height: 95px; border: 1px solid #bdc3c7; outline: none; font-size: 13px;" onchange="onSubAccountSelect(this.value)"></select>
            </div>
            <div style="flex: 1.5; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn" onclick="printCOA('sub')"><i class="fas fa-print"></i> Chart</button>
                    <div style="width: 20px;"></div>
                    <button class="coa-btn" onclick="resetSubForm()"><i class="fas fa-file"></i> Add</button>
                    <button class="coa-btn coa-save" onclick="saveCOASub()"><i class="fas fa-check"></i> Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetSubForm()"><i class="fas fa-times-circle"></i> Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteCOASub()"><i class="fas fa-trash"></i> Delete</button>
                </div>
                <!-- Fields -->
                <div style="display: grid; grid-template-columns: 160px 1fr; gap: 6px; align-items: center;">
                    <label style="font-size: 12px; font-style: italic; font-weight: 700; color: #555;">Sub Account Code</label>
                    <input type="text" id="subAccountCode" readonly style="width: 100px; height: 26px; border: 1px solid #7f8c8d; padding: 0 5px; background: #eee;">
                    
                    <label style="font-size: 12px; font-style: italic; font-weight: 700; color: #555;">Sub Account Type</label>
                    <input type="text" id="subAccountType" style="height: 26px; border: 1px solid #7f8c8d; padding: 0 5px;">
                </div>
            </div>
        </div>
    </fieldset>

    <!-- Group 3: List of Accounts -->
    <fieldset style="border: 1px solid #bdc3c7; border-radius: 4px; padding: 10px; background: #f5f5f5; flex: 1.2; display: flex; flex-direction: column;">
        <legend style="padding: 0 5px; font-size: 12px; font-weight: 700; color: #7f8c8d;">List of Accounts</legend>
        <div style="display: flex; gap: 15px; flex: 1;">
            <div style="flex: 1;">
                <select id="listAccountList" size="5" style="width: 100%; height: 110px; border: 1px solid #bdc3c7; outline: none; font-size: 13px;" onchange="onListAccountSelect(this.value)"></select>
            </div>
            <div style="flex: 1.5; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; justify-content: flex-end; gap: 4px;">
                    <button class="coa-btn" onclick="printCOA('list')"><i class="fas fa-print"></i> Chart</button>
                    <button class="coa-btn"><i class="fas fa-search"></i> Find</button>
                    <div style="width: 20px;"></div>
                    <button class="coa-btn" onclick="resetListForm()"><i class="fas fa-file"></i> Add</button>
                    <button class="coa-btn coa-save" onclick="saveCOAList()"><i class="fas fa-check"></i> Save</button>
                    <button class="coa-btn coa-cancel" onclick="resetListForm()"><i class="fas fa-times-circle"></i> Cancel</button>
                    <button class="coa-btn coa-delete" onclick="deleteCOAList()"><i class="fas fa-trash"></i> Delete</button>
                </div>
                
                <div style="margin: 5px 0;">
                    <a href="#" style="color: blue; font-size: 12px; font-weight: 700; font-style: italic; text-decoration: underline;">Click Here to Record Details of Bank Accounts ....</a>
                </div>

                <!-- Fields -->
                <div style="display: grid; grid-template-columns: 160px 1fr; gap: 6px; align-items: center;">
                    <label style="font-size: 12px; font-style: italic; font-weight: 700; color: #555;">Account Code</label>
                    <input type="text" id="accountCode" readonly style="width: 140px; height: 26px; border: 1px solid #7f8c8d; padding: 0 5px; background: #eee;">
                    
                    <label style="font-size: 12px; font-style: italic; font-weight: 700; color: #555;">Account Name</label>
                    <input type="text" id="accountName" style="height: 26px; border: 1px solid #7f8c8d; padding: 0 5px;">
                </div>
            </div>
        </div>
    </fieldset>

    <div style="color: red; font-size: 12px; text-align: center; margin-top: 5px; font-weight: 500;">
        Press: <span style="font-weight:700;">Ctrl+N</span> to add new account, <span style="font-weight:700;">Ctrl+S</span> to save changes and <span style="font-weight:700;">ESC</span> to cancel
    </div>

    <style>
        .coa-btn {
            background: #eee;
            border: 1px solid #999;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            border-radius: 2px;
            color: #333;
        }
        .coa-btn i { font-size: 14px; margin-bottom: 2px; }
        .coa-btn:hover { background: #ddd; }
        .coa-save { color: #27ae60 !important; }
        .coa-cancel { color: #e67e22 !important; }
        .coa-delete { color: #e74c3c !important; }
        
        fieldset legend { margin-left: 10px; }
        input:focus { outline: none; background: #fffde7; border-color: #3498db; }
        select:focus { outline: none; background: #fffde7; }
    </style>
</div>
