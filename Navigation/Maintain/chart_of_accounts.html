<div id="coaContainer" data-module="Chart of Accounts" style="width: 930px; height: 600px; display: flex; flex-direction: column; gap: 15px; background: white; padding: 20px; font-family: 'Segoe UI', Arial, sans-serif; position: relative; overflow-y: auto;">
    
    <!-- Section 1: Main Account Types -->
    <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 15px; border-radius: 4px; background: white; min-height: 200px;">
        <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">1. Main Account Types</div>
        <div style="display: flex; gap: 20px; flex: 1; align-items: stretch;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden;">
                <select id="mainAccountList" size="8" style="width: 100%; flex: 1; border: none; outline: none; font-size: 13px; background: white;" onchange="onMainAccountSelect(this.value)"></select>
            </div>
            
            <!-- Right: Fields & Buttons -->
            <div style="flex: 1.5; display: flex; flex-direction: column; gap: 12px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 15px; background: white;">
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="coa-btn coa-btn-chart" onclick="printCOA('main')">Chart</button>
                    <button class="coa-btn coa-btn-add" onclick="resetMainForm(true)">Add</button>
                    <button class="coa-btn coa-btn-save" onclick="saveCOAMain()">Save</button>
                    <button class="coa-btn coa-btn-delete" onclick="deleteCOAMain()">Delete</button>
                    <button class="coa-btn coa-btn-cancel" onclick="resetMainForm()">Cancel</button>
                </div>
                <div style="display: grid; grid-template-columns: 180px 1fr; gap: 12px; align-content: start;">
                    <label class="coa-label">Main Type Code</label>
                    <input type="number" id="mainTypeCode" class="coa-input" style="width: 100px;" disabled>
                    
                    <label class="coa-label">Main Account Type</label>
                    <input type="text" id="mainAccountType" class="coa-input" disabled>
                    
                    <label class="coa-label">Statements Component</label>
                    <select id="financialStatementComponent" class="coa-input" style="background: white;" disabled>
                        <option value="current assets">current assets</option>
                        <option value="non-current assets">non-current assets</option>
                        <option value="Current Liabilities">Current Liabilities</option>
                        <option value="Non-Current Liabilities">Non-Current Liabilities</option>
                        <option value="Capital & Reserves">Capital & Reserves</option>
                        <option value="Income">Income</option>
                        <option value="Cost Of Sale">Cost Of Sale</option>
                        <option value="Other Income">Other Income</option>
                        <option value="Operating Expenses">Operating Expenses</option>
                        <option value="Financial Expenses">Financial Expenses</option>
                        <option value="Other Expenses">Other Expenses</option>
                        <option value="Taxation">Taxation</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 2: Sub Account Types -->
    <div style="flex: 0.8; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 15px; border-radius: 4px; background: white; min-height: 160px;">
        <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">2. Sub Account Types</div>
        <div style="display: flex; gap: 20px; flex: 1; align-items: stretch;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden;">
                <select id="subAccountList" size="7" style="width: 100%; flex: 1; border: none; outline: none; font-size: 13px; background: white;" onchange="onSubAccountSelect(this.value)"></select>
            </div>
            
            <!-- Right: Fields & Buttons -->
            <div style="flex: 1.5; display: flex; flex-direction: column; gap: 12px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 15px; background: white;">
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="coa-btn coa-btn-chart" onclick="printCOA('sub')">Chart</button>
                    <button class="coa-btn coa-btn-add" onclick="resetSubForm(true)">Add</button>
                    <button class="coa-btn coa-btn-save" onclick="saveCOASub()">Save</button>
                    <button class="coa-btn coa-btn-delete" onclick="deleteCOASub()">Delete</button>
                    <button class="coa-btn coa-btn-cancel" onclick="resetSubForm()">Cancel</button>
                </div>
                <div style="display: grid; grid-template-columns: 180px 1fr; gap: 12px; align-content: start;">
                    <label class="coa-label">Sub Account Code</label>
                    <input type="text" id="subAccountCode" readonly class="coa-input" style="width: 120px; background: #f8fafc;" disabled>
                    
                    <label class="coa-label">Sub Account Type</label>
                    <input type="text" id="subAccountType" class="coa-input" disabled>
                </div>
            </div>
        </div>
    </div>

    <!-- Section 3: List of Accounts -->
    <div style="flex: 0.8; display: flex; flex-direction: column; border: 1px solid #e2e8f0; padding: 15px; border-radius: 4px; background: white; min-height: 160px;">
        <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 15px;">3. List of Accounts</div>
        <div style="display: flex; gap: 20px; align-items: stretch; flex: 1;">
            <!-- Left: List -->
            <div style="flex: 1; display: flex; flex-direction: column; border: 1px solid #cbd5e0; border-radius: 4px; overflow: hidden;">
                <select id="listAccountList" size="7" style="width: 100%; flex: 1; border: none; outline: none; font-size: 13px; background: white;" onchange="onListAccountSelect(this.value)"></select>
            </div>
            
            <!-- Right: Fields & Buttons -->
            <div style="flex: 1.5; display: flex; flex-direction: column; gap: 12px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 15px; background: white;">
                <div style="display: flex; justify-content: flex-end; gap: 8px;">
                    <button class="coa-btn coa-btn-chart" onclick="printCOA('list')">Chart</button>
                    <button class="coa-btn coa-btn-add" onclick="resetListForm(true)">Add</button>
                    <button class="coa-btn coa-btn-save" onclick="saveCOAList()">Save</button>
                    <button class="coa-btn coa-btn-delete" onclick="deleteCOAList()">Delete</button>
                    <button class="coa-btn coa-btn-cancel" onclick="resetListForm()">Cancel</button>
                </div>
                
                <div style="display: grid; grid-template-columns: 180px 1fr; gap: 12px; align-content: start;">
                    <label class="coa-label">Account Code</label>
                    <input type="text" id="accountCode" readonly class="coa-input" style="width: 140px; background: #f8fafc;" disabled>
                    
                    <label class="coa-label">Account Name</label>
                    <input type="text" id="accountName" class="coa-input" disabled>
                </div>
            </div>
        </div>
    </div>

    <style>
        .coa-btn {
            height: 30px;
            min-width: 70px;
            padding: 0 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .coa-btn-chart { background: #0891b2; }
        .coa-btn-chart:hover { background: #0e7490; }
        .coa-btn-add { background: #22c55e; }
        .coa-btn-add:hover { background: #16a34a; }
        .coa-btn-save { background: #1e3a8a; }
        .coa-btn-save:hover { background: #1e40af; }
        .coa-btn-cancel { background: #94a3b8; }
        .coa-btn-cancel:hover { background: #64748b; }
        .coa-btn-delete { background: #ef4444; }
        .coa-btn-delete:hover { background: #dc2626; }
        
        .coa-label { font-size: 11px; font-weight: 700; color: #475569; align-self: center; }
        .coa-input {
            height: 30px;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            padding: 0 10px;
            font-size: 13px;
            outline: none;
            width: 100%;
            transition: all 0.2s;
            background: white;
        }

        .coa-input:focus:not(:disabled) {
            border-color: #1e3a8a;
            background: #eff6ff;
        }

        .coa-input:disabled { background-color: #f8fafc; color: #64748b; }
        
        option { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #475569; }
        option:checked { background: #eff6ff !important; color: #1e3a8a !important; font-weight: 700; border-left: 3px solid #1e3a8a; }
    </style>
</div>
</div>
