<div id="itemPriceSettingsContainer" data-module="Item Price Settings" style="width: 930px; height: 650px; background: white; display: flex; flex-direction: column; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; border: 1px solid #cbd5e0; overflow: hidden;">
    
    <!-- Header Section -->
    <div style="background: #f8fafc; padding: 15px; border-bottom: 1px solid #e2e8f0; position: relative; display: flex; align-items: center; justify-content: space-between; margin: 10px; border: 1px solid #e2e8f0; border-radius: 4px;">
        
        <!-- Left: Empty -->
        <div style="width: 10px;"></div>

        <!-- Middle: Options -->
        <div style="flex: 1; margin-left: 40px; display: flex; flex-direction: column; gap: 5px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: #334155; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="all" checked onchange="window.PriceSettingsModule.toggleFilters()"> All Inventory Items
                </label>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: #334155; width: 100px; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="category" onchange="window.PriceSettingsModule.toggleFilters()"> Category
                </label>
                <select id="priceCategorySelect" style="flex: 1; max-width: 300px; height: 26px; border: 1px solid #94a3b8; font-size: 12px; outline: none;" disabled onchange="window.PriceSettingsModule.load()">
                    <option value="0">Select Category...</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: #334155; width: 100px; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="brand" onchange="window.PriceSettingsModule.toggleFilters()"> Brand
                </label>
                <select id="priceBrandSelect" style="flex: 1; max-width: 300px; height: 26px; border: 1px solid #94a3b8; font-size: 12px; outline: none;" disabled onchange="window.PriceSettingsModule.load()">
                    <option value="0">Select Brand...</option>
                </select>
            </div>
        </div>

        <!-- Right: Top Buttons & Margin Box -->
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
            <div style="display: flex; gap: 8px;">
                <button class="price-btn price-btn-save" onclick="window.PriceSettingsModule.save()">Save</button>
                <button class="price-btn price-btn-cancel" onclick="closeModularPopup()">Cancel</button>
            </div>
            
            <div style="background: #cbd5e0; padding: 5px 10px; border: 1px solid #94a3b8; display: flex; align-items: center; gap: 5px; border-radius: 2px;">
                <span style="font-size: 12px; font-weight: 600; color: #1e293b;">Set</span>
                <input type="number" id="profitMarginInput" style="width: 50px; height: 22px; text-align: center; border: 1px solid #94a3b8; font-weight: 700;" value="0">
                <span style="font-size: 11px; font-weight: 600; color: #1e293b;">% Profit Margin on Purchase Price of all Items.</span>
                <button style="height: 22px; padding: 0 10px; font-size: 11px; font-weight: 700; background: #f1f5f9; border: 1px solid #94a3b8; cursor: pointer;" onclick="window.PriceSettingsModule.applyMargin()">Update</button>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div style="flex: 1; background: white; margin: 10px; display: flex; flex-direction: column;">
        <div style="font-size: 11px; font-weight: 800; color: #1e3a8a; border-bottom: 2px solid #1e3a8a; padding-bottom: 4px; text-transform: uppercase; margin-bottom: 5px;">Inventory Items List</div>
        
        <div style="border: 1px solid #e2e8f0; border-radius: 4px; flex: 1; overflow: hidden; display: flex; flex-direction: column;">
            <div style="overflow-y: auto; flex: 1;">
                <table style="width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed;">
                    <thead style="position: sticky; top: 0; background: #f8fafc; z-index: 10;">
                        <tr>
                            <th style="width: 40px; border-bottom: 2px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 8px;"></th>
                            <th style="width: 120px; border-bottom: 2px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 8px; color: #475569; font-size: 11px; font-weight: 700; text-transform: uppercase; text-align: center;">Item Code</th>
                            <th style="border-bottom: 2px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 8px; color: #475569; font-size: 11px; font-weight: 700; text-transform: uppercase; text-align: left;">Item Name</th>
                            <th style="width: 80px; border-bottom: 2px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 8px; color: #475569; font-size: 11px; font-weight: 700; text-transform: uppercase; text-align: center;">Unit</th>
                            <th style="width: 150px; border-bottom: 2px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 8px; color: #475569; font-size: 11px; font-weight: 700; text-transform: uppercase; text-align: center;">Purchase Price</th>
                            <th style="width: 150px; border-bottom: 2px solid #e2e8f0; padding: 8px; color: #475569; font-size: 11px; font-weight: 700; text-transform: uppercase; text-align: center;">Selling Price</th>
                        </tr>
                    </thead>
                    <tbody id="priceSettingsTableBody">
                        <!-- Data Rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <style>
        .price-btn {
            height: 30px;
            min-width: 80px;
            padding: 0 15px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .price-btn-save { background: #1e3a8a; }
        .price-btn-save:hover { background: #1e40af; }
        .price-btn-cancel { background: #94a3b8; }
        .price-btn-cancel:hover { background: #64748b; }

        .price-input-cell {
            width: 100%;
            height: 28px;
            border: 1px solid #e2e8f0;
            text-align: center;
            font-weight: 600;
            outline: none;
            background: #fff;
        }
        .price-input-cell:focus { border-color: #1e3a8a; background: #eff6ff; }
        
        #priceSettingsTableBody tr:nth-child(even) { background: #f8fafc; }
        #priceSettingsTableBody tr:hover { background: #f1f5f9; }
        #priceSettingsTableBody td { 
            padding: 6px 8px; 
            border-bottom: 1px solid #e2e8f0; 
            border-right: 1px solid #e2e8f0; 
        }
    </style>

</div>
