<div id="itemPriceSettingsContainer" data-module="Item Price Settings" style="width: 930px; height: 650px; background: white; display: flex; flex-direction: column; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; border: 1px solid #cbd5e0; overflow: hidden;">
    
    <!-- Header Section (Filters & Actions) -->
    <div id="priceHeader" style="flex-shrink: 0; background: #f1f5f9; padding: 15px; border-bottom: 2px solid #cbd5e0; display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; min-height: 100px;">
        
        <!-- Left: Filters -->
        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #1F4E79; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="all" checked onclick="window.togglePriceFilters()"> All Inventory Items
                </label>
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #1F4E79; width: 100px; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="category" onclick="window.togglePriceFilters()"> Category
                </label>
                <select id="priceCategorySelect" style="flex: 1; max-width: 350px; height: 26px; border: 1px solid #94a3b8; font-size: 12px; outline: none; background: white;" disabled onchange="window.loadPriceSettingsData()">
                    <option value="0">Select Category...</option>
                </select>
                <button onclick="window.initPriceSettings()" style="height: 26px; font-size: 11px; background: #1F4E79; color: white; border: none; border-radius: 2px; cursor: pointer; padding: 0 10px; font-weight: 700;">Refresh</button>
            </div>
            
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; color: #1F4E79; width: 100px; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="brand" onclick="window.togglePriceFilters()"> Brand
                </label>
                <select id="priceBrandSelect" style="flex: 1; max-width: 350px; height: 26px; border: 1px solid #94a3b8; font-size: 12px; outline: none; background: white;" disabled onchange="window.loadPriceSettingsData()">
                    <option value="0">Select Brand...</option>
                </select>
            </div>
        </div>

        <!-- Right: Actions -->
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 12px;">
            <div style="display: flex; gap: 10px;">
                <button class="erp-price-btn erp-save" onclick="window.saveBulkPrices()">Save</button>
                <button class="erp-price-btn erp-cancel" onclick="window.closeModularPopup()">Cancel</button>
            </div>
            
            <div style="background: #e2e8f0; padding: 6px 12px; border: 1px solid #cbd5e0; display: flex; align-items: center; gap: 8px; border-radius: 4px;">
                <span style="font-size: 12px; font-weight: 700; color: #1F4E79;">Set</span>
                <input type="number" id="profitMarginInput" style="width: 55px; height: 24px; text-align: center; border: 1px solid #94a3b8; font-weight: 700; border-radius: 2px;" value="0">
                <span style="font-size: 11px; font-weight: 700; color: #334155;">% Profit Margin on Purchase Price</span>
                <button style="height: 24px; padding: 0 12px; font-size: 11px; font-weight: 700; background: #1F4E79; color: white; border: none; border-radius: 2px; cursor: pointer;" onclick="window.applyProfitMargin()">Update</button>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div style="flex: 1; background: white; margin: 0; overflow: hidden; display: flex; flex-direction: column; border-bottom: 1px solid #cbd5e0;">
        <div style="overflow-y: auto; flex: 1;">
            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                <thead style="position: sticky; top: 0; background: #f8fafc; z-index: 10;">
                    <tr>
                        <th style="width: 40px; border: 1px solid #cbd5e0; padding: 10px;"></th>
                        <th style="width: 130px; border: 1px solid #cbd5e0; padding: 10px; color: #1F4E79; font-weight: 700;">Item Code</th>
                        <th style="border: 1px solid #cbd5e0; padding: 10px; color: #1F4E79; font-weight: 700; text-align: left;">Item Name</th>
                        <th style="width: 90px; border: 1px solid #cbd5e0; padding: 10px; color: #1F4E79; font-weight: 700;">Unit</th>
                        <th style="width: 150px; border: 1px solid #cbd5e0; padding: 10px; color: #1F4E79; font-weight: 700;">Purchase Price</th>
                        <th style="width: 150px; border: 1px solid #cbd5e0; padding: 10px; color: #1F4E79; font-weight: 700;">Selling Price</th>
                    </tr>
                </thead>
                <tbody id="priceSettingsTableBody">
                    <tr><td colspan="6" style="text-align: center; padding: 40px; color: #64748b; font-weight: 600;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Diagnostics Bar -->
    <div id="priceDebugBar" style="flex-shrink: 0; height: 35px; background: #fee2e2; border-top: 1px solid #ef4444; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; font-size: 11px; color: #991b1b;">
        <span><strong>Diagnostics:</strong> CoID: <span id="debugCoId">?</span> | Status: <span id="debugStatus">Init...</span></span>
        <div style="display: flex; gap: 10px;">
            <button onclick="window.checkPriceConnection()" style="background: #1e40af; color: white; border: none; padding: 2px 10px; border-radius: 2px; cursor: pointer; font-weight: 700;">Test API</button>
            <button onclick="window.seedSampleDataForUser()" style="background: #c62828; color: white; border: none; padding: 2px 10px; border-radius: 2px; cursor: pointer; font-weight: 700;">Seed Demo</button>
        </div>
    </div>

    <style>
        .erp-price-btn {
            height: 30px;
            min-width: 90px;
            padding: 0 15px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 3px;
            cursor: pointer;
            border: 1px solid transparent;
            color: white;
            transition: all 0.2s;
        }
        .erp-save { background: #004d40; border-color: #004d40; }
        .erp-save:hover { background: #00695c; }
        
        .erp-cancel { background: #546e7a; border-color: #546e7a; }
        .erp-cancel:hover { background: #78909c; }

        .price-input-cell {
            width: 90%;
            height: 24px;
            border: 1px solid #cbd5e0;
            text-align: center;
            font-weight: 700;
            outline: none;
            background: #fff;
            border-radius: 2px;
        }
        .price-input-cell:focus { border-color: #1F4E79; box-shadow: 0 0 0 2px rgba(31, 78, 121, 0.1); }
        
        #priceSettingsTableBody tr:nth-child(even) { background: #f8fafc; }
        #priceSettingsTableBody tr:hover { background: #f1f5f9; }
        #priceSettingsTableBody td { padding: 6px 10px; border: 1px solid #cbd5e0; }
    </style>

    <script>
        (function() {
            // State
            window.priceItemsData = [];
            window.priceCompanyId = 1;

            window.initPriceSettings = async function() {
                try {
                    const session = JSON.parse(localStorage.getItem('softifyx_session') || '{}');
                    window.priceCompanyId = session.company_id || 1;
                    
                    document.getElementById('debugCoId').innerText = window.priceCompanyId;
                    document.getElementById('debugStatus').innerText = "Fetching...";

                    const [treeRes, brandsRes] = await Promise.all([
                        fetch(`api/inventory.php?action=get_inventory_tree&company_id=${window.priceCompanyId}`),
                        fetch(`api/inventory.php?action=get_brands&company_id=${window.priceCompanyId}`)
                    ]);
                    
                    const tree = await treeRes.json();
                    const brands = await brandsRes.json();
                    
                    const catSelect = document.getElementById('priceCategorySelect');
                    const brandSelect = document.getElementById('priceBrandSelect');
                    
                    if (catSelect) {
                        catSelect.innerHTML = '<option value="0">Select Category...</option>';
                        if (tree && tree.subs) {
                            tree.subs.forEach(s => {
                                const main = (tree.mains || []).find(m => m.id == s.main_id);
                                const mainName = main ? main.name + " > " : "";
                                catSelect.innerHTML += `<option value="${s.id}">${mainName}${s.name}</option>`;
                            });
                        }
                    }

                    if (brandSelect) {
                        brandSelect.innerHTML = '<option value="0">Select Brand...</option>';
                        if (brands && Array.isArray(brands)) {
                            brands.forEach(b => {
                                brandSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
                            });
                        }
                    }

                    document.getElementById('debugStatus').innerText = "Ready";
                    window.loadPriceSettingsData();
                } catch (e) { 
                    console.error("Init Error:", e);
                    document.getElementById('debugStatus').innerText = "Load Failed";
                }
            };

            window.togglePriceFilters = function() {
                const radios = document.getElementsByName('priceFilter');
                let filter = 'all';
                for (let r of radios) { if (r.checked) { filter = r.value; break; } }
                
                document.getElementById('priceCategorySelect').disabled = (filter !== 'category');
                document.getElementById('priceBrandSelect').disabled = (filter !== 'brand');
                window.loadPriceSettingsData();
            };

            window.loadPriceSettingsData = async function() {
                const radios = document.getElementsByName('priceFilter');
                let filterType = 'all';
                for (let r of radios) { if (r.checked) { filterType = r.value; break; } }
                
                let filterId = 0;
                if (filterType === 'category') filterId = document.getElementById('priceCategorySelect').value;
                if (filterType === 'brand') filterId = document.getElementById('priceBrandSelect').value;

                if (filterType !== 'all' && (filterId == 0 || filterId == '0')) {
                    window.priceItemsData = [];
                    window.renderPriceTable();
                    return;
                }

                try {
                    const res = await fetch(`api/inventory.php?action=get_price_settings&company_id=${window.priceCompanyId}&filter_type=${filterType}&filter_id=${filterId}`);
                    window.priceItemsData = await res.json();
                    window.renderPriceTable();
                } catch (e) { console.error("Data Load Error:", e); }
            };

            window.renderPriceTable = function() {
                const tbody = document.getElementById('priceSettingsTableBody');
                if (!tbody) return;
                tbody.innerHTML = '';
                
                if (!window.priceItemsData || window.priceItemsData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 40px; color: #64748b; font-weight: 600;">No items found.</td></tr>';
                    return;
                }

                window.priceItemsData.forEach(item => {
                    tbody.innerHTML += `
                        <tr data-id="${item.id}">
                            <td style="text-align: center; color: #1F4E79; font-size: 10px;"><i class="fas fa-play"></i></td>
                            <td style="text-align: center; font-weight: 700;">${item.code}</td>
                            <td>${item.name}</td>
                            <td style="text-align: center; font-weight: 600;">${item.unit || ''}</td>
                            <td style="text-align: center; font-weight: 700;">${parseFloat(item.purchase_price).toFixed(2)}</td>
                            <td style="text-align: center;">
                                <input type="number" step="0.01" class="price-input-cell" 
                                       value="${parseFloat(item.selling_price).toFixed(2)}" 
                                       onchange="window.updateLocalPrice(${item.id}, this.value)">
                            </td>
                        </tr>
                    `;
                });
            };

            window.updateLocalPrice = function(id, val) {
                const item = window.priceItemsData.find(i => i.id == id);
                if (item) item.selling_price = parseFloat(val) || 0;
            };

            window.applyProfitMargin = function() {
                const margin = parseFloat(document.getElementById('profitMarginInput').value) || 0;
                if (margin === 0) return;
                window.priceItemsData.forEach(item => {
                    const purchase = parseFloat(item.purchase_price) || 0;
                    if (purchase > 0) item.selling_price = purchase + (purchase * (margin / 100));
                });
                window.renderPriceTable();
            };

            window.saveBulkPrices = async function() {
                if (window.priceItemsData.length === 0) return;
                try {
                    const payload = { prices: window.priceItemsData.map(i => ({ item_id: i.id, selling_price: i.selling_price })) };
                    const res = await fetch(`api/inventory.php?action=save_bulk_prices&company_id=${window.priceCompanyId}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    if (result.status === 'success') alert('Prices updated successfully!');
                } catch (e) { alert('Save failed.'); }
            };

            window.checkPriceConnection = async function() {
                try {
                    const res = await fetch(`api/inventory.php?action=debug_db&company_id=${window.priceCompanyId}`);
                    const data = await res.json();
                    alert("Items: " + data.counts.inv_items + "\nCategories: " + data.counts.inv_main_categories);
                    window.initPriceSettings();
                } catch (e) { alert("API Offline."); }
            };

            window.seedSampleDataForUser = async function() {
                if (!confirm("Seed demo data?")) return;
                try {
                    const res = await fetch(`api/inventory.php?action=seed_sample_data&company_id=${window.priceCompanyId}`);
                    const result = await res.json();
                    if (result.status === 'success') { alert("Seeded!"); window.initPriceSettings(); }
                } catch (e) { alert("Seed Failed."); }
            };

            // Start
            setTimeout(window.initPriceSettings, 200);
        })();
    </script>
</div>
