<div id="itemPriceSettingsContainer" data-module="Item Price Settings" style="width: 930px; height: 650px; background: white; display: flex; flex-direction: column; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; border: 1px solid #cbd5e0; overflow: hidden;">
    
    <!-- Header Section -->
    <div style="background: white; padding: 15px; border-bottom: 2px solid #cbd5e0; position: relative; display: flex; align-items: center; justify-content: space-between;">
        
        <!-- Left: Empty or placeholder removed as requested -->
        <div style="width: 10px;"></div>

        <!-- Middle: Options -->
        <div style="flex: 1; margin-left: 40px; display: flex; flex-direction: column; gap: 5px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: #334155; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="all" checked onclick="togglePriceFilters()"> All Inventory Items
                </label>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: #334155; width: 100px; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="category" onclick="togglePriceFilters()"> Category
                </label>
                <select id="priceCategorySelect" style="flex: 1; max-width: 300px; height: 26px; border: 1px solid #94a3b8; font-size: 12px; outline: none;" disabled onchange="loadPriceSettingsData()">
                    <option value="0">Select Category...</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: #334155; width: 100px; cursor: pointer;">
                    <input type="radio" name="priceFilter" value="brand" onclick="togglePriceFilters()"> Brand
                </label>
                <select id="priceBrandSelect" style="flex: 1; max-width: 300px; height: 26px; border: 1px solid #94a3b8; font-size: 12px; outline: none;" disabled onchange="loadPriceSettingsData()">
                    <option value="0">Select Brand...</option>
                </select>
                <button onclick="initPriceSettings()" style="height: 26px; font-size: 11px; background: #f1f5f9; border: 1px solid #cbd5e0; cursor: pointer; padding: 0 10px;">Refresh Lists</button>
            </div>
        </div>

        <!-- Right: Top Buttons & Margin Box -->
        <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 10px;">
            <div style="display: flex; gap: 8px;">
                <button class="price-btn price-btn-save" onclick="saveBulkPrices()">Save</button>
                <button class="price-btn price-btn-cancel" onclick="closeModularPopup()">Cancel</button>
            </div>
            
            <div style="background: #cbd5e0; padding: 5px 10px; border: 1px solid #94a3b8; display: flex; align-items: center; gap: 5px; border-radius: 2px;">
                <span style="font-size: 12px; font-weight: 600; color: #1e293b;">Set</span>
                <input type="number" id="profitMarginInput" style="width: 50px; height: 22px; text-align: center; border: 1px solid #94a3b8; font-weight: 700;" value="0">
                <span style="font-size: 11px; font-weight: 600; color: #1e293b;">% Profit Margin on Purchase Price of all Items.</span>
                <button style="height: 22px; padding: 0 10px; font-size: 11px; font-weight: 700; background: #f1f5f9; border: 1px solid #94a3b8; cursor: pointer;" onclick="applyProfitMargin()">Update</button>
            </div>
        </div>
    </div>

    <!-- Table Section -->
    <div style="flex: 1; background: white; margin: 10px; border: 1px solid #cbd5e0; border-radius: 2px; overflow: hidden; display: flex; flex-direction: column;">
        <div style="overflow-y: auto; flex: 1;">
            <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
                <thead style="position: sticky; top: 0; background: white; z-index: 10;">
                    <tr>
                        <th style="width: 40px; border: 1px solid #cbd5e0; padding: 8px;"></th>
                        <th style="width: 120px; border: 1px solid #cbd5e0; padding: 8px; color: #1e293b; font-style: italic;">Item Code</th>
                        <th style="border: 1px solid #cbd5e0; padding: 8px; color: #1e293b; font-style: italic; text-align: left;">Item Name</th>
                        <th style="width: 80px; border: 1px solid #cbd5e0; padding: 8px; color: #1e293b; font-style: italic;">Unit</th>
                        <th style="width: 150px; border: 1px solid #cbd5e0; padding: 8px; color: #1e293b; font-style: italic;">Purchase Price</th>
                        <th style="width: 150px; border: 1px solid #cbd5e0; padding: 8px; color: #1e293b; font-style: italic;">Selling Price</th>
                    </tr>
                </thead>
                <tbody id="priceSettingsTableBody">
                    <!-- Data Rows will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <style>
        .price-btn {
            height: 32px;
            min-width: 100px;
            padding: 0 20px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        
        .price-btn-save { background: #f1f5f9; border: 1px solid #94a3b8; color: #166534; }
        .price-btn-save:hover { background: #dcfce7; border-color: #166534; }
        .price-btn-save i { color: #166534; }

        .price-btn-cancel { background: #f1f5f9; border: 1px solid #94a3b8; color: #991b1b; }
        .price-btn-cancel:hover { background: #fee2e2; border-color: #991b1b; }
        .price-btn-cancel i { color: #991b1b; }

        .price-input-cell {
            width: 100%;
            height: 28px;
            border: 1px solid #e2e8f0;
            text-align: center;
            font-weight: 600;
            outline: none;
            background: #fff;
        }
        .price-input-cell:focus { border-color: #3b82f6; background: #eff6ff; }
        
        #priceSettingsTableBody tr:nth-child(even) { background: #f8fafc; }
        #priceSettingsTableBody tr:hover { background: #f1f5f9; }
        #priceSettingsTableBody td { padding: 4px 8px; border: 1px solid #cbd5e0; }
    </style>

    <!-- Diagnostics & Debug Footer (Can be removed later) -->
    <div id="priceDebugInfo" style="padding: 5px 15px; background: #fee2e2; border-top: 1px solid #ef4444; font-size: 11px; color: #991b1b; display: none; align-items: center; justify-content: space-between;">
        <span><strong>Debug:</strong> Company ID: <span id="debugCoId">?</span> | Status: <span id="debugStatus">Pending</span></span>
        <button onclick="seedSampleDataForUser()" style="background: #ef4444; color: white; border: none; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-weight: bold;">Seed Sample Data</button>
    </div>

    <script>
        // Global variables
        var priceItemsData = [];
        var priceCompanyId = 1;

        async function initPriceSettings() {
            try {
                const session = JSON.parse(localStorage.getItem('softifyx_session') || '{}');
                priceCompanyId = session.company_id || 1;
                document.getElementById('debugCoId').innerText = priceCompanyId;
                document.getElementById('priceDebugInfo').style.display = 'flex';
                
                console.log("Initializing Price Settings for Company:", priceCompanyId);
                
                const [treeRes, brandsRes] = await Promise.all([
                    fetch(`api/inventory.php?action=get_inventory_tree&company_id=${priceCompanyId}`),
                    fetch(`api/inventory.php?action=get_brands&company_id=${priceCompanyId}`)
                ]);
                
                const tree = await treeRes.json();
                const brands = await brandsRes.json();
                
                const catSelect = document.getElementById('priceCategorySelect');
                const brandSelect = document.getElementById('priceBrandSelect');
                
                if (!catSelect || !brandSelect) {
                    setTimeout(initPriceSettings, 200); // Retry if DOM not ready
                    return;
                }

                catSelect.innerHTML = '<option value="0">Select Category...</option>';
                if (tree && tree.subs && tree.subs.length > 0) {
                    tree.subs.forEach(s => {
                        const main = (tree.mains || []).find(m => m.id == s.main_id);
                        const mainName = main ? main.name + " > " : "";
                        catSelect.innerHTML += `<option value="${s.id}">${mainName}${s.name}</option>`;
                    });
                    document.getElementById('debugStatus').innerText = "Data Loaded";
                } else {
                    document.getElementById('debugStatus').innerText = "No Categories Found";
                }

                brandSelect.innerHTML = '<option value="0">Select Brand...</option>';
                if (brands && Array.isArray(brands) && brands.length > 0) {
                    brands.forEach(b => {
                        brandSelect.innerHTML += `<option value="${b.id}">${b.name}</option>`;
                    });
                }

                // Default load
                loadPriceSettingsData();
            } catch (e) { 
                console.error("Initialization Error:", e);
                document.getElementById('debugStatus').innerText = "Error: " + e.message;
            }
        }

        window.togglePriceFilters = function() {
            // Find checked radio manually to avoid selector issues
            const radios = document.getElementsByName('priceFilter');
            let filter = 'all';
            for (let r of radios) {
                if (r.checked) {
                    filter = r.value;
                    break;
                }
            }
            
            console.log("Toggling Filter:", filter);
            document.getElementById('priceCategorySelect').disabled = (filter !== 'category');
            document.getElementById('priceBrandSelect').disabled = (filter !== 'brand');
            
            loadPriceSettingsData();
        };

        window.loadPriceSettingsData = async function() {
            const radios = document.getElementsByName('priceFilter');
            let filterType = 'all';
            for (let r of radios) {
                if (r.checked) {
                    filterType = r.value;
                    break;
                }
            }
            
            let filterId = 0;
            if (filterType === 'category') filterId = document.getElementById('priceCategorySelect').value;
            if (filterType === 'brand') filterId = document.getElementById('priceBrandSelect').value;

            if (filterType !== 'all' && (filterId == 0 || filterId == '0')) {
                priceItemsData = [];
                renderPriceTable();
                return;
            }

            try {
                const res = await fetch(`api/inventory.php?action=get_price_settings&company_id=${priceCompanyId}&filter_type=${filterType}&filter_id=${filterId}`);
                priceItemsData = await res.json();
                renderPriceTable();
            } catch (e) { console.error("Data Load Error:", e); }
        };

        function renderPriceTable() {
            const tbody = document.getElementById('priceSettingsTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            if (!priceItemsData || priceItemsData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px; color: #64748b;">No items found. Click "All Inventory Items" or select a filter.</td></tr>';
                return;
            }

            priceItemsData.forEach(item => {
                tbody.innerHTML += `
                    <tr data-id="${item.id}">
                        <td style="text-align: center; color: #1e293b; font-size: 10px;"><i class="fas fa-play"></i></td>
                        <td style="text-align: center; font-weight: 700;">${item.code}</td>
                        <td>${item.name}</td>
                        <td style="text-align: center;">${item.unit || ''}</td>
                        <td style="text-align: center; font-weight: 700;">${parseFloat(item.purchase_price).toFixed(2)}</td>
                        <td>
                            <input type="number" step="0.01" class="price-input-cell" 
                                   value="${parseFloat(item.selling_price).toFixed(2)}" 
                                   onchange="updateLocalPrice(${item.id}, this.value)">
                        </td>
                    </tr>
                `;
            });
        }

        window.updateLocalPrice = function(id, val) {
            const item = priceItemsData.find(i => i.id == id);
            if (item) item.selling_price = parseFloat(val) || 0;
        };

        window.applyProfitMargin = function() {
            const margin = parseFloat(document.getElementById('profitMarginInput').value) || 0;
            if (margin === 0) return;

            priceItemsData.forEach(item => {
                const purchase = parseFloat(item.purchase_price) || 0;
                if (purchase > 0) {
                    item.selling_price = purchase + (purchase * (margin / 100));
                }
            });
            renderPriceTable();
        };

        window.saveBulkPrices = async function() {
            const payload = {
                prices: priceItemsData.map(i => ({ item_id: i.id, selling_price: i.selling_price }))
            };

            try {
                const res = await fetch(`api/inventory.php?action=save_bulk_prices&company_id=${priceCompanyId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.status === 'success') {
                    alert('Prices updated successfully!');
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (e) { alert('Failed to save prices.'); }
        };

        window.seedSampleDataForUser = async function() {
            if (confirm("This will add some sample categories and items to your database for testing. Continue?")) {
                try {
                    const res = await fetch(`api/inventory.php?action=seed_sample_data&company_id=${priceCompanyId}`);
                    const result = await res.json();
                    if (result.status === 'success') {
                        alert(result.message);
                        initPriceSettings();
                    } else {
                        alert("Seed failed: " + result.message);
                    }
                } catch (e) { alert("Network error during seed."); }
            }
        };

        // Run Init
        initPriceSettings();
    </script>
</div>
