<div id="itemPriceSettingsContainer" data-module="Inventory Price Settings" style="width: 100%; min-width: 960px; height: 600px; background: white; display: flex; flex-direction: column; padding: 20px; font-family: 'Segoe UI', sans-serif; border-radius: 8px;">
    
    <!-- Header Section -->
    <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; margin-bottom: 20px;">
        <div style="display: flex; flex-direction: column; gap: 4px;">
            <h2 style="margin: 0; color: #1e293b; font-size: 20px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-tags" style="color: #3b82f6;"></i> Inventory Price Settings
            </h2>
            <span style="font-size: 13px; color: #64748b;">Manage item selling prices and margins</span>
        </div>
        
        <div style="display: flex; gap: 8px;">
            <button class="inv-btn" style="background: #10b981 !important; color: white !important;" onclick="saveInventoryPrices()">
                <i class="fas fa-save"></i> Save Changes
            </button>
            <button class="inv-btn" style="background: #f1f5f9 !important; color: #475569 !important; border: 1px solid #e2e8f0 !important;" onclick="closeModal()">
                <i class="fas fa-times"></i> Cancel
            </button>
        </div>
    </div>

    <!-- Filter & Margin Controls -->
    <div style="background: #f8fafc; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
            <!-- Selection Mode -->
            <div style="display: flex; align-items: center; gap: 15px;">
                <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer;">
                    <input type="radio" name="pricingFilterType" value="all" checked onchange="togglePricingFilters()">
                    <span>All Inventory Items</span>
                </label>
                <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer;">
                    <input type="radio" name="pricingFilterType" value="category" onchange="togglePricingFilters()">
                    <span>Category</span>
                </label>
                <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer;">
                    <input type="radio" name="pricingFilterType" value="brand" onchange="togglePricingFilters()">
                    <span>Brand</span>
                </label>
            </div>

            <!-- Dropdowns -->
            <div id="pricingCategoryGroup" style="display: none; align-items: center; gap: 10px;">
                <select id="pricingCategorySelect" style="height: 35px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 10px; min-width: 200px; outline: none;" onchange="loadPricingGrid()">
                    <option value="">Select Sub-Category...</option>
                </select>
            </div>
            <div id="pricingBrandGroup" style="display: none; align-items: center; gap: 10px;">
                <select id="pricingBrandSelect" style="height: 35px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 10px; min-width: 200px; outline: none;" onchange="loadPricingGrid()">
                    <option value="">Select Brand...</option>
                </select>
            </div>
        </div>

        <!-- Profit Margin Tool -->
        <div style="display: flex; align-items: center; gap: 12px; border-top: 1px dashed #cbd5e0; pt-15; padding-top: 15px;">
            <div style="background: #e0f2fe; color: #0369a1; padding: 6px 12px; border-radius: 4px; font-size: 13px; font-weight: 600;">
                Quick Action
            </div>
            <span style="font-size: 14px; color: #334155;">Set</span>
            <input type="number" id="globalProfitMargin" placeholder="0" style="width: 80px; height: 35px; border: 1px solid #cbd5e0; border-radius: 4px; padding: 0 10px; text-align: center; outline: none; font-weight: 600;">
            <span style="font-size: 14px; color: #334155;">% Profit Margin on Purchase Price of all Items</span>
            <button class="inv-btn" style="background: #3b82f6 !important; color: white !important; height: 35px; padding: 0 15px;" onclick="applyProfitMargin()">
                Update Prices
            </button>
        </div>
    </div>

    <!-- Items Grid -->
    <div style="flex: 1; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column;">
        <div style="background: #1e293b; color: white; display: grid; grid-template-columns: 50px 120px 1fr 100px 130px 130px; font-weight: 600; font-size: 13px;">
            <div style="padding: 12px; border-right: 1px solid #334155; text-align: center;">
                <input type="checkbox" id="pricingSelectAll" onchange="togglePricingSelectAll(this.checked)">
            </div>
            <div style="padding: 12px; border-right: 1px solid #334155;">Item Code</div>
            <div style="padding: 12px; border-right: 1px solid #334155;">Item Name</div>
            <div style="padding: 12px; border-right: 1px solid #334155; text-align: center;">Unit</div>
            <div style="padding: 12px; border-right: 1px solid #334155; text-align: right;">Purchase Price</div>
            <div style="padding: 12px; text-align: right;">Selling Price</div>
        </div>
        <div id="pricingItemsGrid" style="flex: 1; overflow-y: auto; background: white;">
            <!-- Rows will be injected here -->
            <div style="padding: 40px; text-align: center; color: #94a3b8;">
                <i class="fas fa-box-open" style="font-size: 40px; margin-bottom: 10px; opacity: 0.5;"></i>
                <p>Loading items...</p>
            </div>
        </div>
    </div>
    
    <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #64748b;">
        <div id="pricingStatusBar">Showing 0 items</div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <span style="display: flex; align-items: center; gap: 5px;"><i class="fas fa-info-circle"></i> Calculations: Purchase + (Purchase * Margin / 100)</span>
        </div>
    </div>

</div>

<style>
    .inv-btn {
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: all 0.2s;
        outline: none;
    }
    .inv-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .inv-btn:active { transform: translateY(0); }
    
    .pricing-row {
        display: grid;
        grid-template-columns: 50px 120px 1fr 100px 130px 130px;
        border-bottom: 1px solid #f1f5f9;
        transition: background 0.2s;
        align-items: center;
    }
    .pricing-row:hover { background: #f8fafc; }
    .pricing-row td {
        padding: 10px;
        font-size: 13px;
        color: #334155;
    }
    .pricing-input {
        width: 100%;
        height: 30px;
        border: 1px solid #cbd5e0;
        border-radius: 4px;
        padding: 0 8px;
        text-align: right;
        font-size: 13px;
        font-weight: 600;
        color: #1e293b;
        outline: none;
        transition: border-color 0.2s;
    }
    .pricing-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
</style>
