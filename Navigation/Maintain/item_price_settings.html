<div id="itemPriceSettingsContainer" data-module="Inventory Price Settings" style="width: 1000px; min-width: 1000px; height: 600px; background: white; display: flex; flex-direction: column; padding: 20px; font-family: 'Segoe UI', sans-serif; border-radius: 8px; border: 1px solid #ddd;">
    
    <!-- Top Configuration Area -->
    <div style="display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px;">
        
        <!-- Row 1: Title and Filters -->
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <!-- Left: Styled Title -->
            <div style="position: relative; background: #ddd; padding: 10px 30px; border: 1px solid #999; box-shadow: 4px 4px 0px rgba(0,0,0,0.5);">
                <h2 style="margin: 0; font-style: italic; color: #333; font-size: 24px;">Inventory Price Settings</h2>
            </div>

            <!-- Right: Radio Selection & Dropdowns -->
            <div style="display: flex; flex-direction: column; gap: 8px; align-items: flex-start; min-width: 450px;">
                <div style="display: flex; align-items: center; gap: 20px;">
                    <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; font-weight: bold;">
                        <input type="radio" name="pricingFilterType" value="all" checked onchange="togglePricingFilters()">
                        <span>All Inventory Items</span>
                    </label>
                </div>
                
                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; font-weight: bold; width: 80px;">
                        <input type="radio" name="pricingFilterType" value="category" onchange="togglePricingFilters()">
                        <span>Category</span>
                    </label>
                    <div id="pricingCategoryGroup" style="display: none; flex: 1;">
                        <select id="pricingCategorySelect" style="width: 100%; height: 30px; border: 1px solid #aaa; outline: none;" onchange="loadPricingGrid()">
                            <option value="">Select Sub-Category...</option>
                        </select>
                    </div>
                    <div id="pricingCategoryPlaceholder" style="flex: 1; height: 30px; border: 1px solid #aaa; background: #eee;"></div>
                </div>

                <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                    <label style="display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; font-weight: bold; width: 80px;">
                        <input type="radio" name="pricingFilterType" value="brand" onchange="togglePricingFilters()">
                        <span>Brand</span>
                    </label>
                    <div id="pricingBrandGroup" style="display: none; flex: 1;">
                        <select id="pricingBrandSelect" style="width: 100%; height: 30px; border: 1px solid #aaa; outline: none;" onchange="loadPricingGrid()">
                            <option value="">Select Brand...</option>
                        </select>
                    </div>
                    <div id="pricingBrandPlaceholder" style="flex: 1; height: 30px; border: 1px solid #aaa; background: #eee;"></div>
                </div>
            </div>
        </div>

        <!-- Row 2: Margin Tool and Buttons -->
        <div style="display: flex; justify-content: flex-end; align-items: center; gap: 20px;">
            <!-- Profit Margin Box (Styled like a group box) -->
            <div style="border: 1px solid #999; padding: 10px 15px; background: #eee; display: flex; align-items: center; gap: 10px; border-radius: 4px;">
                <span style="font-size: 14px;">Set</span>
                <input type="number" id="globalProfitMargin" style="width: 60px; height: 25px; border: 1px solid #999; text-align: center; outline: none;">
                <span style="font-size: 14px;">% Profit Margin on Purchase Price of all Items.</span>
                <button onclick="applyProfitMargin()" style="padding: 2px 10px; cursor: pointer; background: #fff; border: 1px solid #999; font-size: 13px;">Update</button>
            </div>

            <!-- Action Buttons -->
            <div style="display: flex; gap: 10px;">
                <button onclick="saveInventoryPrices()" style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 70px; height: 50px; background: #fff; border: 1px solid #aaa; cursor: pointer; gap: 4px;">
                    <img src="https://img.icons8.com/color/24/000000/checked-line.png" style="width: 18px;"/>
                    <span style="font-size: 12px; font-weight: bold;">Save</span>
                </button>
                <button onclick="closeModal()" style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 70px; height: 50px; background: #fff; border: 1px solid #aaa; cursor: pointer; gap: 4px;">
                    <img src="https://img.icons8.com/color/24/000000/cancel.png" style="width: 18px;"/>
                    <span style="font-size: 12px; font-weight: bold;">Cancel</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Divider -->
    <div style="height: 2px; background: #333; margin-bottom: 20px;"></div>

    <!-- Items Grid Section -->
    <div style="flex: 1; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column;">
        <!-- Grid Header -->
        <div style="background: #fff; display: grid; grid-template-columns: 40px 100px 1fr 100px 140px 140px; border-bottom: 2px solid #333; font-weight: bold; font-size: 13px; font-style: italic;">
            <div style="padding: 8px; border-right: 1px solid #333;"></div>
            <div style="padding: 8px; border-right: 1px solid #333;">Item Code</div>
            <div style="padding: 8px; border-right: 1px solid #333;">Item Name</div>
            <div style="padding: 8px; border-right: 1px solid #333; text-align: center;">Unit</div>
            <div style="padding: 8px; border-right: 1px solid #333; text-align: center;">Purchase Price</div>
            <div style="padding: 8px; text-align: center;">Selling Price</div>
        </div>
        <!-- Grid Body -->
        <div id="pricingItemsGrid" style="flex: 1; overflow-y: scroll; background: #f9f9f9;">
            <!-- Rows injected here -->
            <div style="padding: 40px; text-align: center; color: #999;">
                <p>Loading items...</p>
            </div>
        </div>
    </div>
    
    <!-- Footer Status -->
    <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #666;">
        <div id="pricingStatusBar">Showing 0 items</div>
    </div>

</div>

<style>
    .pricing-row {
        display: grid;
        grid-template-columns: 40px 100px 1fr 100px 140px 140px;
        border-bottom: 1px solid #ccc;
        background: #fff;
    }
    .pricing-row:nth-child(even) { background: #fff; }
    .pricing-input {
        width: 100%;
        height: 25px;
        border: 1px solid #999;
        text-align: right;
        padding-right: 5px;
        outline: none;
    }
</style>
