<!-- Purchase Return / Debit Notes Module -->
<div id="purchaseReturnContainer" data-module="Purchase Return/Debit Notes" style="width: 950px; height: 600px; display: flex; flex-direction: column; background: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-y: auto; overflow-x: hidden; border: 1px solid #cbd5e0; border-radius: 4px; position: relative;">
    
    <!-- Top Toolbar -->
    <div style="background: #e2e8f0; padding: 2px; display: flex; gap: 2px; border-bottom: 1px solid #cbd5e0; align-items: center;">
        <div style="font-weight: bold; font-style: italic; color: #4a5568; margin-right: auto; padding-left: 10px; font-size: 16px; letter-spacing: 1px;">PURCHASE RETURNS / DEBIT NOTES</div>
        
        <button class="po-toolbar-btn" onclick="openModularPopup('Navigation/Maintain/vendors.html', 'fa-user-plus', 'Vendors/Suppliers', null, 'Vendors/Suppliers', true)">
            <i class="fas fa-user-plus" style="color: #48bb78;"></i><br>New Vendor
        </button>
        <button class="po-toolbar-btn" onclick="openModularPopup('Navigation/Maintain/chart_of_inventory.html', 'fa-box-open', 'Chart Of Inventory', null, 'Chart Of Inventory', true)">
            <i class="fas fa-box-open" style="color: #ecc94b;"></i><br>New Item
        </button>
        <div style="width: 1px; background: #cbd5e0; height: 30px; margin: 0 5px;"></div>
        <button class="po-toolbar-btn" onclick="PRModule.resetForm()">
            <i class="fas fa-plus" style="color: #4299e1;"></i><br>Add
        </button>
        <button class="po-toolbar-btn" onclick="PRModule.save()">
            <i class="fas fa-check" style="color: #48bb78;"></i><br>Save (Ctrl+S)
        </button>
        <button class="po-toolbar-btn" onclick="PRModule.resetForm()">
            <i class="fas fa-times" style="color: #f56565;"></i><br>Cancel
        </button>
        <button class="po-toolbar-btn" onclick="PRModule.deleteRecord()">
            <i class="fas fa-trash" style="color: #e53e3e;"></i><br>Delete
        </button>
        <button class="po-toolbar-btn">
            <i class="fas fa-upload" style="color: #667eea;"></i><br>Post
        </button>
        <button class="po-toolbar-btn">
            <i class="fas fa-search" style="color: #4a5568;"></i><br>Find
        </button>
        <button class="po-toolbar-btn" onclick="PRModule.loadLastSaved()">
            <i class="fas fa-history" style="color: #a0aec0;"></i><br>Retrieve Last Saved
        </button>
        <button class="po-toolbar-btn" onclick="PRModule.print()">
            <i class="fas fa-print" style="color: #718096;"></i><br>Print
        </button>
        <button class="po-toolbar-btn">
            <i class="fas fa-receipt" style="color: #4a5568;"></i><br>Voucher
        </button>
    </div>

    <!-- Header Info -->
    <div style="padding: 10px; display: grid; grid-template-columns: 1fr 330px; gap: 15px; background: #f8fafc;">
        <!-- Left Side: Basic Info -->
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 100px;">Serial No</label>
                <div style="display: flex; align-items: center; background: #edf2f7; border-radius: 4px; padding: 2px;">
                    <button class="nav-btn" onclick="PRModule.navigate(-1)">&laquo;</button>
                    <input type="text" id="pr_sn" class="po-input" style="width: 100px; text-align: center; font-weight: bold; color: #2b6cb0;" readonly>
                    <button class="nav-btn" onclick="PRModule.navigate(1)">&raquo;</button>
                </div>
                <div style="margin-left: auto; display: flex; align-items: center; gap: 5px;">
                    <label class="po-label">Cancel</label>
                    <input type="checkbox" id="pr_is_cancelled">
                </div>
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 100px;">Date</label>
                <input type="date" id="pr_date" class="po-input" style="width: 150px;">
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 100px;">Purchase No.</label>
                <input type="text" id="pr_purchase_no" class="po-input" style="width: 150px;">
                <label class="po-label">Dated</label>
                <input type="date" id="pr_purchase_date" class="po-input" style="width: 150px;">
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 100px;">Vendor Inv No.</label>
                <input type="text" id="pr_vendor_inv_no" class="po-input" style="width: 150px;">
                <label class="po-label">Dated</label>
                <input type="date" id="pr_vendor_inv_date" class="po-input" style="width: 150px;">
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 100px;">Nature of DN</label>
                <select id="pr_nature" class="po-input" style="flex: 1;">
                    <option value="Purchase Return (Reduces Inventory)">Purchase Return (Reduces Inventory)</option>
                    <option value="Price Adjustment">Price Adjustment</option>
                </select>
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 100px;">Terms of Payment</label>
                <input type="text" id="pr_pay_terms" class="po-input" style="flex: 1;">
            </div>

            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 100px;">Expense Account</label>
                <div style="display: flex; flex: 1; gap: 2px;">
                    <input type="text" id="expense_coa_code" class="po-input" style="width: 80px;" readonly>
                    <input type="text" id="expense_coa_name" class="po-input" style="flex: 1;" readonly>
                </div>
            </div>
        </div>

        <!-- Right Side: Vendor Info -->
        <fieldset style="border: 1px solid #cbd5e0; border-radius: 4px; padding: 8px;">
            <legend style="font-size: 11px; font-weight: bold; color: #4a5568; padding: 0 5px;">Vendor</legend>
            <div style="display: grid; grid-template-columns: 80px 1fr; gap: 5px; align-items: center;">
                <label class="po-label">Code</label>
                <div style="display: flex; gap: 2px;">
                    <input type="text" id="vendor_code" class="po-input" style="width: 80px;" placeholder="Search...">
                    <div style="display: flex; align-items: center; gap: 5px; margin-left: auto;">
                        <label class="po-label">Balance</label>
                        <span id="vendor_balance" style="color: #e53e3e; font-weight: bold;">0.00</span>
                    </div>
                </div>
                
                <label class="po-label">Name</label>
                <input type="text" id="vendor_name" class="po-input" placeholder="Search vendor by name...">
                
                <label class="po-label">Address</label>
                <textarea id="vendor_address" class="po-input" style="height: 40px; resize: none;" readonly></textarea>
                
                <label class="po-label">Telephone</label>
                <input type="text" id="vendor_tel" class="po-input" readonly>
                
                <label class="po-label">GST Reg No.</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="vendor_gst" class="po-input" style="flex: 1;" readonly>
                    <label class="po-label">NTN</label>
                    <input type="text" id="vendor_ntn" class="po-input" style="width: 80px;" readonly>
                </div>
            </div>
        </fieldset>
    </div>

    <!-- Grid Section -->
    <div style="flex: 1; overflow-y: auto; border-top: 1px solid #cbd5e0; border-bottom: 1px solid #cbd5e0; background: #edf2f7;">
        <table id="prGrid" style="width: 100%; border-collapse: collapse; background: white; table-layout: fixed;">
            <thead>
                <tr style="background: #e2e8f0; position: sticky; top: 0; z-index: 10;">
                    <th style="width: 25px; border: 1px solid #a0aec0;">#</th>
                    <th style="width: 80px; border: 1px solid #a0aec0;">Item Code</th>
                    <th style="width: 180px; border: 1px solid #a0aec0;">Description</th>
                    <th style="width: 50px; border: 1px solid #a0aec0;">Pieces</th>
                    <th style="width: 60px; border: 1px solid #a0aec0;">Quantity</th>
                    <th style="width: 45px; border: 1px solid #a0aec0;">Unit</th>
                    <th style="width: 70px; border: 1px solid #a0aec0;">Rate</th>
                    <th style="width: 80px; border: 1px solid #a0aec0;">Value Excl.</th>
                    <th style="width: 45px; border: 1px solid #a0aec0;">STax%</th>
                    <th style="width: 75px; border: 1px solid #a0aec0;">STax Amt</th>
                    <th style="width: 45px; border: 1px solid #a0aec0;">Frth%</th>
                    <th style="width: 75px; border: 1px solid #a0aec0;">Frth Amt</th>
                    <th style="width: 85px; border: 1px solid #a0aec0;">Value Incl.</th>
                </tr>
            </thead>
            <tbody id="prGridBody">
                <!-- Rows added by JS -->
            </tbody>
        </table>
    </div>

    <!-- Footer Summary Row -->
    <div style="background: #cbd5e0; padding: 2px 10px; display: grid; grid-template-columns: 285px 50px 60px 70px 80px 45px 75px 45px 75px 85px; gap: 0; align-items: center; text-align: center; font-weight: bold; font-size: 11px;">
        <div style="text-align: right; padding-right: 10px; font-style: italic;">Totals</div>
        <input type="text" id="tot_pieces" class="po-footer-input" readonly value="0.00">
        <input type="text" id="tot_qty" class="po-footer-input" readonly value="0.00">
        <div></div> <!-- rate gap -->
        <input type="text" id="tot_excl" class="po-footer-input" readonly value="0.00">
        <div></div> <!-- stax % gap -->
        <input type="text" id="tot_stax" class="po-footer-input" readonly value="0.00">
        <div></div> <!-- frth % gap -->
        <input type="text" id="tot_ftax" class="po-footer-input" readonly value="0.00">
        <input type="text" id="tot_incl" class="po-footer-input" readonly value="0.00">
    </div>

    <!-- Bottom Footer -->
    <div style="padding: 10px; display: grid; grid-template-columns: 1fr 300px; gap: 20px; background: #f8fafc;">
        <!-- Left Side: Additional Fields -->
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 120px;">Inventory Location</label>
                <select id="pr_location" class="po-input" style="flex: 1;">
                    <option value="">Main Store</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 120px;">Job No & Description</label>
                <select id="pr_job" class="po-input" style="flex: 1;">
                    <option value="">Select Job...</option>
                </select>
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <label class="po-label" style="width: 120px;">Employee Reference</label>
                <select id="pr_employee" class="po-input" style="flex: 1;">
                    <option value="">Select Employee...</option>
                </select>
            </div>
            <div style="display: flex; align-items: flex-start; gap: 10px;">
                <label class="po-label" style="width: 120px; margin-top: 5px;">Remarks</label>
                <textarea id="pr_remarks" class="po-input" style="flex: 1; height: 50px; resize: none;"></textarea>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                <label class="po-label" style="width: 120px; font-style: italic;">Amount in Words:</label>
                <div id="pr_amt_words" style="flex: 1; font-size: 11px; font-weight: bold; color: #4a5568;">Rupees zero and 00/100 only.</div>
            </div>
        </div>

        <!-- Right Side: Totals -->
        <div style="display: grid; grid-template-columns: 1fr 100px; gap: 5px; align-items: center;">
            <label class="po-label" style="text-align: right; padding-right: 10px;">Carriage and Freight</label>
            <input type="number" id="pr_freight" class="po-input" style="text-align: right;" value="0.00" oninput="PRModule.calculateTotals()">
            
            <label class="po-label" style="text-align: right; padding-right: 10px; font-weight: bold; color: #2b6cb0;">Net Total</label>
            <input type="text" id="pr_net_tot" class="po-input" style="text-align: right; font-weight: bold; background: #ebf8ff; color: #2c5282;" readonly value="0.00">
            
            <label class="po-label" style="text-align: right; padding-right: 10px;">Amount Received</label>
            <input type="number" id="pr_received" class="po-input" style="text-align: right;" value="0.00" oninput="PRModule.calculateTotals()">
            
            <label class="po-label" style="text-align: right; padding-right: 10px;">Balance</label>
            <input type="text" id="pr_balance" class="po-input" style="text-align: right;" readonly value="0.00">
        </div>
    </div>

    <!-- Hidden Inputs for logic -->
    <input type="hidden" id="vendor_coa_id">
    <input type="hidden" id="expense_coa_id">
</div>

<style>
    .po-toolbar-btn {
        background: #f7fafc; border: 1px solid #cbd5e0; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 10px; min-width: 65px; line-height: 1.2; text-align: center;
    }
    .po-toolbar-btn:hover { background: #edf2f7; }
    .po-toolbar-btn i { font-size: 16px; margin-bottom: 2px; }
    .po-label { font-size: 11px; color: #4a5568; }
    .po-input { border: 1px solid #cbd5e0; border-radius: 3px; padding: 3px 6px; font-size: 11px; }
    .nav-btn { background: #fff; border: 1px solid #cbd5e0; border-radius: 3px; padding: 0 8px; cursor: pointer; color: #4a5568; font-weight: bold; height: 22px; }
    .nav-btn:hover { background: #f7fafc; }
    #prGrid th { padding: 4px; font-size: 10px; color: #2d3748; }
    .po-grid-input { width: 100%; border: none; padding: 4px; font-size: 11px; outline: none; background: transparent; }
    .po-grid-input:focus { background: #ebf8ff; }
    .po-footer-input { border: none; background: transparent; font-size: 11px; font-weight: bold; text-align: center; width: 100%; outline: none; }
</style>
