<!-- 
    Purchase Order Module 
    Size: Width 1050px, Height 850px 
-->
<div id="purchaseOrderContainer" data-module="Purchase Order" style="width: 1050px; height: 850px; display: flex; flex-direction: column; background: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; border: 1px solid #cbd5e0; border-radius: 4px; position: relative;">
    
    <!-- Top Toolbar -->
    <div style="background: #e2e8f0; padding: 5px; display: flex; gap: 5px; border-bottom: 1px solid #cbd5e0;">
        <div class="po-tool-btn" onclick="openModularPopup('Navigation/Maintain/vendors.html', 'fa-user-tie', 'Vendors/Suppliers', null, 'Vendors', true)">
            <img src="assets/img/icons/new_vendor.png" style="height: 24px; margin-bottom: 2px;">
            <span>New Vendor</span>
        </div>
        <div class="po-tool-btn" onclick="openModularPopup('Navigation/Maintain/chart_of_inventory.html', 'fa-boxes', 'Chart Of Inventory', null, 'Chart of Inventory', true)">
            <img src="assets/img/icons/new_item.png" style="height: 24px; margin-bottom: 2px;">
            <span>New Item</span>
        </div>
        <div style="width: 10px; border-left: 1px solid #cbd5e0; margin: 0 5px;"></div>
        <div class="po-tool-btn" onclick="window.POModule.resetForm(true)">
            <img src="assets/img/icons/add.png" style="height: 24px; margin-bottom: 2px;">
            <span>Add</span>
        </div>
        <div class="po-tool-btn" onclick="window.POModule.savePO()">
            <img src="assets/img/icons/save.png" style="height: 24px; margin-bottom: 2px;">
            <span>Save</span>
        </div>
        <div class="po-tool-btn" onclick="window.POModule.resetForm()">
            <img src="assets/img/icons/cancel.png" style="height: 24px; margin-bottom: 2px;">
            <span>Cancel</span>
        </div>
        <div class="po-tool-btn" onclick="window.POModule.deletePO()">
            <img src="assets/img/icons/delete.png" style="height: 24px; margin-bottom: 2px;">
            <span>Delete</span>
        </div>
        <div style="width: 10px; border-left: 1px solid #cbd5e0; margin: 0 5px;"></div>
        <div class="po-tool-btn">
            <img src="assets/img/icons/convert_igp.png" style="height: 24px; margin-bottom: 2px;">
            <span>Convert IGP</span>
        </div>
        <div class="po-tool-btn">
            <img src="assets/img/icons/convert_tax.png" style="height: 24px; margin-bottom: 2px;">
            <span>Conv. Tax</span>
        </div>
        <div class="po-tool-btn">
            <img src="assets/img/icons/convert_purchase.png" style="height: 24px; margin-bottom: 2px;">
            <span>Conv. Purchase</span>
        </div>
        <div style="width: 10px; border-left: 1px solid #cbd5e0; margin: 0 5px;"></div>
        <div class="po-tool-btn">
            <img src="assets/img/icons/find.png" style="height: 24px; margin-bottom: 2px;">
            <span>Find</span>
        </div>
        <div class="po-tool-btn">
            <img src="assets/img/icons/retrieve.png" style="height: 24px; margin-bottom: 2px;">
            <span>Retrieve Last</span>
        </div>
        <div class="po-tool-btn">
            <img src="assets/img/icons/print_settings.png" style="height: 24px; margin-bottom: 2px;">
            <span>Print Set.</span>
        </div>
        <div class="po-tool-btn" onclick="window.POModule.printPO()">
            <img src="assets/img/icons/print.png" style="height: 24px; margin-bottom: 2px;">
            <span>Print</span>
        </div>
        <div style="flex: 1;"></div>
        <div class="po-tool-btn" onclick="closeModularPopup()" style="color: #ef4444;">
            <i class="fas fa-times" style="font-size: 20px;"></i>
        </div>
    </div>

    <!-- Main Content Area -->
    <div style="flex: 1; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: white; overflow-y: auto;">
        
        <!-- Header Info Rows -->
        <div style="display: flex; gap: 30px;">
            <!-- Left Side: Order Details -->
            <div style="flex: 1; display: grid; grid-template-columns: 140px 1fr; gap: 8px; align-content: start;">
                <label class="po-label">Serial No</label>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <button class="po-nav-btn" onclick="window.POModule.navigate('prev')"><<</button>
                    <input type="text" id="po_sn" class="po-input" style="width: 100px; text-align: center; color: blue; font-weight: 800; font-size: 14px;" readonly>
                    <button class="po-nav-btn" onclick="window.POModule.navigate('next')">>></button>
                    <label style="margin-left: 20px; font-size: 11px; display: flex; align-items: center; gap: 5px; color: #64748b;">
                        Cancel <input type="checkbox" id="po_is_cancelled">
                    </label>
                </div>

                <label class="po-label">Date</label>
                <input type="date" id="po_date" class="po-input" style="width: 150px;">

                <label class="po-label">Date to be Delivered</label>
                <input type="date" id="po_delivery_date" class="po-input" style="width: 150px;">

                <label class="po-label">Terms of Payment</label>
                <input type="text" id="po_payment_terms" class="po-input">

                <label class="po-label">Job No & Description</label>
                <select id="po_job_ref" class="po-input">
                    <option value="">Select Job</option>
                </select>

                <label class="po-label">Employee Reference</label>
                <select id="po_employee_ref" class="po-input">
                    <option value="">Select Employee</option>
                </select>
            </div>

            <!-- Right Side: Vendor Info -->
            <div style="width: 450px; border: 1px solid #e2e8f0; border-radius: 4px; padding: 12px; background: #f8fafc; position: relative;">
                <div style="position: absolute; top: -10px; left: 10px; background: #f8fafc; padding: 0 5px; font-size: 11px; font-weight: 700; color: #1e3a8a;">Vendor Information</div>
                <div style="display: grid; grid-template-columns: 80px 1fr; gap: 6px;">
                    <label class="po-label">Code</label>
                    <div style="display: flex; gap: 5px;">
                        <div style="position: relative; flex: 1;">
                            <input type="text" id="vendor_code" class="po-input" placeholder="Search vendor...">
                            <div id="vendor_suggest" class="po-suggest"></div>
                        </div>
                        <label class="po-label" style="min-width: 50px; text-align: right;">Balance</label>
                        <input type="text" id="vendor_balance" class="po-input" style="width: 100px; text-align: right;" readonly>
                    </div>

                    <label class="po-label">Name</label>
                    <input type="text" id="vendor_name" class="po-input" readonly>

                    <label class="po-label">Address</label>
                    <textarea id="vendor_address" class="po-input" style="height: 50px; resize: none;" readonly></textarea>

                    <label class="po-label">Telephone</label>
                    <input type="text" id="vendor_tel" class="po-input" readonly>

                    <label class="po-label">GST Reg No.</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="vendor_gst" class="po-input" readonly>
                        <label class="po-label">NTN</label>
                        <input type="text" id="vendor_ntn" class="po-input" readonly style="width: 120px;">
                    </div>
                </div>
            </div>
        </div>

        <!-- Grid Table Section -->
        <div style="flex: 1; border: 1px solid #cbd5e0; overflow: hidden; display: flex; flex-direction: column; background: #f8fafc;">
            <div style="overflow-x: auto; flex: 1;">
                <table id="poGrid" style="width: 1200px; border-collapse: collapse; background: white;">
                    <thead style="position: sticky; top: 0; background: #e2e8f0; z-index: 10;">
                        <tr>
                            <th style="width: 30px; border: 1px solid #cbd5e0;"></th>
                            <th style="width: 120px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Item Code</th>
                            <th style="border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Description</th>
                            <th style="width: 70px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Pieces</th>
                            <th style="width: 70px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Quantity</th>
                            <th style="width: 60px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Unit</th>
                            <th style="width: 90px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Rate</th>
                            <th style="width: 100px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Val Excl Tax</th>
                            <th style="width: 60px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Tax %</th>
                            <th style="width: 90px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Tax Amt</th>
                            <th style="width: 60px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Frth %</th>
                            <th style="width: 90px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Frth Amt</th>
                            <th style="width: 100px; border: 1px solid #cbd5e0; font-size: 11px; padding: 5px;">Val Incl Tax</th>
                        </tr>
                    </thead>
                    <tbody id="poGridBody">
                        <!-- Rows will be added dynamically -->
                    </tbody>
                </table>
            </div>
            <!-- Grid Totals Footer -->
            <div style="background: #e2e8f0; display: flex; align-items: center; padding: 5px 0; border-top: 1px solid #cbd5e0;">
                <div style="flex: 1; text-align: right; padding-right: 15px; font-weight: 700; font-size: 12px; color: #475569;">Totals</div>
                <div style="width: 70px; padding: 0 5px;"><input type="text" id="tot_pieces" class="po-total-input" value="0.00" readonly></div>
                <div style="width: 70px; padding: 0 5px;"><input type="text" id="tot_qty" class="po-total-input" value="0.00" readonly></div>
                <div style="width: 60px;"></div>
                <div style="width: 90px;"></div>
                <div style="width: 100px; padding: 0 5px;"><input type="text" id="tot_excl" class="po-total-input" value="0.00" readonly></div>
                <div style="width: 60px;"></div>
                <div style="width: 90px; padding: 0 5px;"><input type="text" id="tot_tax" class="po-total-input" value="0.00" readonly></div>
                <div style="width: 60px;"></div>
                <div style="width: 90px; padding: 0 5px;"><input type="text" id="tot_further" class="po-total-input" value="0.00" readonly></div>
                <div style="width: 100px; padding: 0 5px;"><input type="text" id="tot_incl" class="po-total-input" value="0.00" readonly></div>
            </div>
        </div>

        <!-- Footer Section -->
        <div style="display: flex; gap: 30px;">
            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label class="po-label" style="min-width: 110px;">Amount in Words:</label>
                    <span id="po_amt_words" style="font-size: 11px; font-weight: 700; color: #1e3a8a;">Rupees zero and 00/100 only.</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <label class="po-label" style="min-width: 110px;">Terms & Conditions</label>
                    <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                        <textarea id="po_terms" class="po-input" style="height: 80px; resize: none;"></textarea>
                        <button class="po-small-btn" onclick="window.POModule.setDefaultTerms()">Set as Default Terms & Conditions</button>
                    </div>
                </div>
            </div>
            <div style="width: 400px; display: flex; flex-direction: column; gap: 5px;">
                <label class="po-label">Remarks</label>
                <textarea id="po_remarks" class="po-input" style="height: 105px; resize: none;"></textarea>
            </div>
        </div>
    </div>

    <style>
        .po-tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px 8px;
            cursor: pointer;
            border: 1px solid transparent;
            border-radius: 3px;
            min-width: 65px;
            transition: all 0.2s;
        }
        .po-tool-btn:hover { background: #f1f5f9; border-color: #cbd5e0; }
        .po-tool-btn span { font-size: 9px; font-weight: 700; color: #475569; text-transform: uppercase; }

        .po-label { font-size: 11px; font-weight: 600; color: #334155; }
        .po-input {
            height: 24px;
            border: 1px solid #cbd5e0;
            border-radius: 3px;
            padding: 0 6px;
            font-size: 12px;
            outline: none;
            width: 100%;
        }
        .po-input:focus { border-color: #1e3a8a; background: #fff; }
        textarea.po-input { padding: 4px 6px; }

        .po-nav-btn {
            height: 24px;
            padding: 0 5px;
            background: white;
            border: 1px solid #cbd5e0;
            cursor: pointer;
            font-size: 10px;
            font-weight: 800;
        }
        .po-nav-btn:hover { background: #f1f5f9; }

        .po-total-input {
            width: 100%;
            height: 22px;
            background: #fff;
            border: 1px solid #cbd5e0;
            text-align: right;
            font-weight: 700;
            font-size: 11px;
            color: #1e3a8a;
            padding: 0 4px;
        }

        .po-small-btn {
            background: #e2e8f0;
            border: 1px solid #cbd5e0;
            padding: 2px 8px;
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 3px;
            align-self: flex-start;
        }
        .po-small-btn:hover { background: #cbd5e0; }

        .grid-input {
            border: none;
            width: 100%;
            height: 100%;
            padding: 2px 5px;
            font-size: 11px;
            outline: none;
            background: transparent;
        }
        .grid-input:focus { background: #eff6ff; }
        .grid-input.num { text-align: right; }

        .po-suggest {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: white;
            border: 1px solid #cbd5e0;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .po-suggest div { padding: 5px 10px; cursor: pointer; font-size: 11px; border-bottom: 1px solid #f1f5f9; }
        .po-suggest div:hover { background: #f1f5f9; }
        .po-suggest div.selected { background: #1e3a8a; color: white; }

        #poGrid td { border: 1px solid #e2e8f0; padding: 0; position: relative; }
    </style>
</div>
