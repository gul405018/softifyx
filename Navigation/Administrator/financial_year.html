<style>
    .listbox-item {
        padding: 6px 12px;
        font-size: 14px;
        color: #333;
        cursor: pointer;
        border-bottom: 1px solid #f1f1f1;
        transition: background 0.1s;
    }
    .listbox-item:hover {
        background: #f8f9fa;
    }
    .listbox-item.active {
        background: #4a90e2;
        color: #fff;
    }
</style>
<div data-module="Financial Year" style="padding: 10px 20px; font-family: Segoe UI, Tahoma, sans-serif;">
    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
        
        <!-- Left Side: List of Financial Years -->
        <div style="flex: 1; border: 1px solid #ccc; border-radius: 4px; overflow-y: auto; height: 160px; background: #fff; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);" id="fyListBox">
            <!-- Populated via JS -->
        </div>

        <!-- Right Side: Form Fields -->
        <div style="flex: 1.5;">
            <div class="form-group" style="display: flex; align-items: center; margin-bottom: 12px;">
                <label style="width: 140px; font-weight: 600; color: #1f4668;">Starting Date</label>
                <input type="date" class="form-control" id="fyStartDate" style="flex: 1; border: 1px solid #ccc;">
            </div>

            <div class="form-group" style="display: flex; align-items: center; margin-bottom: 12px;">
                <label style="width: 140px; font-weight: 600; color: #1f4668;">Ending Date</label>
                <input type="date" class="form-control" id="fyEndDate" style="flex: 1; border: 1px solid #ccc;">
            </div>

            <div class="form-group" style="display: flex; align-items: center; margin-bottom: 12px;">
                <label style="width: 140px; font-weight: 600; color: #1f4668;">Abbreviation</label>
                <input type="text" class="form-control" id="fyAbbreviation" style="flex: 1; border: 1px solid #ccc;" placeholder="e.g. 2020-21">
            </div>
            
            <!-- Hidden ID field to track edit mode -->
            <input type="hidden" id="fyEditId" value="">
            
            <div id="fyErrorMsg" style="color: #d63031; font-weight: 500; font-size: 13px; height: 18px; text-align: right; margin-bottom: 5px;"></div>
        </div>
    </div>

    <div class="modal-actions">
        <button class="btn btn-secondary" onclick="addNewFY()"><i class="fas fa-plus"></i> Add New</button>
        <button class="btn btn-primary" onclick="saveFY()"><i class="fas fa-save"></i> Save Changes</button>
        <button class="btn btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i> Close</button>
    </div>
</div>

<script>
    (function initFY() {
        const list = document.getElementById('fyListBox');
        const startInput = document.getElementById('fyStartDate');
        const endInput = document.getElementById('fyEndDate');
        const abbrInput = document.getElementById('fyAbbreviation');
        const editIdInput = document.getElementById('fyEditId');
        const errorDiv = document.getElementById('fyErrorMsg');

        // 1. Load List from Global State or Fetch
        window.loadFYList = function() {
            if (!window.financialYears) return;
            list.innerHTML = '';
            window.financialYears.forEach(fy => {
                const item = document.createElement('div');
                item.className = 'listbox-item';
                item.textContent = fy.abbreviation || fy.year || 'Unknown';
                item.onclick = () => selectFY(fy, item);
                list.appendChild(item);
            });
        };

        function selectFY(fy, element) {
            // UI Selection
            document.querySelectorAll('.listbox-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');

            // Populate Form
            startInput.value = fy.start_date || '';
            endInput.value = fy.end_date || '';
            abbrInput.value = fy.abbreviation || '';
            editIdInput.value = fy.id || '';
            errorDiv.textContent = '';
        }

        window.addNewFY = function() {
            document.querySelectorAll('.listbox-item').forEach(i => i.classList.remove('active'));
            startInput.value = '';
            endInput.value = '';
            abbrInput.value = '';
            editIdInput.value = '';
            errorDiv.textContent = '';
        };

        // 2. Auto-Abbreviation Logic
        function updateAbbr() {
            if (!startInput.value || !endInput.value) return;
            const startYear = new Date(startInput.value).getFullYear();
            const endFullYear = new Date(endInput.value).getFullYear();
            const endShort = endFullYear.toString().slice(-2);
            
            // Format: 2025-26
            if (!isNaN(startYear) && !isNaN(endFullYear)) {
                abbrInput.value = `${startYear}-${endShort}`;
            }
        }

        startInput.onchange = updateAbbr;
        endInput.onchange = updateAbbr;

        // 3. Save Logic
        window.saveFY = async function() {
            if (!startInput.value || !endInput.value || !abbrInput.value) {
                errorDiv.textContent = 'Please fill all fields.';
                return;
            }

            const payload = {
                id: editIdInput.value || null,
                start: startInput.value,
                end: endInput.value,
                abbr: abbrInput.value
            };

            try {
                const res = await fetch(`api/admin.php?action=save_fy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await res.json();
                if (result.status === 'success') {
                    alert('Financial Year saved successfully!');
                    window.location.reload(); // Refresh to sync global state
                } else {
                    errorDiv.textContent = result.error || 'Save failed.';
                }
            } catch (err) {
                errorDiv.textContent = 'Server Error.';
            }
        };

        loadFYList();
    })();
</script>
