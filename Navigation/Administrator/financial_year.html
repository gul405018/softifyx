<style>
    .listbox-item {
        padding: 6px 12px;
        font-size: 14px;
        color: #333;
        cursor: pointer;
        border-bottom: 1px solid #f1f1f1;
        transition: background 0.1s;
    }
    .listbox-item:hover {
        background: #f8f9fa;
    }
    .listbox-item.active {
        background: #4a90e2;
        color: #fff;
    }
</style>
<div data-module="Financial Year" style="padding: 10px 20px; font-family: Segoe UI, Tahoma, sans-serif;">
    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
        
        <!-- Left Side: List of Financial Years -->
        <div style="flex: 1; border: 1px solid #ccc; border-radius: 4px; overflow-y: auto; height: 160px; background: #fff; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);" id="fyListBox">
            <!-- Populated via JS -->
        </div>

        <!-- Right Side: Form Fields -->
        <div style="flex: 1.5;">
            <div class="form-group" style="display: flex; align-items: center; margin-bottom: 12px;">
                <label style="width: 140px; font-weight: 600; color: #1f4668;">Starting Date</label>
                <input type="date" class="form-control" id="fyStartDate" style="flex: 1; border: 1px solid #ccc;">
            </div>

            <div class="form-group" style="display: flex; align-items: center; margin-bottom: 12px;">
                <label style="width: 140px; font-weight: 600; color: #1f4668;">Ending Date</label>
                <input type="date" class="form-control" id="fyEndDate" style="flex: 1; border: 1px solid #ccc;">
            </div>

            <div class="form-group" style="display: flex; align-items: center; margin-bottom: 12px;">
                <label style="width: 140px; font-weight: 600; color: #1f4668;">Abbreviation</label>
                <input type="text" class="form-control" id="fyAbbreviation" style="flex: 1; border: 1px solid #ccc;" placeholder="e.g. 2020-21">
            </div>
            
            <!-- Hidden ID field to track edit mode -->
            <input type="hidden" id="fyEditId" value="">
            
            <div id="fyErrorMsg" style="color: #d63031; font-weight: 500; font-size: 13px; height: 18px; text-align: right; margin-bottom: 5px;"></div>
        </div>
    </div>

    <div class="modal-actions">
        <button class="btn btn-secondary" onclick="addNewFY()"><i class="fas fa-plus"></i> Add New</button>
        <button class="btn btn-primary" onclick="saveFY(this)" style="pointer-events: auto !important; cursor: pointer !important;"><i class="fas fa-save"></i> Save Changes</button>
        <button class="btn btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i> Close</button>
    </div>
</div>

<script>
// 1. Initial Load from Global State (with Fetch Fallback)
window.loadFYList = async function() {
    const list = document.getElementById('fyListBox');
    if (!list) return;

    // Try global state first
    let data = window.financialYears;
    
    // Fallback: Fetch if empty
    if (!data || data.length === 0) {
        try {
            const res = await fetch('api/admin.php?action=get_fy');
            if (res.ok) {
                data = await res.json();
                window.financialYears = data; // Sync back to global
            }
        } catch (e) { console.error('FY Load Error:', e); }
    }

    if (!data) return;
    
    list.innerHTML = '';
    data.forEach(fy => {
        const item = document.createElement('div');
        item.className = 'listbox-item';
        item.textContent = fy.abbreviation || fy.year || 'Unknown';
        item.onclick = () => {
            document.querySelectorAll('.listbox-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            document.getElementById('fyStartDate').value = fy.start_date || '';
            document.getElementById('fyEndDate').value = fy.end_date || '';
            document.getElementById('fyAbbreviation').value = fy.abbreviation || '';
            document.getElementById('fyEditId').value = fy.id || '';
        };
        list.appendChild(item);
    });
};

window.addNewFY = function() {
    document.querySelectorAll('.listbox-item').forEach(i => i.classList.remove('active'));
    document.getElementById('fyStartDate').value = '';
    document.getElementById('fyEndDate').value = '';
    document.getElementById('fyAbbreviation').value = '';
    document.getElementById('fyEditId').value = '';
};

// 2. Auto-Abbreviation Logic
function updateFYAbbr() {
    const start = document.getElementById('fyStartDate').value;
    const end = document.getElementById('fyEndDate').value;
    if (!start || !end) return;
    const startYear = new Date(start).getFullYear();
    const endYear = new Date(end).getFullYear();
    if (!isNaN(startYear) && !isNaN(endYear)) {
        document.getElementById('fyAbbreviation').value = `${startYear}-${endYear.toString().slice(-2)}`;
    }
}
const startInp = document.getElementById('fyStartDate');
const endInp = document.getElementById('fyEndDate');
if(startInp) startInp.onchange = updateFYAbbr;
if(endInp) endInp.onchange = updateFYAbbr;

// 3. Global Save Logic
window.saveFY = async function(btn) {
    if (!btn) btn = event.target.closest('button');
    const originalText = btn.innerHTML;
    const start = document.getElementById('fyStartDate').value;
    const end = document.getElementById('fyEndDate').value;
    const abbr = document.getElementById('fyAbbreviation').value;
    const id = document.getElementById('fyEditId').value;

    if (!start || !end || !abbr) {
        alert('Please fill all dates and abbreviation.');
        return;
    }

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    btn.disabled = true;

    try {
        const res = await fetch(`api/admin.php?action=save_fy`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id || null, start, end, abbr })
        });
        const result = await res.json();
        if (result.status === 'success') {
            alert('Settings Synchronized Successfully!');
            window.location.reload();
        } else {
            alert('Error: ' + (result.error || 'Check fields'));
        }
    } catch (err) {
        alert('Sync Error: Server Connection Failed');
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
};

loadFYList();
</script>
