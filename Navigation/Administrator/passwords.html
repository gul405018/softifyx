<div data-module="Passwords" style="padding: 10px 20px;">
    
    <div style="margin-bottom: 25px;">
        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 180px; font-weight: 600; color: #1f4668;">Software User</label>
            <select class="form-control" id="pwdUserSelect" style="flex: 1; border: 1px solid #ccc; max-width: 300px;">
                <!-- Populated dynamically via JS -->
            </select>
        </div>

        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 180px; font-weight: 600; color: #1f4668;">Old Password</label>
            <div style="flex: 1; max-width: 300px; position: relative;">
                <input type="password" class="form-control" id="pwdOld" style="width: 100%; border: 1px solid #ccc; padding-right: 30px;" autocomplete="new-password">
                <i class="fas fa-eye" onclick="togglePasswordVisibility('pwdOld', this)" style="position: absolute; right: 10px; top: 11px; cursor: pointer; color: #888;"></i>
            </div>
        </div>

        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 180px; font-weight: 600; color: #1f4668;">New Password</label>
            <div style="flex: 1; max-width: 300px; position: relative;">
                <input type="password" class="form-control" id="pwdNew" style="width: 100%; border: 1px solid #ccc; padding-right: 30px;" autocomplete="new-password">
                <i class="fas fa-eye" onclick="togglePasswordVisibility('pwdNew', this)" style="position: absolute; right: 10px; top: 11px; cursor: pointer; color: #888;"></i>
            </div>
        </div>

        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 180px; font-weight: 600; color: #1f4668;">Re-Type New Password</label>
            <div style="flex: 1; max-width: 300px; position: relative;">
                <input type="password" class="form-control" id="pwdConfirm" style="width: 100%; border: 1px solid #ccc; padding-right: 30px;" autocomplete="new-password">
                <i class="fas fa-eye" onclick="togglePasswordVisibility('pwdConfirm', this)" style="position: absolute; right: 10px; top: 11px; cursor: pointer; color: #888;"></i>
            </div>
        </div>
    </div>
    
    <div id="pwdErrorMsg" style="color: #d63031; font-weight: 500; height: 20px; text-align: right; margin-bottom: 10px;"></div>

    <div class="modal-actions" style="margin-top: 10px;">
        <button class="btn btn-primary" onclick="savePasswordSettings()"><i class="fas fa-check"></i> Save</button>
        <button class="btn btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i> Cancel</button>
    </div>
</div>
