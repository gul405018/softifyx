<div style="padding: 10px 20px;">
    
    <div style="margin-bottom: 25px;">
        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 180px; font-weight: 600; color: #1f4668;">Software User</label>
            <select class="form-control" id="pwdUserSelect" style="flex: 1; border: 1px solid #ccc; max-width: 300px;">
                <!-- Populated dynamically via JS -->
            </select>
        </div>

        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 180px; font-weight: 600; color: #1f4668;">Old Password</label>
            <input type="password" class="form-control" id="pwdOld" style="flex: 1; max-width: 300px;">
        </div>

        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 180px; font-weight: 600; color: #1f4668;">New Password</label>
            <input type="password" class="form-control" id="pwdNew" style="flex: 1; max-width: 300px;">
        </div>

        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 180px; font-weight: 600; color: #1f4668;">Re-Type New Password</label>
            <input type="password" class="form-control" id="pwdConfirm" style="flex: 1; max-width: 300px;">
        </div>
    </div>
    
    <div id="pwdErrorMsg" style="color: #d63031; font-weight: 500; height: 20px; text-align: right; margin-bottom: 10px;"></div>

    <div class="modal-actions" style="border-top: none; justify-content: flex-end; padding-top: 0; padding-right: 15px;">
        <button class="btn btn-primary" onclick="savePasswordSettings()" style="width: 100px;"><i class="fas fa-check"></i> Save</button>
        <button class="btn btn-secondary" onclick="closeModal()" style="width: 100px;"><i class="fas fa-times"></i> Cancel</button>
    </div>
</div>
