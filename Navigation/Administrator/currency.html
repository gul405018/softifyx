<div style="padding: 10px 20px; font-family: Segoe UI, Tahoma, sans-serif;">
    <div style="margin-bottom: 25px;">
        <div class="form-group" style="display: flex; align-items: flex-start; margin-bottom: 15px;">
            <label style="width: 170px; font-weight: 600; color: #1f4668; padding-top: 8px;">Country Name</label>
            changes <div style="flex: 1; max-width: 400px; position: relative;">
                <input type="text" class="form-control" id="currCountry" onkeyup="filterCountryList()"
                    onfocus="showCountryList()" placeholder="Search or select country..."
                    style="width: 100%; border: 1px solid #ccc;" autocomplete="off">
                <div id="countryDropdownList"
                    style="display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #ccc; max-height: 200px; overflow-y: auto; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 0 0 4px 4px; font-size: 14px;">
                    <!-- JS injected list items -->
                </div>
                <div style="font-size: 11px; color: #666; margin-top: 4px;">(Search or click to select the country of
                    your business)</div>
            </div>
        </div>

        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 170px; font-weight: 600; color: #1f4668;">Currency Name</label>
            <input type="text" class="form-control" id="currName"
                style="flex: 1; max-width: 400px; border: 1px solid #ccc;">
        </div>

        <div class="form-group" style="display: flex; align-items: center; margin-bottom: 15px;">
            <label style="width: 170px; font-weight: 600; color: #1f4668;">Currency Symbol</label>
            <div style="flex: 1; max-width: 400px; display: flex; align-items: center;">
                <input type="text" class="form-control" id="currSymbol" maxlength="5"
                    style="width: 100px; border: 1px solid #ccc; text-align: center;">
                <span style="font-size: 11px; color: #666; margin-left: 10px;">(Maximum 5 characters)</span>
            </div>
        </div>

        <div id="currErrorMsg"
            style="color: #27ae60; font-weight: 600; font-size: 13px; height: 18px; text-align: right; margin-bottom: 5px;">
        </div>
    </div>

    <!-- Actions -->
    <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveCurrencySettings()"><i class="fas fa-check"></i> Save</button>
        <button class="btn btn-secondary" onclick="closeModal()"><i class="fas fa-times"></i> Cancel</button>
    </div>
</div>
